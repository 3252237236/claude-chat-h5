<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>提交作品 · HZ Lab</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --surface: rgba(255,255,255,0.03);
  --surface2: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.08);
  --text: #e8e8f0;
  --text-dim: #8888a0;
  --accent: #6c5ce7;
  --accent-glow: rgba(108,92,231,0.3);
  --green: #00d2a0;
  --red: #ff6b6b;
  --radius: 20px;
}

html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
}

.bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
.bg-orb {
  position: absolute; border-radius: 50%;
  filter: blur(120px); opacity: 0.10;
  animation: orbFloat 20s ease-in-out infinite;
}
.bg-orb:nth-child(1) {
  width: 500px; height: 500px; background: var(--accent);
  top: -150px; right: -100px;
}
.bg-orb:nth-child(2) {
  width: 350px; height: 350px; background: var(--green);
  bottom: -100px; left: -100px; animation-direction: reverse;
}
@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(40px, -40px) scale(1.1); }
}
.bg-grid {
  position: fixed; inset: 0; z-index: 0; opacity: 0.03;
  background-image:
    linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px);
  background-size: 60px 60px;
}

.app {
  position: relative; z-index: 1;
  max-width: 580px; margin: 0 auto;
  padding: 40px 24px 60px;
  min-height: 100vh;
}

.back {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--text-dim); text-decoration: none; font-size: 14px;
  margin-bottom: 32px; transition: color 0.2s;
}
.back:hover { color: var(--text); }

.form-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 36px 30px;
}
.form-card h1 { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
.form-card .subtitle { font-size: 14px; color: var(--text-dim); margin-bottom: 28px; line-height: 1.6; }

.form-group { margin-bottom: 18px; }
.form-group label {
  display: block; font-size: 12px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px;
}

input, textarea {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 11px 14px; font-size: 15px; color: var(--text);
  font-family: inherit; outline: none; transition: border-color 0.2s;
}
input:focus, textarea:focus { border-color: var(--accent); }
textarea { resize: vertical; min-height: 70px; }

.color-picker { display: flex; gap: 10px; flex-wrap: wrap; }
.color-dot {
  width: 34px; height: 34px; border-radius: 10px; cursor: pointer;
  border: 2px solid transparent; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: #fff;
}
.color-dot:hover { transform: scale(1.1); }
.color-dot.active { border-color: #fff; box-shadow: 0 0 16px var(--dot-color); }

.emoji-grid { display: flex; gap: 7px; flex-wrap: wrap; }
.emoji-btn {
  width: 38px; height: 38px; border-radius: 10px;
  background: var(--surface2); border: 1px solid transparent;
  font-size: 19px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.emoji-btn:hover { background: rgba(108,92,231,0.15); border-color: var(--accent); }
.emoji-btn.active { border-color: var(--accent); background: rgba(108,92,231,0.15); }

.file-zone {
  border: 2px dashed var(--border); border-radius: 12px;
  padding: 24px; text-align: center; cursor: pointer;
  transition: all 0.2s;
}
.file-zone:hover { border-color: var(--accent); background: rgba(108,92,231,0.05); }
.file-zone .file-icon { font-size: 32px; margin-bottom: 6px; opacity: 0.4; }
.file-zone .file-text { font-size: 13px; color: var(--text-dim); }
.file-zone .file-name { font-size: 13px; color: var(--accent); margin-top: 6px; font-weight: 600; }
.file-zone input[type=file] { display: none; }

.hint { font-size: 12px; color: var(--text-dim); margin-top: 5px; }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 14px 32px; border-radius: 12px; font-size: 15px; font-weight: 700;
  cursor: pointer; border: none; font-family: inherit;
  width: 100%; margin-top: 6px;
  background: var(--accent); color: #fff;
  box-shadow: 0 4px 20px var(--accent-glow);
  transition: all 0.25s;
}
.btn:hover { filter: brightness(1.15); transform: translateY(-1px); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; filter: none; }

.msg { padding: 12px 16px; border-radius: 10px; font-size: 13px; margin-top: 14px; display: none; }
.msg-ok { background: rgba(0,210,160,0.1); color: var(--green); border: 1px solid rgba(0,210,160,0.2); }
.msg-err { background: rgba(255,107,107,0.1); color: var(--red); border: 1px solid rgba(255,107,107,0.2); }

.preview-section { margin-top: 24px; }
.preview-section h3 { font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px; }
.preview-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
}
.preview-card .pc-icon {
  width: 40px; height: 40px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 19px; margin-bottom: 10px;
}
.preview-card .pc-title { font-size: 16px; font-weight: 700; margin-bottom: 3px; }
.preview-card .pc-desc { font-size: 13px; color: var(--text-dim); }

@media (max-width: 500px) {
  .app { padding: 28px 16px 50px; }
  .form-card { padding: 24px 20px; }
}
</style>
</head>
<body>

<div class="bg">
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
</div>
<div class="bg-grid"></div>

<div class="app">
  <a href="/" class="back">← 返回首页</a>

  <div class="form-card" id="formCard">
    <h1>提交作品</h1>
    <p class="subtitle">发布你的工具、游戏、网站，所有人都会在首页看到它。<br><span id="loginHint" style="font-size:12px;color:var(--text-dim);"></span></p>

    <div class="form-group">
      <label>标题</label>
      <input type="text" id="title" placeholder="给你的作品起个名字" maxlength="30">
    </div>
    <div class="form-group">
      <label>简介</label>
      <textarea id="desc" placeholder="一句话介绍你的作品" maxlength="80"></textarea>
    </div>
    <div class="form-group">
      <label>图标</label>
      <div class="emoji-grid" id="emojiPicker"></div>
    </div>
    <div class="form-group">
      <label>主题色</label>
      <div class="color-picker" id="colorPicker"></div>
    </div>
    <div class="form-group">
      <label>链接</label>
      <input type="text" id="url" placeholder="https://... 或上传后自动生成" maxlength="200">
    </div>
    <div class="form-group">
      <label>上传项目文件（可选）</label>
      <div class="file-zone" onclick="document.getElementById('fileInput').click()">
        <div class="file-icon">📦</div>
        <div class="file-text">HTML 文件 或 ZIP 压缩包</div>
        <div class="file-name" id="fileName" style="display:none"></div>
      </div>
      <input type="file" id="fileInput" accept=".html,.htm,.zip">
      <div class="hint">单个 HTML → 直接上传 · 文件夹项目 → 打成 ZIP</div>
    </div>

    <button class="btn" id="submitBtn" onclick="submitApp()">发布到首页</button>
    <div class="msg msg-ok" id="msgOk"></div>
    <div class="msg msg-err" id="msgErr"></div>
  </div>

  <div class="preview-section">
    <h3>卡片预览</h3>
    <div class="preview-card">
      <div class="pc-icon" id="pcIcon">🎯</div>
      <div class="pc-title" id="pcTitle">作品标题</div>
      <div class="pc-desc" id="pcDesc">作品简介…</div>
    </div>
  </div>
</div>

<script>
const COLORS = ["#6c5ce7","#00d2a0","#4dabf7","#ff922b","#f06595","#ff6b6b","#ffd43b","#20c997"];
const EMOJIS = ["🎮","🎯","🧩","🎨","🎵","📝","🔧","🧮","🗺️","🎲","📊","🤖","🛠️","🎬","📸","🌐","💡","⚡","🔥","💎","🌈","🎪","🎭","🕹️"];

let selectedColor = COLORS[0], selectedEmoji = EMOJIS[0], uploadedFile = null;

// 检查登录：自动获取用户名
(async function() {
  try {
    const data = await fetch("/api/me").then(r=>r.json());
    if (data.user) {
      document.getElementById("loginHint").innerHTML = "✅ 已登录 <b>" + data.user.username + "</b>";
      document.getElementById("loginHint").style.color = "#00d2a0";
    } else {
      location.href = "/login";
    }
  } catch(e) { location.href = "/login"; }
})();

(function() {
  const p = document.getElementById("colorPicker");
  COLORS.forEach(c => {
    const d = document.createElement("div");
    d.className = "color-dot" + (c===selectedColor?" active":"");
    d.style.cssText = `background:${c};--dot-color:${c}44;`;
    d.innerHTML = '<span class="check">✓</span>';
    d.onclick = () => {
      document.querySelectorAll(".color-dot").forEach(x=>x.classList.remove("active"));
      d.classList.add("active"); selectedColor = c; updatePreview();
    };
    p.appendChild(d);
  });
})();

(function() {
  const p = document.getElementById("emojiPicker");
  EMOJIS.forEach(e => {
    const b = document.createElement("div");
    b.className = "emoji-btn" + (e===selectedEmoji?" active":"");
    b.textContent = e;
    b.onclick = () => {
      document.querySelectorAll(".emoji-btn").forEach(x=>x.classList.remove("active"));
      b.classList.add("active"); selectedEmoji = e; updatePreview();
    };
    p.appendChild(b);
  });
})();

document.getElementById("fileInput").addEventListener("change", function() {
  const f = this.files[0];
  if (!f) return;
  uploadedFile = f;
  const isZip = f.name.toLowerCase().endsWith(".zip");
  document.getElementById("fileName").textContent = (isZip?"📦":"📄") + " " + f.name + " (" + fmt(f.size) + ")" + (isZip?" 自动解压":"");
  document.getElementById("fileName").style.display = "";
  if (!document.getElementById("url").value) {
    document.getElementById("url").placeholder = isZip ? "解压后自动生成链接" : "上传后自动生成链接";
  }
});

function fmt(b) { return b>1024*1024?(b/1024/1024).toFixed(1)+"MB":(b/1024).toFixed(0)+"KB"; }

["title","desc"].forEach(id => document.getElementById(id).addEventListener("input", updatePreview));
function updatePreview() {
  document.getElementById("pcIcon").textContent = selectedEmoji;
  document.getElementById("pcIcon").style.background = selectedColor + "22";
  document.getElementById("pcIcon").style.color = selectedColor;
  document.getElementById("pcTitle").textContent = document.getElementById("title").value || "作品标题";
  document.getElementById("pcDesc").textContent = document.getElementById("desc").value || "作品简介…";
}
updatePreview();

async function submitApp() {
  const title = document.getElementById("title").value.trim();
  const desc = document.getElementById("desc").value.trim();
  let url = document.getElementById("url").value.trim();

  if (!title) return showMsg("请输入标题","err");
  if (!desc) return showMsg("请输入简介","err");
  if (!url && !uploadedFile) return showMsg("请填写链接或上传文件","err");

  const btn = document.getElementById("submitBtn");
  btn.disabled = true; btn.textContent = "提交中…";

  const fd = new FormData();
  fd.append("title",title); fd.append("desc",desc); fd.append("url",url);
  fd.append("icon",selectedEmoji); fd.append("color",selectedColor);
  if (uploadedFile) fd.append("file",uploadedFile);

  try {
    const resp = await fetch("/api/submit-app", { method: "POST", body: fd });
    if (resp.status === 401) { location.href = "/login"; return; }
    const data = await resp.json();
    if (data.ok) {
      showMsg("✅ 发布成功！返回首页即可看到","ok");
      document.getElementById("formCard").querySelectorAll("input[type=text], textarea").forEach(el=>el.value="");
      uploadedFile = null; document.getElementById("fileName").style.display = "none"; document.getElementById("fileInput").value = "";
    } else { showMsg(data.error||"发布失败","err"); }
  } catch(e) { showMsg("网络错误","err"); }
  finally { btn.disabled = false; btn.textContent = "发布到首页"; }
}

function showMsg(text, type) {
  const el = document.getElementById(type==="ok"?"msgOk":"msgErr");
  el.textContent = text; el.style.display = "block";
  document.getElementById(type==="ok"?"msgErr":"msgOk").style.display = "none";
  if (type==="ok") setTimeout(()=>{el.style.display="none";}, 5000);
}
</script>
</body>
</html>
