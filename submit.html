<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>提交作品 · HZ Lab</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sidebar-w: 212px;
  --sidebar-bg: #1c1c1e;
  --main-bg: #fafafa;
  --text: #1a1a1a;
  --text-dim: #6e6e73;
  --border: #e8e8eb;
  --hover: #f2f2f4;
}

html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--main-bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  display: flex;
}

/* ===== 侧边栏 ===== */
.sidebar {
  width: var(--sidebar-w);
  background: var(--sidebar-bg);
  color: #fff;
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; bottom: 0;
  z-index: 10;
  padding: 16px 12px;
}
.sidebar-brand {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 8px 20px;
  font-size: 15px; font-weight: 680;
  color: #fff; text-decoration: none;
}
.sidebar-brand .sb-icon {
  width: 26px; height: 26px; border-radius: 7px;
  background: #fff; color: #1c1c1e;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 800;
}

.sidebar-nav { flex: 1; display: flex; flex-direction: column; gap: 2px; }

.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 8px; border-radius: 6px;
  font-size: 13px; font-weight: 500;
  color: rgba(255,255,255,0.65);
  text-decoration: none;
  transition: all 0.12s;
}
.nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
.nav-item.active { background: rgba(255,255,255,0.1); color: #fff; }
.nav-item .ni-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }

/* ===== 主内容区 ===== */
.main {
  flex: 1; margin-left: var(--sidebar-w);
  padding: 40px 36px 80px;
  max-width: calc(560px + 72px);
}

.main-header { margin-bottom: 24px; }
.main-header h1 { font-size: 22px; font-weight: 680; letter-spacing: -0.5px; margin-bottom: 3px; }
.main-header .sub { font-size: 13px; color: var(--text-dim); }

/* ===== 表单 ===== */
.form-section {
  background: #fff; border: 1px solid var(--border);
  border-radius: 8px; padding: 28px 24px;
}

.form-group { margin-bottom: 16px; }
.form-group label {
  display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
  color: var(--text-dim); margin-bottom: 4px;
}
.form-group input, .form-group textarea {
  width: 100%; background: var(--hover); border: 1px solid var(--border);
  border-radius: 6px; padding: 9px 12px; font-size: 14px; color: var(--text);
  font-family: inherit; outline: none;
  transition: border-color 0.2s;
}
.form-group input:focus, .form-group textarea:focus { border-color: #aaa; }
.form-group textarea { resize: vertical; min-height: 60px; }

.color-picker { display: flex; gap: 8px; flex-wrap: wrap; }
.color-dot {
  width: 30px; height: 30px; border-radius: 6px; cursor: pointer;
  border: 2px solid transparent; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: rgba(255,255,255,0.7);
}
.color-dot:hover { transform: scale(1.1); }
.color-dot.active { border-color: #1a1a1a; }
.color-dot .check { opacity: 0; transition: opacity 0.15s; }
.color-dot.active .check { opacity: 1; }

.emoji-grid { display: flex; gap: 6px; flex-wrap: wrap; }
.emoji-btn {
  width: 36px; height: 36px; border-radius: 6px;
  background: var(--hover); border: 1px solid transparent;
  font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.emoji-btn:hover { background: #e5e5e7; }
.emoji-btn.active { border-color: #1a1a1a; background: #e8e8ea; }

.file-zone {
  border: 1px dashed var(--border); border-radius: 6px;
  padding: 18px; text-align: center; cursor: pointer;
  transition: all 0.15s;
}
.file-zone:hover { border-color: #aaa; background: var(--hover); }
.file-zone .file-icon { font-size: 26px; margin-bottom: 2px; opacity: 0.35; }
.file-zone .file-text { font-size: 12px; color: var(--text-dim); }
.file-zone .file-name { font-size: 12px; font-weight: 600; margin-top: 4px; }
.file-zone input[type=file] { display: none; }

.hint { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

.btn {
  width: 100%; padding: 10px; border-radius: 6px;
  border: none; background: var(--text); color: #fff;
  font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
  margin-top: 6px; transition: all 0.15s;
}
.btn:hover { filter: brightness(1.3); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; filter: none; }

.msg { padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-top: 10px; display: none; }
.msg-ok { background: rgba(107,155,109,0.06); color: #5a8a5e; }
.msg-err { background: rgba(212,87,74,0.06); color: #d4574a; }

.preview-section { margin-top: 20px; }
.preview-label { font-size: 11px; font-weight: 600; color: var(--text-dim); margin-bottom: 8px; letter-spacing: 0.5px; }
.preview-card {
  background: #fff; border: 1px solid var(--border);
  border-radius: 8px; padding: 16px;
  display: flex; align-items: center; gap: 14px;
}
.preview-card .pc-icon {
  width: 36px; height: 36px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; flex-shrink: 0;
}
.preview-card .pc-info { min-width: 0; }
.preview-card .pc-title { font-size: 14px; font-weight: 580; }
.preview-card .pc-desc { font-size: 12px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

@media (max-width: 640px) {
  body { flex-direction: column; }
  .sidebar { position: relative; width: 100%; flex-direction: row; padding: 10px 12px; overflow-x: auto; align-items: center; gap: 4px; }
  .sidebar-brand { padding: 0 8px 0 0; }
  .sidebar-nav { flex-direction: row; flex: 1; overflow-x: auto; }
  .nav-item { white-space: nowrap; font-size: 12px; padding: 6px 10px; }
  .main { margin-left: 0; padding: 24px 14px 60px; }
  .form-section { padding: 20px 16px; }
}
</style>
</head>
<body>

<aside class="sidebar">
  <a href="/" class="sidebar-brand">
    <span class="sb-icon">HZ</span>
    HZ Lab
  </a>
  <nav class="sidebar-nav" id="sidebarNav"></nav>
</aside>

<main class="main">
  <div class="main-header">
    <h1>提交作品</h1>
    <p class="sub">发布你的工具、游戏、网站，所有人都会在首页看到它</p>
  </div>

  <div class="form-section" id="formCard">
    <div class="form-group">
      <label>标题</label>
      <input type="text" id="title" placeholder="给你的作品起个名字" maxlength="30">
    </div>
    <div class="form-group">
      <label>简介</label>
      <textarea id="desc" placeholder="一句话介绍你的作品" maxlength="80"></textarea>
    </div>
    <div class="form-group">
      <label>图标</label>
      <div class="emoji-grid" id="emojiPicker"></div>
    </div>
    <div class="form-group">
      <label>主题色</label>
      <div class="color-picker" id="colorPicker"></div>
    </div>
    <div class="form-group">
      <label>链接</label>
      <input type="text" id="url" placeholder="https://... 或上传后自动生成" maxlength="200">
    </div>
    <div class="form-group">
      <label>上传项目文件（可选）</label>
      <div class="file-zone" onclick="document.getElementById('fileInput').click()">
        <div class="file-icon">📦</div>
        <div class="file-text">HTML 文件 或 ZIP 压缩包</div>
        <div class="file-name" id="fileName" style="display:none"></div>
      </div>
      <input type="file" id="fileInput" accept=".html,.htm,.zip">
      <div class="hint">单个 HTML → 直接上传 · 文件夹项目 → 打成 ZIP</div>
    </div>
    <div class="form-group">
      <label>你的名字（可选）</label>
      <input type="text" id="author" placeholder="匿名" maxlength="20">
    </div>
    <button class="btn" id="submitBtn" onclick="submitApp()">发布到首页</button>
    <div class="msg msg-ok" id="msgOk"></div>
    <div class="msg msg-err" id="msgErr"></div>
  </div>

  <div class="preview-section">
    <div class="preview-label">卡片预览</div>
    <div class="preview-card">
      <div class="pc-icon" id="pcIcon">🎯</div>
      <div class="pc-info">
        <div class="pc-title" id="pcTitle">作品标题</div>
        <div class="pc-desc" id="pcDesc">作品简介…</div>
      </div>
    </div>
  </div>
</main>

<script>
const COLORS = ["#5e6ad2","#4d7c5e","#7d8fa3","#c8893d","#d4574a","#8b7e6d","#5b8c85","#ba7a5a"];
const EMOJIS = ["🎮","🎯","🧩","🎨","🎵","📝","🔧","🧮","🗺️","🎲","📊","🤖","🛠️","🎬","📸","🌐","💡","⚡","🔥","💎","🌈","🎪","🎭","🕹️"];

let selectedColor = COLORS[0];
let selectedEmoji = EMOJIS[0];
let uploadedFile = null;

// 侧边栏
(async function loadSidebar() {
  const nav = document.getElementById("sidebarNav");
  try {
    const apps = await fetch("/apps.json").then(r=>r.json());
    apps.forEach(app => {
      const item = document.createElement("a");
      item.className = "nav-item" + (location.pathname === app.url ? " active" : "");
      item.href = app.url;
      item.innerHTML = `<span class="ni-icon">${app.icon}</span><span>${esc(app.title)}</span>`;
      nav.appendChild(item);
    });
  } catch(e) {}
})();

// 颜色
(function() {
  const p = document.getElementById("colorPicker");
  COLORS.forEach(c => {
    const d = document.createElement("div");
    d.className = "color-dot" + (c===selectedColor?" active":"");
    d.style.background = c;
    d.innerHTML = '<span class="check">✓</span>';
    d.onclick = () => {
      document.querySelectorAll(".color-dot").forEach(x=>x.classList.remove("active"));
      d.classList.add("active"); selectedColor = c; updatePreview();
    };
    p.appendChild(d);
  });
})();

// Emoji
(function() {
  const p = document.getElementById("emojiPicker");
  EMOJIS.forEach(e => {
    const b = document.createElement("div");
    b.className = "emoji-btn" + (e===selectedEmoji?" active":"");
    b.textContent = e;
    b.onclick = () => {
      document.querySelectorAll(".emoji-btn").forEach(x=>x.classList.remove("active"));
      b.classList.add("active"); selectedEmoji = e; updatePreview();
    };
    p.appendChild(b);
  });
})();

// 文件
document.getElementById("fileInput").addEventListener("change", function() {
  const f = this.files[0];
  if (!f) return;
  uploadedFile = f;
  const isZip = f.name.toLowerCase().endsWith(".zip");
  document.getElementById("fileName").textContent = (isZip?"📦":"📄") + " " + f.name + " (" + fmt(f.size) + ")" + (isZip?" 自动解压":"");
  document.getElementById("fileName").style.display = "";
  if (!document.getElementById("url").value) {
    document.getElementById("url").placeholder = isZip ? "解压后自动生成链接" : "上传后自动生成链接";
  }
});

function fmt(b) { return b>1024*1024?(b/1024/1024).toFixed(1)+"MB":(b/1024).toFixed(0)+"KB"; }

["title","desc"].forEach(id => {
  document.getElementById(id).addEventListener("input", updatePreview);
});
function updatePreview() {
  document.getElementById("pcIcon").textContent = selectedEmoji;
  document.getElementById("pcIcon").style.background = selectedColor + "18";
  document.getElementById("pcIcon").style.color = selectedColor;
  document.getElementById("pcTitle").textContent = document.getElementById("title").value || "作品标题";
  document.getElementById("pcDesc").textContent = document.getElementById("desc").value || "作品简介…";
}
updatePreview();

async function submitApp() {
  const title = document.getElementById("title").value.trim();
  const desc = document.getElementById("desc").value.trim();
  let url = document.getElementById("url").value.trim();
  const author = document.getElementById("author").value.trim();

  if (!title) return showMsg("请输入标题","err");
  if (!desc) return showMsg("请输入简介","err");
  if (!url && !uploadedFile) return showMsg("请填写链接或上传文件","err");

  const btn = document.getElementById("submitBtn");
  btn.disabled = true; btn.textContent = "提交中…";

  const fd = new FormData();
  fd.append("title", title); fd.append("desc", desc); fd.append("url", url);
  fd.append("author", author); fd.append("icon", selectedEmoji); fd.append("color", selectedColor);
  if (uploadedFile) fd.append("file", uploadedFile);

  try {
    const data = await fetch("/api/submit-app",{method:"POST",body:fd}).then(r=>r.json());
    if (data.ok) {
      showMsg("✅ 发布成功！返回首页即可看到","ok");
      document.getElementById("formCard").querySelectorAll("input[type=text], textarea").forEach(el=>el.value="");
      uploadedFile = null;
      document.getElementById("fileName").style.display = "none";
      document.getElementById("fileInput").value = "";
    } else { showMsg(data.error||"发布失败","err"); }
  } catch(e) { showMsg("网络错误","err"); }
  finally { btn.disabled = false; btn.textContent = "发布到首页"; }
}

function showMsg(text, type) {
  const el = type==="ok" ? document.getElementById("msgOk") : document.getElementById("msgErr");
  el.textContent = text; el.style.display = "block";
  document.getElementById(type==="ok"?"msgErr":"msgOk").style.display = "none";
  if (type==="ok") setTimeout(()=>{el.style.display="none";}, 5000);
}

function esc(s) { const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }
</script>
</body>
</html>
