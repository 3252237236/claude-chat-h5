<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>提交作品 · HZ Lab</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0b;
  --surface: #111;
  --surface2: #171717;
  --text: #fafafa;
  --text-dim: #888;
  --border: rgba(255,255,255,0.06);
  --radius: 8px;
}

html, body { min-height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  letter-spacing: -0.16px;
}

.bg-dots {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 32px 32px;
}

.app {
  position: relative; z-index: 1;
  max-width: 520px; margin: 0 auto;
  padding: 48px 24px 80px;
  min-height: 100vh;
}

.topbar {
  display: flex; align-items: center; gap: 24px;
  margin-bottom: 48px;
}
.topbar .logo {
  display: flex; align-items: center; gap: 8px;
  text-decoration: none; color: var(--text);
  font-size: 14px; font-weight: 500;
}
.topbar .logo-icon {
  width: 24px; height: 24px; border-radius: 5px;
  background: var(--text); color: var(--bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600;
}
.topbar .sep { color: var(--text-dim); }
.topbar .current { font-size: 14px; color: var(--text-dim); }

/* 标题 */
.page-title { margin-bottom: 32px; }
.page-title h1 { font-size: 32px; font-weight: 600; letter-spacing: -1.28px; margin-bottom: 4px; }
.page-title .sub { font-size: 14px; color: var(--text-dim); }

/* 表单卡片 */
.form-card {
  background: var(--surface);
  box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 2px 8px rgba(0,0,0,0.3);
  border-radius: var(--radius);
  padding: 28px 24px;
}

.form-group { margin-bottom: 18px; }
.form-group label {
  display: block; font-size: 11px; font-weight: 500; letter-spacing: 0.5px;
  color: var(--text-dim); margin-bottom: 5px;
}
.form-group input, .form-group textarea {
  width: 100%; background: var(--surface2); border: none;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
  border-radius: 6px; padding: 10px 12px; font-size: 14px; color: var(--text);
  font-family: inherit; outline: none;
}
.form-group input:focus, .form-group textarea:focus {
  box-shadow: 0 0 0 1px rgba(255,255,255,0.2);
}
.form-group textarea { resize: vertical; min-height: 60px; }

.color-picker { display: flex; gap: 8px; flex-wrap: wrap; }
.color-dot {
  width: 28px; height: 28px; border-radius: 6px; cursor: pointer;
  border: 2px solid transparent;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: rgba(255,255,255,0.6);
  transition: all 0.15s;
}
.color-dot:hover { transform: scale(1.1); }
.color-dot.active { border-color: var(--text); }
.color-dot .check { opacity: 0; }
.color-dot.active .check { opacity: 1; }

.emoji-grid { display: flex; gap: 6px; flex-wrap: wrap; }
.emoji-btn {
  width: 34px; height: 34px; border-radius: 6px;
  background: var(--surface2);
  box-shadow: 0 0 0 1px rgba(255,255,255,0.04);
  border: none;
  font-size: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.emoji-btn:hover { background: #222; }
.emoji-btn.active { box-shadow: 0 0 0 1px rgba(255,255,255,0.3); background: #222; }

.file-zone {
  border: 1px dashed rgba(255,255,255,0.1); border-radius: 6px;
  padding: 18px; text-align: center; cursor: pointer;
  transition: border-color 0.15s;
}
.file-zone:hover { border-color: rgba(255,255,255,0.2); }
.file-zone .file-icon { font-size: 24px; margin-bottom: 2px; opacity: 0.3; }
.file-zone .file-text { font-size: 12px; color: var(--text-dim); }
.file-zone .file-name { font-size: 12px; font-weight: 500; margin-top: 4px; }
.file-zone input[type=file] { display: none; }

.hint { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

.btn {
  width: 100%; padding: 10px; border-radius: 6px;
  border: none; background: var(--text); color: var(--bg);
  font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit;
  margin-top: 4px; transition: opacity 0.15s;
}
.btn:hover { opacity: 0.85; }
.btn:disabled { opacity: 0.3; cursor: not-allowed; }

.msg { padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-top: 10px; display: none; }
.msg-ok { background: rgba(0,210,160,0.1); color: #00d2a0; }
.msg-err { background: rgba(255,90,80,0.1); color: #ff6b60; }

/* 预览 */
.preview { margin-top: 20px; }
.preview-label { font-size: 11px; font-weight: 500; color: var(--text-dim); margin-bottom: 8px; letter-spacing: 0.5px; }
.preview-row {
  background: var(--surface);
  box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: flex; align-items: center; gap: 14px;
}
.preview-row .pv-icon {
  width: 36px; height: 36px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; flex-shrink: 0;
}
.preview-row .pv-name { font-size: 14px; font-weight: 500; }
.preview-row .pv-desc { font-size: 13px; color: var(--text-dim); }

@media (max-width: 600px) {
  .app { padding: 32px 14px 60px; }
  .page-title h1 { font-size: 24px; letter-spacing: -0.96px; }
  .form-card { padding: 20px 16px; }
}
</style>
</head>
<body>

<div class="bg-dots"></div>

<div class="app">
  <div class="topbar">
    <a href="/" class="logo">
      <span class="logo-icon">HZ</span>
      HZ Lab
    </a>
    <span class="sep">/</span>
    <span class="current">提交作品</span>
  </div>

  <div class="page-title">
    <h1>提交作品</h1>
    <p class="sub">发布你的工具、游戏、网站，所有人都会在首页看到它</p>
  </div>

  <div class="form-card" id="formCard">
    <div class="form-group">
      <label>标题</label>
      <input type="text" id="title" placeholder="给你的作品起个名字" maxlength="30">
    </div>
    <div class="form-group">
      <label>简介</label>
      <textarea id="desc" placeholder="一句话介绍你的作品" maxlength="80"></textarea>
    </div>
    <div class="form-group">
      <label>图标</label>
      <div class="emoji-grid" id="emojiPicker"></div>
    </div>
    <div class="form-group">
      <label>主题色</label>
      <div class="color-picker" id="colorPicker"></div>
    </div>
    <div class="form-group">
      <label>链接</label>
      <input type="text" id="url" placeholder="https://... 或上传后自动生成" maxlength="200">
    </div>
    <div class="form-group">
      <label>上传项目文件</label>
      <div class="file-zone" onclick="document.getElementById('fileInput').click()">
        <div class="file-icon">📦</div>
        <div class="file-text">HTML 文件 或 ZIP 压缩包</div>
        <div class="file-name" id="fileName" style="display:none"></div>
      </div>
      <input type="file" id="fileInput" accept=".html,.htm,.zip">
      <div class="hint">单个 HTML 直接上传 · 文件夹项目打成 ZIP</div>
    </div>
    <div class="form-group">
      <label>你的名字</label>
      <input type="text" id="author" placeholder="匿名" maxlength="20">
    </div>
    <button class="btn" id="submitBtn" onclick="submitApp()">发布到首页</button>
    <div class="msg msg-ok" id="msgOk"></div>
    <div class="msg msg-err" id="msgErr"></div>
  </div>

  <div class="preview">
    <div class="preview-label">卡片预览</div>
    <div class="preview-row">
      <div class="pv-icon" id="pcIcon">🎯</div>
      <div>
        <div class="pv-name" id="pcTitle">作品标题</div>
        <div class="pv-desc" id="pcDesc">作品简介…</div>
      </div>
    </div>
  </div>
</div>

<script>
const COLORS = ["#5e6ad2","#4d8c5e","#7d8fa3","#c8893d","#d4574a","#8b7e6d","#5b8c85","#ba7a5a"];
const EMOJIS = ["🎮","🎯","🧩","🎨","🎵","📝","🔧","🧮","🗺️","🎲","📊","🤖","🛠️","🎬","📸","🌐","💡","⚡","🔥","💎","🌈","🎪","🎭","🕹️"];

let selectedColor = COLORS[0], selectedEmoji = EMOJIS[0], uploadedFile = null;

(function() {
  const p = document.getElementById("colorPicker");
  COLORS.forEach(c => {
    const d = document.createElement("div");
    d.className = "color-dot" + (c===selectedColor?" active":"");
    d.style.background = c;
    d.innerHTML = '<span class="check">✓</span>';
    d.onclick = () => {
      document.querySelectorAll(".color-dot").forEach(x=>x.classList.remove("active"));
      d.classList.add("active"); selectedColor = c; updatePreview();
    };
    p.appendChild(d);
  });
})();

(function() {
  const p = document.getElementById("emojiPicker");
  EMOJIS.forEach(e => {
    const b = document.createElement("div");
    b.className = "emoji-btn" + (e===selectedEmoji?" active":"");
    b.textContent = e;
    b.onclick = () => {
      document.querySelectorAll(".emoji-btn").forEach(x=>x.classList.remove("active"));
      b.classList.add("active"); selectedEmoji = e; updatePreview();
    };
    p.appendChild(b);
  });
})();

document.getElementById("fileInput").addEventListener("change", function() {
  const f = this.files[0];
  if (!f) return;
  uploadedFile = f;
  const isZip = f.name.toLowerCase().endsWith(".zip");
  document.getElementById("fileName").textContent = (isZip?"📦":"📄") + " " + f.name + " (" + fmt(f.size) + ")" + (isZip?" 自动解压":"");
  document.getElementById("fileName").style.display = "";
  if (!document.getElementById("url").value) {
    document.getElementById("url").placeholder = isZip ? "解压后自动生成链接" : "上传后自动生成链接";
  }
});

function fmt(b) { return b>1024*1024?(b/1024/1024).toFixed(1)+"MB":(b/1024).toFixed(0)+"KB"; }

["title","desc"].forEach(id => document.getElementById(id).addEventListener("input", updatePreview));
function updatePreview() {
  document.getElementById("pcIcon").textContent = selectedEmoji;
  document.getElementById("pcIcon").style.background = selectedColor + "18";
  document.getElementById("pcIcon").style.color = selectedColor;
  document.getElementById("pcTitle").textContent = document.getElementById("title").value || "作品标题";
  document.getElementById("pcDesc").textContent = document.getElementById("desc").value || "作品简介…";
}
updatePreview();

async function submitApp() {
  const title = document.getElementById("title").value.trim();
  const desc = document.getElementById("desc").value.trim();
  let url = document.getElementById("url").value.trim();
  const author = document.getElementById("author").value.trim();
  if (!title) return showMsg("请输入标题","err");
  if (!desc) return showMsg("请输入简介","err");
  if (!url && !uploadedFile) return showMsg("请填写链接或上传文件","err");

  const btn = document.getElementById("submitBtn");
  btn.disabled = true; btn.textContent = "提交中…";

  const fd = new FormData();
  fd.append("title",title); fd.append("desc",desc); fd.append("url",url);
  fd.append("author",author); fd.append("icon",selectedEmoji); fd.append("color",selectedColor);
  if (uploadedFile) fd.append("file",uploadedFile);

  try {
    const data = await fetch("/api/submit-app",{method:"POST",body:fd}).then(r=>r.json());
    if (data.ok) {
      showMsg("发布成功！返回首页即可看到","ok");
      document.getElementById("formCard").querySelectorAll("input[type=text], textarea").forEach(el=>el.value="");
      uploadedFile = null;
      document.getElementById("fileName").style.display = "none";
      document.getElementById("fileInput").value = "";
    } else { showMsg(data.error||"发布失败","err"); }
  } catch(e) { showMsg("网络错误","err"); }
  finally { btn.disabled = false; btn.textContent = "发布到首页"; }
}

function showMsg(text, type) {
  const el = document.getElementById(type==="ok"?"msgOk":"msgErr");
  el.textContent = text; el.style.display = "block";
  document.getElementById(type==="ok"?"msgErr":"msgOk").style.display = "none";
  if (type==="ok") setTimeout(()=>{el.style.display="none";}, 5000);
}

function esc(s) { const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }
</script>
</body>
</html>
