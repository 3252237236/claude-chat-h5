<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>жЦЗдїґдїУеЇУ ¬Ј HZ Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #050505;
  --surface: #0a0a0a;
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.12);
  --text: #ffffff;
  --text-2: #a0a0a0;
  --text-3: #666666;
  --accent: #6366f1;
  --green: #22c55e;
  --orange: #f97316;
}

html {
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.1) transparent;
}

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

/* иГМжЩѓ */
.bg-anim {
  position: fixed;
  inset: 0;
  overflow: hidden;
  z-index: 0;
}

.light {
  position: fixed;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  filter: blur(150px);
  opacity: 0.06;
  pointer-events: none;
}
.light-1 { background: var(--accent); top: -100px; right: 20%; }
.light-2 { background: var(--green); bottom: -100px; left: 15%; }

.grid-overlay {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse at 50% 0%, black 30%, transparent 70%);
  -webkit-mask-image: radial-gradient(ellipse at 50% 0%, black 30%, transparent 70%);
}

/* дЄїеЃєеЩ® */
.app {
  position: relative;
  z-index: 1;
  max-width: 900px;
  margin: 0 auto;
  padding: 40px 24px 80px;
  min-height: 100vh;
}

/* е§ійГ® */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 40px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  gap: 16px;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.back-btn {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-2);
  text-decoration: none;
  font-size: 18px;
  transition: all 0.2s;
}

.back-btn:hover {
  background: rgba(255,255,255,0.08);
  color: var(--text);
  border-color: var(--border-hover);
}

.header h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.header .count {
  font-size: 14px;
  color: var(--text-3);
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}

.btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 15px rgba(99,102,241,0.3);
}

/* жЦЗдїґзљСж†Љ */
.file-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
}

.file-card {
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  text-decoration: none;
  color: inherit;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  gap: 12px;
  cursor: pointer;
}

.file-card:hover {
  background: rgba(255,255,255,0.04);
  border-color: var(--border-hover);
  transform: translateY(-2px);
}

.file-card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}

.file-icon {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}

.file-ext {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--text-3);
  padding: 4px 10px;
  border-radius: 6px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
}

.file-title {
  font-size: 15px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.file-meta {
  font-size: 12px;
  color: var(--text-3);
}

.file-actions {
  display: flex;
  gap: 8px;
  margin-top: auto;
}

.file-btn {
  flex: 1;
  padding: 8px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-2);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
  text-align: center;
  text-decoration: none;
}

.file-btn:hover {
  background: rgba(255,255,255,0.06);
  border-color: var(--border-hover);
  color: var(--text);
}

/* з©ЇзКґжАБ */
.empty {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-3);
  grid-column: 1 / -1;
}

.empty-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.5;
}

/* еЉєз™Ч */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal-overlay.show {
  display: flex;
}

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px;
  width: 100%;
  max-width: 400px;
  animation: modalIn 0.2s ease-out;
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

.modal h3 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 24px;
}

.modal-actions {
  display: flex;
  gap: 8px;
  margin-top: 24px;
}

.modal-btn {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}

.modal-btn.primary {
  background: var(--accent);
  color: white;
  border: none;
}

.modal-btn.secondary {
  background: transparent;
  color: var(--text-2);
  border: 1px solid var(--border);
}

/* еУНеЇФеЉП */
@media (max-width: 640px) {
  .app {
    padding: 20px 16px 60px;
  }

  .header h1 {
    font-size: 20px;
  }

  .file-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>

<div class="bg-anim">
  <div class="light light-1"></div>
  <div class="light light-2"></div>
</div>
<div class="grid-overlay"></div>

<div class="app">
  <div class="header">
    <div class="header-left">
      <a href="/" class="back-btn">вЖР</a>
      <div>
        <h1>рЯУБ жЦЗдїґдїУеЇУ</h1>
        <span class="count" id="fileCount">еК†иљљдЄ≠...</span>
      </div>
    </div>
    <button class="btn" onclick="showUpload()">дЄКдЉ†жЦЗдїґ</button>
  </div>

  <div class="file-grid" id="fileGrid">
    <div class="empty">
      <div class="empty-icon">рЯУБ</div>
      <p>жЪВжЧ†жЦЗдїґ</p>
    </div>
  </div>
</div>

<!-- дЄКдЉ†еЉєз™Ч -->
<div class="modal-overlay" id="uploadModal">
  <div class="modal">
    <h3>дЄКдЉ†жЦЗдїґ</h3>
    <input type="text" id="fileTitle" placeholder="жЦЗдїґж†ЗйҐШ" style="width:100%;padding:12px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;color:var(--text);margin-bottom:8px;">
    <input type="text" id="fileDesc" placeholder="жЦЗдїґжППињ∞пЉИеПѓйАЙпЉЙ" style="width:100%;padding:12px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;color:var(--text);margin-bottom:8px;">
    <input type="file" id="fileInput" style="width:100%;padding:12px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;color:var(--text);">
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="closeUpload()">еПЦжґИ</button>
      <button class="modal-btn primary" onclick="doUpload()">дЄКдЉ†</button>
    </div>
  </div>
</div>

<script>
// еК†иљљжЦЗдїґеИЧи°®
async function loadFiles() {
  try {
    const items = await fetch('/api/uploads').then(r => r.json());
    const grid = document.getElementById('fileGrid');
    const count = document.getElementById('fileCount');

    if (items && items.length > 0) {
      count.textContent = `${items.length} дЄ™жЦЗдїґ`;
      grid.innerHTML = items.map(f => {
        const ext = (f.filename || '').split('.').pop().toLowerCase();
        const icons = {
          'pdf': 'рЯУД', 'doc': 'рЯУЭ', 'docx': 'рЯУЭ', 'txt': 'рЯУГ',
          'jpg': 'рЯЦЉпЄП', 'jpeg': 'рЯЦЉпЄП', 'png': 'рЯЦЉпЄП', 'gif': 'рЯЦЉпЄП', 'webp': 'рЯЦЉпЄП',
          'mp4': 'рЯОђ', 'mp3': 'рЯОµ', 'zip': 'рЯУ¶', 'rar': 'рЯУ¶',
          'html': 'рЯМР', 'css': 'рЯО®', 'js': 'вЪ°', 'py': 'рЯРН'
        };
        const icon = icons[ext] || 'рЯУД';

        return `
          <div class="file-card">
            <div class="file-card-header">
              <div class="file-icon">${icon}</div>
              <span class="file-ext">${ext}</span>
            </div>
            <div class="file-title" title="${esc(f.title)}">${esc(f.title)}</div>
            <div class="file-meta">${formatSize(f.size)} ¬Ј ${new Date(f.time * 1000).toLocaleDateString('zh-CN')}</div>
            <div class="file-actions">
              <a href="/uploads/${f.stored}" class="file-btn" download="${esc(f.filename)}">дЄЛиљљ</a>
            </div>
          </div>
        `;
      }).join('');
    } else {
      count.textContent = '0 дЄ™жЦЗдїґ';
    }
  } catch(e) { console.error(e); }
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function showUpload() {
  document.getElementById('uploadModal').classList.add('show');
}

function closeUpload() {
  document.getElementById('uploadModal').classList.remove('show');
}

async function doUpload() {
  const title = document.getElementById('fileTitle').value.trim();
  const desc = document.getElementById('fileDesc').value.trim();
  const input = document.getElementById('fileInput');
  if (!title) { alert('иѓЈиЊУеЕ•жЦЗдїґж†ЗйҐШ'); return; }
  if (!input.files[0]) { alert('иѓЈйАЙжЛ©жЦЗдїґ'); return; }

  const formData = new FormData();
  formData.append('title', title);
  formData.append('desc', desc);
  formData.append('file', input.files[0]);

  const res = await fetch('/api/upload', {
    method: 'POST',
    body: formData
  });
  const data = await res.json();
  if (data.ok) {
    alert('жЦЗдїґеЈ≤дЄКдЉ†пЉМз≠ЙеЊЕеЃ°ж†Є');
  }

  closeUpload();
  loadFiles();
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

loadFiles();
</script>
</body>
</html>
