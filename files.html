<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文件仓库 · HZ Lab</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sidebar-w: 212px;
  --sidebar-bg: #1c1c1e;
  --main-bg: #fafafa;
  --text: #1a1a1a;
  --text-dim: #6e6e73;
  --border: #e8e8eb;
  --hover: #f2f2f4;
}

html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--main-bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  display: flex;
}

/* ===== 侧边栏 ===== */
.sidebar {
  width: var(--sidebar-w);
  background: var(--sidebar-bg);
  color: #fff;
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; bottom: 0;
  z-index: 10;
  padding: 16px 12px;
}
.sidebar-brand {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 8px 20px;
  font-size: 15px; font-weight: 680;
  color: #fff; text-decoration: none;
}
.sidebar-brand .sb-icon {
  width: 26px; height: 26px; border-radius: 7px;
  background: #fff; color: #1c1c1e;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 800;
}

.sidebar-nav { flex: 1; display: flex; flex-direction: column; gap: 2px; }

.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 8px; border-radius: 6px;
  font-size: 13px; font-weight: 500;
  color: rgba(255,255,255,0.65);
  text-decoration: none;
  transition: all 0.12s;
}
.nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
.nav-item.active { background: rgba(255,255,255,0.1); color: #fff; }
.nav-item .ni-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }

/* ===== 主内容区 ===== */
.main {
  flex: 1; margin-left: var(--sidebar-w);
  padding: 40px 36px 80px;
  max-width: calc(780px + 72px);
}

.main-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.main-header h1 { font-size: 22px; font-weight: 680; letter-spacing: -0.5px; }
.main-header .count { font-size: 13px; color: var(--text-dim); }
.main-header .left { display: flex; flex-direction: column; gap: 2px; }

/* ===== 按钮 ===== */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: 6px;
  font-size: 12px; font-weight: 580; cursor: pointer; border: none;
  background: var(--text); color: #fff;
  font-family: inherit;
  transition: all 0.15s;
}
.btn:hover { filter: brightness(1.3); }

/* ===== 文件列表 ===== */
.file-list {
  border: 1px solid var(--border);
  border-radius: 8px; overflow: hidden;
}

.file-row {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 18px;
  background: #fff;
  text-decoration: none; color: inherit;
  transition: background 0.1s;
  border-bottom: 1px solid var(--border);
}
.file-row:last-child { border-bottom: none; }
.file-row:hover { background: var(--hover); }

.file-row .fr-icon {
  width: 30px; height: 30px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0;
  background: var(--hover);
}
.file-row .fr-info { flex: 1; min-width: 0; }
.file-row .fr-name { font-size: 13px; font-weight: 530; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.file-row .fr-meta { font-size: 12px; color: var(--text-dim); }
.file-row .fr-ext {
  font-size: 10px; font-weight: 600; letter-spacing: 0.5px;
  text-transform: uppercase; color: var(--text-dim);
  padding: 2px 7px; border-radius: 4px;
  background: var(--hover); flex-shrink: 0;
}
.file-row .fr-arrow { font-size: 13px; color: var(--text-dim); flex-shrink: 0; }

/* ===== 空状态 ===== */
.empty { text-align: center; padding: 48px 20px; color: var(--text-dim); }
.empty .empty-icon { font-size: 36px; margin-bottom: 8px; opacity: 0.3; }

/* ===== 弹窗 ===== */
.overlay {
  position: fixed; inset: 0; z-index: 20;
  background: rgba(0,0,0,0.2); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.modal {
  background: #fff; border: 1px solid var(--border);
  border-radius: 8px; padding: 28px 24px;
  width: 100%; max-width: 380px;
}
.modal h2 { font-size: 18px; font-weight: 650; margin-bottom: 16px; }

.form-group { margin-bottom: 14px; }
.form-group label {
  display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
  color: var(--text-dim); margin-bottom: 4px;
}
.form-group input, .form-group textarea {
  width: 100%; background: var(--hover); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 12px; font-size: 13px; color: var(--text);
  font-family: inherit; outline: none; transition: border-color 0.2s;
}
.form-group input:focus, .form-group textarea:focus { border-color: #aaa; }
.form-group textarea { resize: vertical; min-height: 44px; }

.file-zone {
  border: 1px dashed var(--border); border-radius: 6px;
  padding: 18px; text-align: center; cursor: pointer;
  transition: all 0.15s;
}
.file-zone:hover { border-color: #aaa; background: var(--hover); }
.file-zone .fz-icon { font-size: 26px; margin-bottom: 2px; opacity: 0.35; }
.file-zone .fz-text { font-size: 12px; color: var(--text-dim); }
.file-zone .fz-name { font-size: 12px; font-weight: 600; margin-top: 4px; }
.file-zone input[type=file] { display: none; }

.btn-row { display: flex; gap: 8px; margin-top: 6px; }
.btn-cancel {
  flex: 1; padding: 8px; border-radius: 6px;
  background: var(--hover); border: 1px solid var(--border);
  color: var(--text); font-size: 13px; cursor: pointer; font-family: inherit;
}
.btn-submit {
  flex: 2; padding: 8px; border-radius: 6px; border: none;
  background: var(--text); color: #fff; font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: inherit;
}
.btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

.msg { padding: 8px 12px; border-radius: 5px; font-size: 12px; margin-top: 8px; display: none; }
.msg-err { background: rgba(212,87,74,0.06); color: #d4574a; }
.msg-ok { background: rgba(107,155,109,0.06); color: #5a8a5e; }

@media (max-width: 640px) {
  body { flex-direction: column; }
  .sidebar { position: relative; width: 100%; flex-direction: row; padding: 10px 12px; overflow-x: auto; align-items: center; gap: 4px; }
  .sidebar-brand { padding: 0 8px 0 0; }
  .sidebar-nav { flex-direction: row; flex: 1; overflow-x: auto; }
  .nav-item { white-space: nowrap; font-size: 12px; padding: 6px 10px; }
  .main { margin-left: 0; padding: 24px 14px 60px; }
}
</style>
</head>
<body>

<aside class="sidebar">
  <a href="/" class="sidebar-brand">
    <span class="sb-icon">HZ</span>
    HZ Lab
  </a>
  <nav class="sidebar-nav" id="sidebarNav"></nav>
</aside>

<main class="main">
  <div class="main-header">
    <div class="left">
      <h1>文件仓库</h1>
      <span class="count" id="fileCount">加载中…</span>
    </div>
    <button class="btn" onclick="showUpload()">上传文件</button>
  </div>

  <div class="file-list" id="fileList"></div>
</main>

<div class="overlay" id="uploadModal" style="display:none;">
  <div class="modal">
    <h2>上传文件</h2>
    <div class="form-group">
      <label>标题</label>
      <input type="text" id="uTitle" placeholder="给文件起个名字" maxlength="30">
    </div>
    <div class="form-group">
      <label>简介（可选）</label>
      <textarea id="uDesc" placeholder="一句话描述" maxlength="60"></textarea>
    </div>
    <div class="file-zone" onclick="document.getElementById('uFile').click()">
      <div class="fz-icon">📂</div>
      <div class="fz-text">点击选择文件</div>
      <div class="fz-name" id="uFileName" style="display:none"></div>
    </div>
    <input type="file" id="uFile">
    <div class="btn-row">
      <button class="btn-cancel" onclick="hideUpload()">取消</button>
      <button class="btn-submit" id="uSubmit" onclick="doUpload()">上传</button>
    </div>
    <div class="msg msg-err" id="uMsgErr"></div>
    <div class="msg msg-ok" id="uMsgOk"></div>
  </div>
</div>

<script>
const icons = {
  html:"🌐", htm:"🌐", zip:"📦", rar:"📦", "7z":"📦",
  png:"🖼️", jpg:"🖼️", jpeg:"🖼️", gif:"🖼️", svg:"🎨", webp:"🖼️",
  pdf:"📄", txt:"📝", doc:"📝", docx:"📝",
  py:"🐍", js:"📜", ts:"📜", java:"☕", jar:"☕",
  mp3:"🎵", wav:"🎵", mp4:"🎬", mov:"🎬",
  json:"📋", csv:"📊",
};
function iconFor(n) { return icons[(n||"").split(".").pop().toLowerCase()] || "📁"; }
function fmt(b) { return b>1024*1024?(b/1024/1024).toFixed(1)+" MB":(b/1024).toFixed(0)+" KB"; }

async function loadFiles() {
  const list = document.getElementById("fileList");
  try {
    const items = await fetch("/api/uploads").then(r=>r.json());
    document.getElementById("fileCount").textContent = items.length + " 个文件";
    if (!items.length) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><p>仓库还是空的，点击上方按钮上传</p></div>`;
      return;
    }
    list.innerHTML = items.map(item => {
      const ext = (item.filename||"").split(".").pop().toLowerCase();
      const time = new Date(item.time*1000);
      return `<a href="/uploads/${item.stored}" class="file-row" download>
        <div class="fr-icon">${iconFor(item.filename)}</div>
        <div class="fr-info">
          <div class="fr-name">${esc(item.title)}</div>
          <div class="fr-meta">${fmt(item.size)} · ${time.toLocaleDateString("zh-CN")}</div>
        </div>
        <span class="fr-ext">.${ext}</span>
        <span class="fr-arrow">↓</span>
      </a>`;
    }).join("");
  } catch(e) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>加载失败</p></div>`;
  }
}

// 加载侧边栏
(async function loadSidebar() {
  const nav = document.getElementById("sidebarNav");
  try {
    const apps = await fetch("/apps.json").then(r=>r.json());
    apps.forEach(app => {
      const item = document.createElement("a");
      item.className = "nav-item" + (location.pathname === app.url ? " active" : "");
      item.href = app.url;
      item.innerHTML = `<span class="ni-icon">${app.icon}</span><span>${esc(app.title)}</span>`;
      nav.appendChild(item);
    });
  } catch(e) {}
})();

let uploadFile = null;
document.getElementById("uFile").addEventListener("change", function() {
  const f = this.files[0];
  if (!f) return;
  uploadFile = f;
  document.getElementById("uFileName").textContent = f.name + " (" + fmt(f.size) + ")";
  document.getElementById("uFileName").style.display = "";
  if (!document.getElementById("uTitle").value) {
    document.getElementById("uTitle").value = f.name.replace(/\.[^.]+$/, "");
  }
});

function showUpload() {
  document.getElementById("uploadModal").style.display = "flex";
  document.getElementById("uTitle").value = "";
  document.getElementById("uDesc").value = "";
  document.getElementById("uFileName").style.display = "none";
  document.getElementById("uFile").value = "";
  document.getElementById("uMsgErr").style.display = "none";
  document.getElementById("uMsgOk").style.display = "none";
  uploadFile = null;
}
function hideUpload() { document.getElementById("uploadModal").style.display = "none"; }

async function doUpload() {
  const title = document.getElementById("uTitle").value.trim();
  const desc = document.getElementById("uDesc").value.trim();
  if (!title) { showMsg("请输入标题","err"); return; }
  if (!uploadFile) { showMsg("请选择文件","err"); return; }

  const btn = document.getElementById("uSubmit");
  btn.disabled = true; btn.textContent = "上传中…";

  const fd = new FormData(); fd.append("title", title); fd.append("desc", desc); fd.append("file", uploadFile);
  try {
    const data = await fetch("/api/upload",{method:"POST",body:fd}).then(r=>r.json());
    if (data.ok) { showMsg("✅ 上传成功","ok"); loadFiles(); setTimeout(hideUpload, 800); }
    else { showMsg(data.error||"上传失败","err"); }
  } catch(e) { showMsg("网络错误","err"); }
  finally { btn.disabled = false; btn.textContent = "上传"; }
}

function showMsg(text, type) {
  const el = type==="ok" ? document.getElementById("uMsgOk") : document.getElementById("uMsgErr");
  el.textContent = text; el.style.display = "block";
  document.getElementById(type==="ok"?"uMsgErr":"uMsgOk").style.display = "none";
}

function esc(s) { const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }

loadFiles();
</script>
</body>
</html>
