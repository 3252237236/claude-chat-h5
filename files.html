<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文件仓库 · HZ Lab</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --c-bg: #f5f1ec;
  --c-surface: rgba(255,255,255,0.55);
  --c-surface2: rgba(255,255,255,0.7);
  --c-border: rgba(0,0,0,0.06);
  --c-border2: rgba(0,0,0,0.10);
  --c-text: #3d3832;
  --c-text-dim: #9b948b;
  --c-accent: #e67e45;
  --c-red: #d4574a;
  --c-green: #6b9b6d;
  --radius: 22px;
  --radius-sm: 14px;
}

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--c-bg);
  color: var(--c-text);
  -webkit-font-smoothing: antialiased;
}

.bg-texture {
  position: fixed; inset: 0; z-index: 0;
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm15 20a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3zM8 48a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm40 10a1 1 0 1 0 0 2 1 1 0 0 0 0-2z' fill='%233d3832' opacity='.03'/%3E%3C/svg%3E");
  pointer-events: none;
}

.app {
  position: relative; z-index: 1;
  max-width: 800px; margin: 0 auto;
  padding: 40px 24px 60px;
  min-height: 100vh;
}

.back {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--c-text-dim); text-decoration: none; font-size: 14px;
  margin-bottom: 28px; transition: color 0.2s;
}
.back:hover { color: var(--c-text); }

.header {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 16px; margin-bottom: 28px;
}
.header h1 { font-size: 28px; font-weight: 740; letter-spacing: -1px; }
.header .count { font-size: 14px; color: var(--c-text-dim); }

.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 11px 22px; border-radius: 12px; font-size: 14px; font-weight: 650;
  cursor: pointer; border: none; font-family: inherit;
  transition: all 0.25s;
}
.btn-primary {
  background: var(--c-text); color: var(--c-bg);
}
.btn-primary:hover { filter: brightness(1.3); transform: translateY(-1px); }

/* 文件网格 */
.file-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px;
}

.file-card {
  background: var(--c-surface);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 1px solid var(--c-border);
  border-radius: var(--radius);
  padding: 22px 20px;
  cursor: pointer;
  transition: all 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
  text-decoration: none; color: inherit;
  display: flex; flex-direction: column; gap: 10px;
}
.file-card:hover {
  background: rgba(255,255,255,0.78);
  border-color: var(--c-border2);
  transform: translateY(-2px);
  box-shadow: 0 10px 32px rgba(0,0,0,0.05);
}
.file-card .fc-top { display: flex; align-items: flex-start; justify-content: space-between; }
.file-card .fc-icon {
  width: 44px; height: 44px; border-radius: 14px;
  background: rgba(0,0,0,0.03);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}
.file-card .fc-ext {
  font-size: 10px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--c-text-dim);
  padding: 3px 8px; border-radius: 6px;
  background: rgba(0,0,0,0.03);
}
.file-card .fc-title {
  font-size: 15px; font-weight: 650;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.file-card .fc-meta { font-size: 12px; color: var(--c-text-dim); }

.empty {
  text-align: center; padding: 60px 20px; color: var(--c-text-dim);
  grid-column: 1 / -1;
}
.empty .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
.empty p { font-size: 14px; line-height: 1.6; }

/* 上传弹窗 */
.overlay {
  position: fixed; inset: 0; z-index: 10;
  background: rgba(0,0,0,0.2); backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.modal {
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--c-border);
  border-radius: var(--radius);
  padding: 32px 28px;
  width: 100%; max-width: 420px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.1);
}
.modal h2 { font-size: 20px; font-weight: 700; margin-bottom: 20px; }

.form-group { margin-bottom: 16px; }
.form-group label {
  display: block; font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--c-text-dim); margin-bottom: 5px;
}
.form-group input, .form-group textarea {
  width: 100%; background: rgba(0,0,0,0.03); border: 1px solid var(--c-border);
  border-radius: 10px; padding: 10px 14px; font-size: 14px; color: var(--c-text);
  font-family: inherit; outline: none; transition: border-color 0.2s;
}
.form-group input:focus, .form-group textarea:focus { border-color: var(--c-accent); }
.form-group textarea { resize: vertical; min-height: 50px; }

.file-zone {
  border: 2px dashed var(--c-border2); border-radius: 12px;
  padding: 24px; text-align: center; cursor: pointer;
  transition: all 0.2s;
}
.file-zone:hover { border-color: var(--c-accent); background: rgba(230,126,69,0.04); }
.file-zone .fz-icon { font-size: 32px; margin-bottom: 6px; opacity: 0.5; }
.file-zone .fz-text { font-size: 13px; color: var(--c-text-dim); }
.file-zone .fz-name { font-size: 13px; color: var(--c-accent); margin-top: 6px; font-weight: 600; }
.file-zone input[type=file] { display: none; }

.btn-row { display: flex; gap: 10px; margin-top: 8px; }
.btn-cancel {
  flex: 1; padding: 11px; border-radius: 10px; border: 1px solid var(--c-border);
  background: transparent; color: var(--c-text); font-size: 14px; cursor: pointer;
  font-family: inherit;
}
.btn-submit {
  flex: 2; padding: 11px; border-radius: 10px; border: none;
  background: var(--c-text); color: var(--c-bg); font-size: 14px; font-weight: 650;
  cursor: pointer; font-family: inherit;
}
.btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

.msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-top: 10px; display: none; }
.msg-err { background: rgba(212,87,74,0.08); color: var(--c-red); }
.msg-ok { background: rgba(107,155,109,0.08); color: var(--c-green); }

@media (max-width: 500px) {
  .header { flex-direction: column; align-items: flex-start; }
  .file-grid { grid-template-columns: 1fr; }
  .modal { padding: 24px 20px; }
}
</style>
</head>
<body>

<div class="bg-texture"></div>

<div class="app">
  <a href="/" class="back">← 返回首页</a>

  <div class="header">
    <div>
      <h1>文件仓库</h1>
      <div class="count" id="fileCount">加载中…</div>
    </div>
    <button class="btn btn-primary" onclick="showUpload()">上传文件</button>
  </div>

  <div class="file-grid" id="fileGrid"></div>
</div>

<!-- 上传弹窗 -->
<div class="overlay" id="uploadModal" style="display:none;">
  <div class="modal">
    <h2>上传文件</h2>
    <div class="form-group">
      <label>标题</label>
      <input type="text" id="uTitle" placeholder="给文件起个名字" maxlength="30">
    </div>
    <div class="form-group">
      <label>简介（可选）</label>
      <textarea id="uDesc" placeholder="一句话描述" maxlength="60"></textarea>
    </div>
    <div class="file-zone" onclick="document.getElementById('uFile').click()">
      <div class="fz-icon">📂</div>
      <div class="fz-text">点击选择文件</div>
      <div class="fz-name" id="uFileName" style="display:none"></div>
    </div>
    <input type="file" id="uFile">
    <div class="btn-row">
      <button class="btn-cancel" onclick="hideUpload()">取消</button>
      <button class="btn-submit" id="uSubmit" onclick="doUpload()">上传</button>
    </div>
    <div class="msg msg-err" id="uMsgErr"></div>
    <div class="msg msg-ok" id="uMsgOk"></div>
  </div>
</div>

<script>
const icons = {
  html:"🌐", htm:"🌐", zip:"📦", rar:"📦", "7z":"📦",
  png:"🖼️", jpg:"🖼️", jpeg:"🖼️", gif:"🖼️", svg:"🎨", webp:"🖼️",
  pdf:"📄", txt:"📝", doc:"📝", docx:"📝",
  py:"🐍", js:"📜", ts:"📜", java:"☕", jar:"☕",
  mp3:"🎵", wav:"🎵", mp4:"🎬", mov:"🎬",
  json:"📋", csv:"📊",
};
function iconFor(n) { return icons[(n||"").split(".").pop().toLowerCase()] || "📁"; }
function fmt(b) { return b>1024*1024?(b/1024/1024).toFixed(1)+" MB":(b/1024).toFixed(0)+" KB"; }

async function loadFiles() {
  const grid = document.getElementById("fileGrid");
  try {
    const items = await fetch("/api/uploads").then(r=>r.json());
    document.getElementById("fileCount").textContent = items.length + " 个文件";
    if (!items.length) {
      grid.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><p>仓库还是空的<br>点击上方按钮上传第一个文件</p></div>`;
      return;
    }
    grid.innerHTML = items.map(item => {
      const ext = (item.filename||"").split(".").pop().toLowerCase();
      const time = new Date(item.time*1000);
      return `<a href="/uploads/${item.stored}" class="file-card" download>
        <div class="fc-top">
          <div class="fc-icon">${iconFor(item.filename)}</div>
          <div class="fc-ext">.${ext}</div>
        </div>
        <div class="fc-title" title="${esc(item.title)}">${esc(item.title)}</div>
        <div class="fc-meta">${fmt(item.size)} · ${time.toLocaleDateString("zh-CN")}</div>
      </a>`;
    }).join("");
  } catch(e) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>加载失败</p></div>`;
  }
}

let uploadFile = null;
document.getElementById("uFile").addEventListener("change", function() {
  const f = this.files[0];
  if (!f) return;
  uploadFile = f;
  document.getElementById("uFileName").textContent = f.name + " (" + fmt(f.size) + ")";
  document.getElementById("uFileName").style.display = "";
  if (!document.getElementById("uTitle").value) {
    document.getElementById("uTitle").value = f.name.replace(/\.[^.]+$/, "");
  }
});

function showUpload() {
  document.getElementById("uploadModal").style.display = "flex";
  document.getElementById("uTitle").value = "";
  document.getElementById("uDesc").value = "";
  document.getElementById("uFileName").style.display = "none";
  document.getElementById("uFile").value = "";
  document.getElementById("uMsgErr").style.display = "none";
  document.getElementById("uMsgOk").style.display = "none";
  uploadFile = null;
}
function hideUpload() { document.getElementById("uploadModal").style.display = "none"; }

async function doUpload() {
  const title = document.getElementById("uTitle").value.trim();
  const desc = document.getElementById("uDesc").value.trim();
  if (!title) { showMsg("请输入标题","err"); return; }
  if (!uploadFile) { showMsg("请选择文件","err"); return; }

  const btn = document.getElementById("uSubmit");
  btn.disabled = true; btn.textContent = "上传中…";

  const fd = new FormData();
  fd.append("title", title);
  fd.append("desc", desc);
  fd.append("file", uploadFile);

  try {
    const data = await fetch("/api/upload",{method:"POST",body:fd}).then(r=>r.json());
    if (data.ok) { showMsg("✅ 上传成功","ok"); loadFiles(); setTimeout(hideUpload, 800); }
    else { showMsg(data.error||"上传失败","err"); }
  } catch(e) { showMsg("网络错误","err"); }
  finally { btn.disabled = false; btn.textContent = "上传"; }
}

function showMsg(text, type) {
  const el = type==="ok" ? document.getElementById("uMsgOk") : document.getElementById("uMsgErr");
  el.textContent = text; el.style.display = "block";
  document.getElementById(type==="ok"?"uMsgErr":"uMsgOk").style.display = "none";
}

function esc(s) { const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }

loadFiles();
</script>
</body>
</html>
