<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文件仓库 · HZ Lab</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --surface: rgba(255,255,255,0.03);
  --surface-hover: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.06);
  --text: #e8e8f0;
  --text-dim: #8888a0;
  --accent: #6c5ce7;
  --accent-glow: rgba(108,92,231,0.3);
  --blue: #4dabf7;
  --green: #00d2a0;
  --radius: 20px;
}

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
}

.bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
.bg-orb {
  position: absolute; border-radius: 50%;
  filter: blur(120px); opacity: 0.10;
  animation: orbFloat 20s ease-in-out infinite;
}
.bg-orb:nth-child(1) {
  width: 500px; height: 500px; background: var(--accent);
  top: -150px; right: -100px; animation-delay: 0s;
}
.bg-orb:nth-child(2) {
  width: 350px; height: 350px; background: var(--green);
  bottom: -100px; left: -100px; animation-delay: -7s;
}
@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(40px, -40px) scale(1.1); }
}

.bg-grid {
  position: fixed; inset: 0; z-index: 0; opacity: 0.03;
  background-image:
    linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px);
  background-size: 60px 60px;
}

.app {
  position: relative; z-index: 1;
  max-width: 800px; margin: 0 auto;
  padding: 40px 24px 60px;
  min-height: 100vh;
}

.back {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--text-dim); text-decoration: none; font-size: 14px;
  margin-bottom: 28px; transition: color 0.2s;
}
.back:hover { color: var(--text); }

.header {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 16px; margin-bottom: 24px;
}
.header h1 { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
.header .count { font-size: 14px; color: var(--text-dim); }

.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 11px 22px; border-radius: 12px; font-size: 14px; font-weight: 700;
  cursor: pointer; border: none; font-family: inherit;
  background: var(--accent); color: #fff;
  box-shadow: 0 4px 20px var(--accent-glow);
  transition: all 0.25s;
}
.btn:hover { filter: brightness(1.15); transform: translateY(-1px); }

/* 文件网格 */
.file-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
}

.file-card {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px 20px;
  cursor: pointer;
  transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  text-decoration: none; color: inherit;
  display: flex; flex-direction: column; gap: 10px;
  overflow: hidden;
}
.file-card::before {
  content: "";
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0; transition: opacity 0.35s;
}
.file-card:hover {
  background: var(--surface-hover);
  border-color: rgba(255,255,255,0.12);
  transform: translateY(-3px);
  box-shadow: 0 16px 48px rgba(0,0,0,0.4);
}
.file-card:hover::before { opacity: 1; }
.file-card .fc-top { display: flex; align-items: flex-start; justify-content: space-between; }
.file-card .fc-icon {
  width: 44px; height: 44px; border-radius: 14px;
  background: rgba(255,255,255,0.05);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}
.file-card .fc-ext {
  font-size: 10px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--text-dim);
  padding: 3px 8px; border-radius: 6px;
  background: rgba(255,255,255,0.04);
}
.file-card .fc-title {
  font-size: 15px; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.file-card .fc-meta { font-size: 12px; color: var(--text-dim); }

.empty {
  text-align: center; padding: 60px 20px; color: var(--text-dim);
  grid-column: 1 / -1;
}
.empty .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.3; }
.empty p { font-size: 14px; line-height: 1.6; }

/* 弹窗 */
.overlay {
  position: fixed; inset: 0; z-index: 10;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.modal {
  background: #14141f; border: 1px solid var(--border);
  border-radius: var(--radius); padding: 32px 28px;
  width: 100%; max-width: 400px;
}
.modal h2 { font-size: 20px; font-weight: 700; margin-bottom: 18px; }

.form-group { margin-bottom: 15px; }
.form-group label {
  display: block; font-size: 12px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--text-dim); margin-bottom: 5px;
}
.form-group input, .form-group textarea {
  width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 14px; font-size: 14px; color: var(--text);
  font-family: inherit; outline: none; transition: border-color 0.2s;
}
.form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
.form-group textarea { resize: vertical; min-height: 50px; }

.file-zone {
  border: 2px dashed var(--border); border-radius: 12px;
  padding: 24px; text-align: center; cursor: pointer;
  transition: all 0.2s;
}
.file-zone:hover { border-color: var(--accent); background: rgba(108,92,231,0.05); }
.file-zone .fz-icon { font-size: 32px; margin-bottom: 6px; opacity: 0.4; }
.file-zone .fz-text { font-size: 13px; color: var(--text-dim); }
.file-zone .fz-name { font-size: 13px; color: var(--accent); margin-top: 6px; font-weight: 600; }
.file-zone input[type=file] { display: none; }

.btn-row { display: flex; gap: 10px; margin-top: 8px; }
.btn-cancel {
  flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border);
  background: transparent; color: var(--text); font-size: 14px; cursor: pointer;
  font-family: inherit;
}
.btn-submit {
  flex: 2; padding: 12px; border-radius: 10px; border: none;
  background: var(--accent); color: #fff; font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: inherit;
  box-shadow: 0 4px 16px var(--accent-glow);
}
.btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

.msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-top: 10px; display: none; }
.msg-err { background: rgba(255,107,107,0.1); color: #ff6b6b; border: 1px solid rgba(255,107,107,0.2); }
.msg-ok { background: rgba(0,210,160,0.1); color: var(--green); border: 1px solid rgba(0,210,160,0.2); }

@media (max-width: 500px) {
  .app { padding: 28px 16px 50px; }
  .header { flex-direction: column; align-items: flex-start; }
  .file-grid { grid-template-columns: 1fr; }
  .modal { padding: 24px 20px; }
}
</style>
</head>
<body>

<div class="bg">
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
</div>
<div class="bg-grid"></div>

<div class="app">
  <a href="/" class="back">← 返回首页</a>

  <div class="header">
    <div>
      <h1>文件仓库</h1>
      <div class="count" id="fileCount">加载中…</div>
    </div>
    <button class="btn" id="uploadBtn" onclick="checkAndUpload()">上传文件</button>
  </div>

  <div class="file-grid" id="fileGrid"></div>
</div>

<div class="overlay" id="uploadModal" style="display:none;">
  <div class="modal">
    <h2>上传文件</h2>
    <div class="form-group">
      <label>标题</label>
      <input type="text" id="uTitle" placeholder="给文件起个名字" maxlength="30">
    </div>
    <div class="form-group">
      <label>简介（可选）</label>
      <textarea id="uDesc" placeholder="一句话描述" maxlength="60"></textarea>
    </div>
    <div class="file-zone" onclick="document.getElementById('uFile').click()">
      <div class="fz-icon">📂</div>
      <div class="fz-text">点击选择文件</div>
      <div class="fz-name" id="uFileName" style="display:none"></div>
    </div>
    <input type="file" id="uFile">
    <div class="btn-row">
      <button class="btn-cancel" onclick="hideUpload()">取消</button>
      <button class="btn-submit" id="uSubmit" onclick="doUpload()">上传</button>
    </div>
    <div class="msg msg-err" id="uMsgErr"></div>
    <div class="msg msg-ok" id="uMsgOk"></div>
  </div>
</div>

<!-- 登录弹窗 -->
<div class="overlay" id="authOverlay" style="display:none;">
  <div class="modal">
    <h2 id="authTitle">登录</h2>
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="authUsername" placeholder="输入用户名" maxlength="20">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="authPassword" placeholder="输入密码" maxlength="50">
    </div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="document.getElementById('authOverlay').style.display='none'">取消</button>
      <button class="btn-submit" id="authBtn" onclick="doAuth()">登录</button>
    </div>
    <div class="msg msg-err" id="authMsg"></div>
    <div style="text-align:center;margin-top:12px;font-size:13px;color:var(--text-dim);">
      <span id="authSwitch">没有账号？<a onclick="switchAuth()" style="color:var(--accent);cursor:pointer;font-weight:600;">去注册</a></span>
    </div>
  </div>
</div>

<script>
// ===== 权限检查 =====
let authMode = "login";

async function checkAndUpload() {
  try {
    const data = await fetch("/api/me").then(r => r.json());
    if (data.user) { showUpload(); return; }
  } catch(e) {}
  showAuth("login");
}

function showAuth(mode) {
  authMode = mode;
  document.getElementById("authOverlay").style.display = "flex";
  document.getElementById("authTitle").textContent = mode === "login" ? "登录" : "注册";
  document.getElementById("authBtn").textContent = mode === "login" ? "登录" : "注册";
  document.getElementById("authSwitch").innerHTML = mode === "login"
    ? '没有账号？<a onclick="switchAuth()" style="color:var(--accent);cursor:pointer;font-weight:600;">去注册</a>'
    : '已有账号？<a onclick="switchAuth()" style="color:var(--accent);cursor:pointer;font-weight:600;">去登录</a>';
  document.getElementById("authMsg").style.display = "none";
  document.getElementById("authUsername").value = "";
  document.getElementById("authPassword").value = "";
}

function switchAuth() { showAuth(authMode === "login" ? "register" : "login"); }

async function doAuth() {
  const username = document.getElementById("authUsername").value.trim();
  const password = document.getElementById("authPassword").value.trim();
  if (!username || !password) {
    document.getElementById("authMsg").textContent = "请填写用户名和密码";
    document.getElementById("authMsg").style.display = "block";
    return;
  }
  const btn = document.getElementById("authBtn");
  btn.disabled = true; btn.textContent = "处理中…";

  const url = authMode === "login" ? "/api/login" : "/api/register";
  try {
    const data = await fetch(url, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    }).then(r => r.json());
    if (data.ok) {
      document.getElementById("authOverlay").style.display = "none";
      showUpload();
    } else {
      document.getElementById("authMsg").textContent = data.error;
      document.getElementById("authMsg").style.display = "block";
    }
  } catch(e) {
    document.getElementById("authMsg").textContent = "网络错误";
    document.getElementById("authMsg").style.display = "block";
  } finally {
    btn.disabled = false; btn.textContent = authMode === "login" ? "登录" : "注册";
  }
}

// ===== 文件图标 =====
const icons = {
  html:"🌐", htm:"🌐", zip:"📦", rar:"📦", "7z":"📦",
  png:"🖼️", jpg:"🖼️", jpeg:"🖼️", gif:"🖼️", svg:"🎨", webp:"🖼️",
  pdf:"📄", txt:"📝", doc:"📝", docx:"📝",
  py:"🐍", js:"📜", ts:"📜", java:"☕", jar:"☕",
  mp3:"🎵", wav:"🎵", mp4:"🎬", mov:"🎬",
  json:"📋", csv:"📊",
};
function iconFor(n) { return icons[(n||"").split(".").pop().toLowerCase()] || "📁"; }
function fmt(b) { return b>1024*1024?(b/1024/1024).toFixed(1)+" MB":(b/1024).toFixed(0)+" KB"; }

async function loadFiles() {
  const grid = document.getElementById("fileGrid");
  try {
    const items = await fetch("/api/uploads").then(r=>r.json());
    document.getElementById("fileCount").textContent = items.length + " 个文件";
    if (!items.length) {
      grid.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><p>仓库还是空的<br>点击上方按钮上传第一个文件</p></div>`;
      return;
    }
    grid.innerHTML = items.map(item => {
      const ext = (item.filename||"").split(".").pop().toLowerCase();
      const time = new Date(item.time*1000);
      return `<a href="/uploads/${item.stored}" class="file-card" download>
        <div class="fc-top">
          <div class="fc-icon">${iconFor(item.filename)}</div>
          <div class="fc-ext">.${ext}</div>
        </div>
        <div class="fc-title" title="${esc(item.title)}">${esc(item.title)}</div>
        <div class="fc-meta">${fmt(item.size)} · ${time.toLocaleDateString("zh-CN")}</div>
      </a>`;
    }).join("");
  } catch(e) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>加载失败</p></div>`;
  }
}

let uploadFile = null;
document.getElementById("uFile").addEventListener("change", function() {
  const f = this.files[0];
  if (!f) return;
  uploadFile = f;
  document.getElementById("uFileName").textContent = f.name + " (" + fmt(f.size) + ")";
  document.getElementById("uFileName").style.display = "";
  if (!document.getElementById("uTitle").value) {
    document.getElementById("uTitle").value = f.name.replace(/\.[^.]+$/, "");
  }
});

function showUpload() {
  document.getElementById("uploadModal").style.display = "flex";
  ["uTitle","uDesc","uFileName","uMsgErr","uMsgOk"].forEach(id => {
    const el = document.getElementById(id);
    if (id === "uFileName") { el.style.display = "none"; return; }
    if (id.startsWith("uMsg")) { el.style.display = "none"; return; }
    el.value = "";
  });
  document.getElementById("uFile").value = "";
  uploadFile = null;
}
function hideUpload() { document.getElementById("uploadModal").style.display = "none"; }

async function doUpload() {
  const title = document.getElementById("uTitle").value.trim();
  if (!title) { showMsg("请输入标题","err"); return; }
  if (!uploadFile) { showMsg("请选择文件","err"); return; }

  const btn = document.getElementById("uSubmit");
  btn.disabled = true; btn.textContent = "上传中…";

  const fd = new FormData();
  fd.append("title", title);
  fd.append("desc", document.getElementById("uDesc").value.trim());
  fd.append("file", uploadFile);

  try {
    const data = await fetch("/api/upload",{method:"POST",body:fd}).then(r=>r.json());
    if (data.ok) { showMsg("上传成功","ok"); loadFiles(); setTimeout(hideUpload, 800); }
    else { showMsg(data.error||"上传失败","err"); }
  } catch(e) { showMsg("网络错误","err"); }
  finally { btn.disabled = false; btn.textContent = "上传"; }
}

function showMsg(text, type) {
  const el = document.getElementById(type==="ok"?"uMsgOk":"uMsgErr");
  el.textContent = text; el.style.display = "block";
  document.getElementById(type==="ok"?"uMsgErr":"uMsgOk").style.display = "none";
}

function esc(s) { const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }

loadFiles();
</script>
</body>
</html>
