<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文件仓库 · HZ Lab</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0b;
  --surface: #111;
  --surface2: #171717;
  --text: #fafafa;
  --text-dim: #888;
  --border: rgba(255,255,255,0.06);
  --radius: 8px;
}

html, body { min-height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  letter-spacing: -0.16px;
}

.bg-dots {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 32px 32px;
}

.app {
  position: relative; z-index: 1;
  max-width: 720px; margin: 0 auto;
  padding: 48px 24px 80px;
  min-height: 100vh;
}

/* 顶栏 */
.topbar {
  display: flex; align-items: center; gap: 24px;
  margin-bottom: 48px;
}
.topbar .logo {
  display: flex; align-items: center; gap: 8px;
  text-decoration: none; color: var(--text);
  font-size: 14px; font-weight: 500;
}
.topbar .logo-icon {
  width: 24px; height: 24px; border-radius: 5px;
  background: var(--text); color: var(--bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600;
}
.topbar .sep { color: var(--text-dim); font-size: 14px; }
.topbar .current { font-size: 14px; color: var(--text-dim); }

/* 头部 */
.header {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-bottom: 24px; gap: 16px;
}
.header h1 { font-size: 32px; font-weight: 600; letter-spacing: -1.28px; }
.header .count { font-size: 14px; color: var(--text-dim); }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 6px;
  font-size: 13px; font-weight: 500; cursor: pointer; border: none;
  background: var(--text); color: var(--bg);
  font-family: inherit; letter-spacing: -0.1px;
  transition: opacity 0.15s;
}
.btn:hover { opacity: 0.85; }

/* 文件行 */
.file-row {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 0;
  text-decoration: none; color: inherit;
  border-bottom: 1px solid var(--border);
  transition: opacity 0.15s;
}
.file-row:first-child { border-top: 1px solid var(--border); }
.file-row:hover { opacity: 0.8; }

.file-row .fr-icon {
  width: 36px; height: 36px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; flex-shrink: 0;
  background: var(--surface2);
  box-shadow: 0 0 0 1px rgba(255,255,255,0.05);
}
.file-row .fr-info { flex: 1; min-width: 0; }
.file-row .fr-name { font-size: 14px; font-weight: 500; }
.file-row .fr-meta { font-size: 13px; color: var(--text-dim); }
.file-row .fr-ext {
  font-size: 10px; font-weight: 500; letter-spacing: 0.5px;
  text-transform: uppercase; color: var(--text-dim);
  padding: 3px 8px; border-radius: 100px;
  background: var(--surface2);
  flex-shrink: 0;
}
.file-row .fr-arrow { color: var(--text-dim); flex-shrink: 0; transition: transform 0.15s; }
.file-row:hover .fr-arrow { transform: translateX(3px); }

.empty { text-align: center; padding: 64px 20px; color: var(--text-dim); }

/* 弹窗 */
.overlay {
  position: fixed; inset: 0; z-index: 20;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.modal {
  background: var(--surface);
  box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 12px 48px rgba(0,0,0,0.5);
  border-radius: var(--radius);
  padding: 28px 24px;
  width: 100%; max-width: 380px;
}
.modal h2 { font-size: 18px; font-weight: 600; letter-spacing: -0.4px; margin-bottom: 18px; }

.form-group { margin-bottom: 14px; }
.form-group label {
  display: block; font-size: 11px; font-weight: 500; letter-spacing: 0.5px;
  color: var(--text-dim); margin-bottom: 4px;
}
.form-group input, .form-group textarea {
  width: 100%; background: var(--surface2); border: none;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
  border-radius: 6px; padding: 10px 12px; font-size: 14px; color: var(--text);
  font-family: inherit; outline: none;
}
.form-group input:focus, .form-group textarea:focus {
  box-shadow: 0 0 0 1px rgba(255,255,255,0.2);
}
.form-group textarea { resize: vertical; min-height: 44px; }

.file-zone {
  border: 1px dashed rgba(255,255,255,0.1); border-radius: 6px;
  padding: 18px; text-align: center; cursor: pointer;
  transition: border-color 0.15s;
}
.file-zone:hover { border-color: rgba(255,255,255,0.2); }
.file-zone .fz-icon { font-size: 24px; margin-bottom: 2px; opacity: 0.3; }
.file-zone .fz-text { font-size: 12px; color: var(--text-dim); }
.file-zone .fz-name { font-size: 12px; font-weight: 500; margin-top: 4px; }
.file-zone input[type=file] { display: none; }

.btn-row { display: flex; gap: 8px; margin-top: 6px; }
.btn-cancel {
  flex: 1; padding: 9px; border-radius: 6px;
  background: var(--surface2); border: none;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
  color: var(--text); font-size: 13px; cursor: pointer; font-family: inherit;
}
.btn-submit {
  flex: 2; padding: 9px; border-radius: 6px; border: none;
  background: var(--text); color: var(--bg); font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: inherit;
}
.btn-submit:disabled { opacity: 0.3; cursor: not-allowed; }

.msg { padding: 8px 12px; border-radius: 5px; font-size: 12px; margin-top: 8px; display: none; }
.msg-err { background: rgba(255,90,80,0.1); color: #ff6b60; }
.msg-ok { background: rgba(0,210,160,0.1); color: #00d2a0; }

@media (max-width: 600px) {
  .app { padding: 32px 14px 60px; }
  .header { flex-direction: column; align-items: flex-start; }
  .header h1 { font-size: 24px; letter-spacing: -0.96px; }
}
</style>
</head>
<body>

<div class="bg-dots"></div>

<div class="app">
  <div class="topbar">
    <a href="/" class="logo">
      <span class="logo-icon">HZ</span>
      HZ Lab
    </a>
    <span class="sep">/</span>
    <span class="current">文件仓库</span>
  </div>

  <div class="header">
    <div>
      <h1>文件仓库</h1>
      <div class="count" id="fileCount">加载中…</div>
    </div>
    <button class="btn" onclick="showUpload()">上传文件</button>
  </div>

  <div id="fileList"></div>
</div>

<div class="overlay" id="uploadModal" style="display:none;">
  <div class="modal">
    <h2>上传文件</h2>
    <div class="form-group">
      <label>标题</label>
      <input type="text" id="uTitle" placeholder="给文件起个名字" maxlength="30">
    </div>
    <div class="form-group">
      <label>简介</label>
      <textarea id="uDesc" placeholder="可选描述" maxlength="60"></textarea>
    </div>
    <div class="file-zone" onclick="document.getElementById('uFile').click()">
      <div class="fz-icon">📂</div>
      <div class="fz-text">点击选择文件</div>
      <div class="fz-name" id="uFileName" style="display:none"></div>
    </div>
    <input type="file" id="uFile">
    <div class="btn-row">
      <button class="btn-cancel" onclick="hideUpload()">取消</button>
      <button class="btn-submit" id="uSubmit" onclick="doUpload()">上传</button>
    </div>
    <div class="msg msg-err" id="uMsgErr"></div>
    <div class="msg msg-ok" id="uMsgOk"></div>
  </div>
</div>

<script>
const icons = {
  html:"🌐", htm:"🌐", zip:"📦", rar:"📦", "7z":"📦",
  png:"🖼️", jpg:"🖼️", jpeg:"🖼️", gif:"🖼️", svg:"🎨", webp:"🖼️",
  pdf:"📄", txt:"📝", doc:"📝", docx:"📝",
  py:"🐍", js:"📜", ts:"📜", java:"☕", jar:"☕",
  mp3:"🎵", wav:"🎵", mp4:"🎬", mov:"🎬",
  json:"📋", csv:"📊",
};
function iconFor(n) { return icons[(n||"").split(".").pop().toLowerCase()] || "📁"; }
function fmt(b) { return b>1024*1024?(b/1024/1024).toFixed(1)+" MB":(b/1024).toFixed(0)+" KB"; }

async function loadFiles() {
  const el = document.getElementById("fileList");
  try {
    const items = await fetch("/api/uploads").then(r=>r.json());
    document.getElementById("fileCount").textContent = items.length + " 个文件";
    if (!items.length) {
      el.innerHTML = `<div class="empty"><p>仓库还是空的，点击上方按钮上传</p></div>`;
      return;
    }
    el.innerHTML = items.map(item => {
      const ext = (item.filename||"").split(".").pop().toLowerCase();
      const time = new Date(item.time*1000);
      return `<a href="/uploads/${item.stored}" class="file-row" download>
        <div class="fr-icon">${iconFor(item.filename)}</div>
        <div class="fr-info">
          <div class="fr-name">${esc(item.title)}</div>
          <div class="fr-meta">${fmt(item.size)} · ${time.toLocaleDateString("zh-CN")}</div>
        </div>
        <span class="fr-ext">.${ext}</span>
        <span class="fr-arrow">↓</span>
      </a>`;
    }).join("");
  } catch(e) { el.innerHTML = `<div class="empty"><p>加载失败</p></div>`; }
}

let uploadFile = null;
document.getElementById("uFile").addEventListener("change", function() {
  const f = this.files[0];
  if (!f) return;
  uploadFile = f;
  document.getElementById("uFileName").textContent = f.name + " (" + fmt(f.size) + ")";
  document.getElementById("uFileName").style.display = "";
  if (!document.getElementById("uTitle").value) {
    document.getElementById("uTitle").value = f.name.replace(/\.[^.]+$/, "");
  }
});

function showUpload() {
  document.getElementById("uploadModal").style.display = "flex";
  ["uTitle","uDesc","uFileName","uMsgErr","uMsgOk"].forEach(id => {
    const el = document.getElementById(id);
    if (id === "uFileName") { el.style.display = "none"; return; }
    if (id.startsWith("uMsg")) { el.style.display = "none"; return; }
    el.value = "";
  });
  document.getElementById("uFile").value = "";
  uploadFile = null;
}
function hideUpload() { document.getElementById("uploadModal").style.display = "none"; }

async function doUpload() {
  const title = document.getElementById("uTitle").value.trim();
  if (!title) { showMsg("请输入标题","err"); return; }
  if (!uploadFile) { showMsg("请选择文件","err"); return; }

  const btn = document.getElementById("uSubmit");
  btn.disabled = true; btn.textContent = "上传中…";

  const fd = new FormData();
  fd.append("title", title);
  fd.append("desc", document.getElementById("uDesc").value.trim());
  fd.append("file", uploadFile);

  try {
    const data = await fetch("/api/upload",{method:"POST",body:fd}).then(r=>r.json());
    if (data.ok) { showMsg("上传成功","ok"); loadFiles(); setTimeout(hideUpload, 800); }
    else { showMsg(data.error||"上传失败","err"); }
  } catch(e) { showMsg("网络错误","err"); }
  finally { btn.disabled = false; btn.textContent = "上传"; }
}

function showMsg(text, type) {
  const el = document.getElementById(type==="ok"?"uMsgOk":"uMsgErr");
  el.textContent = text; el.style.display = "block";
  document.getElementById(type==="ok"?"uMsgErr":"uMsgOk").style.display = "none";
}

function esc(s) { const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }

loadFiles();
</script>
</body>
</html>
