<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HZ Lab</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* 颜色系统 */
  --bg: #09090b;
  --surface: rgba(255,255,255,0.04);
  --surface-hover: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.15);
  --text: #fafafa;
  --text-secondary: #a1a1aa;
  --text-muted: #71717a;
  --accent: #7c3aed;
  --accent-hover: #8b5cf6;
  --accent-glow: rgba(124,58,237,0.25);
  --green: #10b981;
  --blue: #3b82f6;
  --red: #ef4444;

  /* 间距系统 */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* 圆角系统 */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-2xl: 24px;
  --radius-full: 9999px;

  /* 阴影系统 */
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.3), 0 4px 6px -4px rgba(0,0,0,0.3);
  --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.3), 0 8px 10px -6px rgba(0,0,0,0.3);
  --shadow-glow: 0 0 40px var(--accent-glow);

  /* 过渡系统 */
  --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-slow: 350ms cubic-bezier(0.4, 0, 0.2, 1);

  /* 字体系统 */
  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
}

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

html, body {
  height: 100%;
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

/* ===== 背景光晕 ===== */
.bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
.bg-orb {
  position: absolute; border-radius: 50%;
  filter: blur(120px); opacity: 0.12;
  animation: orbFloat 20s ease-in-out infinite;
}
.bg-orb:nth-child(1) {
  width: 600px; height: 600px; background: var(--accent);
  top: -200px; left: -100px; animation-delay: 0s;
}
.bg-orb:nth-child(2) {
  width: 400px; height: 400px; background: var(--blue);
  bottom: -100px; right: -100px; animation-delay: -7s;
}
.bg-orb:nth-child(3) {
  width: 300px; height: 300px; background: var(--green);
  top: 50%; left: 50%; animation-delay: -14s; opacity: 0.06;
}

.bg-grid {
  position: fixed; inset: 0; z-index: 0; opacity: 0.03;
  background-image:
    linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* ===== 噪点纹理 ===== */
.bg-noise {
  position: fixed; inset: 0; z-index: 0;
  opacity: 0.015;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 256px 256px;
  pointer-events: none;
}

/* ===== 自定义滚动条 ===== */
::-webkit-scrollbar {
  width: 8px;
  height: 8px;
}
::-webkit-scrollbar-track {
  background: rgba(255,255,255,0.02);
}
::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.1);
  border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover {
  background: rgba(255,255,255,0.2);
}

/* ===== 页面动画 ===== */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes scaleIn {
  from {
    opacity: 0;
    transform: scale(0.9);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}

@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); }
  25% { transform: translate(60px, -40px) scale(1.1) rotate(5deg); }
  50% { transform: translate(-30px, -80px) scale(0.9) rotate(-3deg); }
  75% { transform: translate(-50px, 30px) scale(1.05) rotate(2deg); }
}

/* ===== 主体 ===== */
.container {
  position: relative; z-index: 1;
  height: 100%; display: flex; align-items: center; justify-content: center;
  padding: var(--space-6);
  animation: fadeIn 0.6s ease-out;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-2xl);
  padding: var(--space-12) var(--space-10) var(--space-10);
  width: 100%; max-width: 400px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  animation: scaleIn 0.6s ease-out 0.1s both;
  transition: all var(--transition-base);
  box-shadow: var(--shadow-xl);
}
.card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-xl), 0 0 40px var(--accent-glow);
  border-color: var(--border-hover);
}

.logo {
  display: flex; align-items: center; justify-content: center; gap: var(--space-3);
  margin-bottom: var(--space-10);
  animation: fadeInUp 0.6s ease-out 0.2s both;
}
.logo-icon {
  width: 48px; height: 48px;
  background: linear-gradient(135deg, var(--accent), var(--blue));
  border-radius: var(--radius-lg);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  box-shadow: var(--shadow-glow);
  transition: all var(--transition-base);
}
.logo-icon:hover {
  transform: scale(1.05) rotate(3deg);
  box-shadow: 0 0 50px var(--accent-glow);
}
.logo-text {
  font-size: 24px; font-weight: 700; letter-spacing: -0.5px;
}

.subtitle {
  text-align: center; font-size: 14px; color: var(--text-secondary);
  margin-bottom: var(--space-8); line-height: 1.6;
  animation: fadeInUp 0.6s ease-out 0.3s both;
  font-weight: 400;
}

/* ===== 切换标签 ===== */
.tabs {
  display: flex; gap: 0; margin-bottom: var(--space-8);
  background: var(--surface); border-radius: var(--radius-lg);
  padding: 4px;
  animation: fadeInUp 0.6s ease-out 0.4s both;
  border: 1px solid var(--border);
}
.tab {
  flex: 1; padding: 10px; border-radius: var(--radius-md); text-align: center;
  font-size: 14px; font-weight: 500; cursor: pointer;
  color: var(--text-secondary); border: none; background: transparent;
  font-family: inherit; transition: all var(--transition-fast);
  position: relative;
  overflow: hidden;
}
.tab::before {
  content: "";
  position: absolute;
  inset: 0;
  background: var(--accent);
  border-radius: var(--radius-md);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform var(--transition-base);
  z-index: -1;
}
.tab.active::before {
  transform: scaleX(1);
}
.tab.active { color: #fff; font-weight: 600; }

/* ===== 表单 ===== */
.field {
  margin-bottom: var(--space-4);
  animation: fadeInUp 0.6s ease-out 0.5s both;
}
.field input {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 14px 18px; font-size: 14px; color: var(--text);
  font-family: inherit; outline: none; transition: all var(--transition-base);
  font-weight: 400;
}
.field input:focus {
  border-color: var(--accent);
  background: var(--surface-hover);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.field input::placeholder { color: var(--text-muted); }

.btn {
  width: 100%; padding: 14px; border-radius: var(--radius-lg); border: none;
  background: var(--accent); color: #fff;
  font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;
  box-shadow: var(--shadow-glow);
  transition: all var(--transition-base); margin-top: var(--space-2);
  animation: fadeInUp 0.6s ease-out 0.6s both;
  position: relative;
  overflow: hidden;
  letter-spacing: 0.3px;
}
.btn::before {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  background: rgba(255,255,255,0.2);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: width 0.6s ease, height 0.6s ease;
}
.btn:hover {
  filter: brightness(1.15);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px var(--accent-glow);
}
.btn:hover::before {
  width: 300px;
  height: 300px;
}
.btn:active {
  transform: translateY(0);
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; filter: none; }

.msg {
  text-align: center; padding: 10px 14px; border-radius: 8px;
  font-size: 13px; margin-top: 14px; display: none;
  animation: fadeInUp 0.3s ease-out;
}
.msg-err { background: rgba(255,107,107,0.1); color: #ff6b6b; border: 1px solid rgba(255,107,107,0.2); }

@media (max-width: 420px) {
  .card { padding: 32px 24px 28px; border-radius: 20px; }
}
</style>
</head>
<body>

<div class="bg">
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
</div>
<div class="bg-grid"></div>
<div class="bg-noise"></div>

<div class="container">
  <div class="card">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <span class="logo-text">HZ Lab</span>
    </div>
    <p class="subtitle">探索 AI 与工具的无限可能</p>

    <div class="tabs">
      <button class="tab active" id="tabLogin" onclick="switchTab('login')">登录</button>
      <button class="tab" id="tabRegister" onclick="switchTab('register')">注册</button>
    </div>

    <div class="field">
      <input type="text" id="username" placeholder="用户名" maxlength="20" autocomplete="username">
    </div>
    <div class="field">
      <input type="password" id="password" placeholder="密码" maxlength="50" autocomplete="current-password">
    </div>

    <button class="btn" id="submitBtn" onclick="doSubmit()">登录</button>
    <div class="msg msg-err" id="msg"></div>
  </div>
</div>

<script>
let mode = "login";

function switchTab(m) {
  mode = m;
  document.getElementById("tabLogin").classList.toggle("active", m === "login");
  document.getElementById("tabRegister").classList.toggle("active", m === "register");
  document.getElementById("submitBtn").textContent = m === "login" ? "登录" : "注册";
  document.getElementById("msg").style.display = "none";
}

async function doSubmit() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!username || !password) {
    showMsg("请填写用户名和密码"); return;
  }

  const btn = document.getElementById("submitBtn");
  btn.disabled = true; btn.textContent = "处理中…";

  const url = mode === "login" ? "/api/login" : "/api/register";
  try {
    const data = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    }).then(r => r.json());

    if (data.ok) {
      // 登录成功，跳转到首页
      location.href = "/";
    } else {
      showMsg(data.error);
    }
  } catch(e) {
    showMsg("网络错误，请稍后再试");
  } finally {
    btn.disabled = false;
    btn.textContent = mode === "login" ? "登录" : "注册";
  }
}

function showMsg(text) {
  document.getElementById("msg").textContent = text;
  document.getElementById("msg").style.display = "block";
}

// Enter 键提交
document.addEventListener("keydown", function(e) {
  if (e.key === "Enter") doSubmit();
});
</script>
</body>
</html>
