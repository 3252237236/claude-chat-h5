<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HZ Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f8fafc;
  --surface: #ffffff;
  --border: rgba(0,0,0,0.12);
  --border-hover: rgba(255,255,255,0.15);
  --text: #0f172a;
  --text-2: #475569;
  --text-3: #94a3b8;
  --accent: #6366f1;
  --accent-2: #818cf8;
  --accent-glow: rgba(99,102,241,0.2);
  --green: #16a34a;
  --red: #ef4444;
}

html, body {
  height: 100%;
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ===== 背景 ===== */
.bg-anim {
  position: fixed;
  inset: 0;
  overflow: hidden;
}

.bg-anim::before {
  content: '';
  position: absolute;
  width: 200%;
  height: 200%;
  top: -50%;
  left: -50%;
  background: conic-gradient(
    from 0deg at 50% 50%,
    transparent 0deg,
    rgba(99,102,241,0.04) 60deg,
    transparent 120deg,
    rgba(236,72,153,0.04) 180deg,
    transparent 240deg,
    rgba(59,130,246,0.04) 300deg,
    transparent 360deg
  );
  animation: rotate 20s linear infinite;
}

@keyframes rotate {
  to { transform: rotate(360deg); }
}

.light {
  position: fixed;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  filter: blur(150px);
  opacity: 0.1;
  pointer-events: none;
}
.light-1 { background: var(--accent); top: -150px; left: 30%; animation: float 15s ease-in-out infinite; }
.light-2 { background: var(--pink); bottom: -150px; right: 20%; animation: float 20s ease-in-out infinite reverse; }

@keyframes float {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(50px, 30px); }
}

.grid-overlay {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse at 50% 50%, black 20%, transparent 70%);
  -webkit-mask-image: radial-gradient(ellipse at 50% 50%, black 20%, transparent 70%);
}

.noise {
  position: fixed;
  inset: 0;
  opacity: 0.02;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
}

/* ===== 主容器 ===== */
.container {
  position: relative;
  z-index: 1;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

/* ===== 登录卡片 ===== */
.card {
  width: 100%;
  max-width: 420px;
  background: rgba(10,10,10,0.8);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 48px 40px;
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  animation: cardIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,0,0,0.15), transparent);
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(30px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* Logo */
.logo {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  margin-bottom: 40px;
}

.logo-icon {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, var(--accent), #ec4899);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  position: relative;
  animation: logoFloat 3s ease-in-out infinite;
}

.logo-icon::after {
  content: '';
  position: absolute;
  inset: -4px;
  background: linear-gradient(135deg, var(--accent), #ec4899);
  border-radius: 20px;
  z-index: -1;
  opacity: 0.3;
  filter: blur(15px);
}

@keyframes logoFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}

.logo-text {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -1px;
}

.logo-desc {
  font-size: 14px;
  color: var(--text-2);
  text-align: center;
}

/* 标签切换 */
.tabs {
  display: flex;
  gap: 4px;
  padding: 4px;
  background: rgba(0,0,0,0.03);
  border-radius: 12px;
  margin-bottom: 32px;
  border: 1px solid var(--border);
}

.tab {
  flex: 1;
  padding: 10px;
  border: none;
  background: transparent;
  color: var(--text-3);
  font-size: 14px;
  font-weight: 500;
  border-radius: 8px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}

.tab.active {
  background: var(--accent);
  color: white;
  box-shadow: 0 2px 10px rgba(99,102,241,0.3);
}

.tab:hover:not(.active) {
  color: var(--text-2);
  background: rgba(0,0,0,0.03);
}

/* 表单 */
.form {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.field {
  position: relative;
}

.field input {
  width: 100%;
  padding: 14px 16px;
  background: rgba(0,0,0,0.04);
  border: 1px solid var(--border);
  box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  border-radius: 12px;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: all 0.2s;
}

.field input:focus {
  border-color: var(--accent);
  background: rgba(99,102,241,0.05);
  box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
}

.field input::placeholder {
  color: var(--text-3);
}

.btn {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
  margin-top: 8px;
}

.btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent, rgba(0,0,0,0.15));
  opacity: 0;
  transition: opacity 0.2s;
}

.btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 25px rgba(99,102,241,0.3);
}

.btn:hover::before {
  opacity: 1;
}

.btn:active {
  transform: translateY(0);
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.msg {
  text-align: center;
  padding: 12px;
  border-radius: 10px;
  font-size: 13px;
  display: none;
  animation: fadeIn 0.2s;
}

.msg-err {
  background: rgba(239,68,68,0.1);
  color: #fca5a5;
  border: 1px solid rgba(239,68,68,0.2);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-5px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 底部 */
.footer {
  text-align: center;
  margin-top: 32px;
  font-size: 12px;
  color: var(--text-3);
}

/* 响应式 */
@media (max-width: 480px) {
  .card {
    padding: 36px 24px;
    border-radius: 20px;
  }

  .logo-icon {
    width: 48px;
    height: 48px;
    font-size: 24px;
  }

  .logo-text {
    font-size: 24px;
  }
}
</style>
</head>
<body>

<div class="bg-anim">
  <div class="light light-1"></div>
  <div class="light light-2"></div>
</div>
<div class="grid-overlay"></div>
<div class="noise"></div>

<div class="container">
  <div class="card">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <span class="logo-text">HZ Lab</span>
      <span class="logo-desc">探索 AI 与工具的无限可能</span>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">登录</button>
      <button class="tab" onclick="switchTab('register')">注册</button>
    </div>

    <form class="form" onsubmit="doSubmit(event)">
      <div class="field">
        <input type="text" id="username" placeholder="用户名" maxlength="20" autocomplete="username" required>
      </div>
      <div class="field">
        <input type="password" id="password" placeholder="密码" maxlength="50" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn" id="submitBtn">登录</button>
    </form>

    <div class="msg msg-err" id="msg"></div>

    <div class="footer">
      © 2026 HZ Lab
    </div>
  </div>
</div>

<script>
let mode = "login";

function switchTab(m) {
  mode = m;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('submitBtn').textContent = m === 'login' ? '登录' : '注册';
  document.getElementById('msg').style.display = 'none';
}

async function doSubmit(e) {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();

  if (!username || !password) {
    showMsg('请填写用户名和密码');
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '处理中...';

  try {
    const url = mode === 'login' ? '/api/login' : '/api/register';
    const data = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    }).then(r => r.json());

    if (data.ok) {
      location.href = '/';
    } else {
      showMsg(data.error);
    }
  } catch(e) {
    showMsg('网络错误，请稍后再试');
  } finally {
    btn.disabled = false;
    btn.textContent = mode === 'login' ? '登录' : '注册';
  }
}

function showMsg(text) {
  const msg = document.getElementById('msg');
  msg.textContent = text;
  msg.style.display = 'block';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doSubmit(e);
});
</script>
</body>
</html>
