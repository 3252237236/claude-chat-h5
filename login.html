<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HZ Lab</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --surface: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.08);
  --text: #e8e8f0;
  --text-dim: #8888a0;
  --accent: #6c5ce7;
  --accent-glow: rgba(108,92,231,0.3);
  --green: #00d2a0;
  --blue: #4dabf7;
}

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

/* ===== 背景光晕 ===== */
.bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
.bg-orb {
  position: absolute; border-radius: 50%;
  filter: blur(120px); opacity: 0.12;
  animation: orbFloat 20s ease-in-out infinite;
}
.bg-orb:nth-child(1) {
  width: 600px; height: 600px; background: var(--accent);
  top: -200px; left: -100px; animation-delay: 0s;
}
.bg-orb:nth-child(2) {
  width: 400px; height: 400px; background: var(--blue);
  bottom: -100px; right: -100px; animation-delay: -7s;
}
.bg-orb:nth-child(3) {
  width: 300px; height: 300px; background: var(--green);
  top: 50%; left: 50%; animation-delay: -14s; opacity: 0.06;
}
@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(60px, -40px) scale(1.1); }
  50% { transform: translate(-30px, -80px) scale(0.9); }
  75% { transform: translate(-50px, 30px) scale(1.05); }
}

.bg-grid {
  position: fixed; inset: 0; z-index: 0; opacity: 0.03;
  background-image:
    linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* ===== 主体 ===== */
.container {
  position: relative; z-index: 1;
  height: 100%; display: flex; align-items: center; justify-content: center;
  padding: 24px;
}

.card {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 24px;
  padding: 44px 36px 36px;
  width: 100%; max-width: 380px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.logo {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  margin-bottom: 32px;
}
.logo-icon {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, var(--accent), var(--blue));
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  box-shadow: 0 0 30px var(--accent-glow);
}
.logo-text {
  font-size: 22px; font-weight: 700; letter-spacing: -0.5px;
}

.subtitle {
  text-align: center; font-size: 13px; color: var(--text-dim);
  margin-bottom: 24px; line-height: 1.6;
}

/* ===== 切换标签 ===== */
.tabs {
  display: flex; gap: 0; margin-bottom: 24px;
  background: rgba(255,255,255,0.03); border-radius: 12px;
  padding: 3px;
}
.tab {
  flex: 1; padding: 9px; border-radius: 10px; text-align: center;
  font-size: 13px; font-weight: 600; cursor: pointer;
  color: var(--text-dim); border: none; background: transparent;
  font-family: inherit; transition: all 0.25s;
}
.tab.active { background: var(--accent); color: #fff; }

/* ===== 表单 ===== */
.field { margin-bottom: 16px; }
.field input {
  width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px; padding: 13px 16px; font-size: 14px; color: var(--text);
  font-family: inherit; outline: none; transition: border-color 0.25s;
}
.field input:focus { border-color: var(--accent); }
.field input::placeholder { color: rgba(255,255,255,0.2); }

.btn {
  width: 100%; padding: 13px; border-radius: 12px; border: none;
  background: var(--accent); color: #fff;
  font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;
  box-shadow: 0 4px 20px var(--accent-glow);
  transition: all 0.25s; margin-top: 4px;
}
.btn:hover { filter: brightness(1.15); transform: translateY(-1px); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; filter: none; }

.msg {
  text-align: center; padding: 10px 14px; border-radius: 8px;
  font-size: 13px; margin-top: 14px; display: none;
}
.msg-err { background: rgba(255,107,107,0.1); color: #ff6b6b; border: 1px solid rgba(255,107,107,0.2); }

@media (max-width: 420px) {
  .card { padding: 32px 24px 28px; border-radius: 20px; }
}
</style>
</head>
<body>

<div class="bg">
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
</div>
<div class="bg-grid"></div>

<div class="container">
  <div class="card">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <span class="logo-text">HZ Lab</span>
    </div>
    <p class="subtitle">探索 AI 与工具的无限可能</p>

    <div class="tabs">
      <button class="tab active" id="tabLogin" onclick="switchTab('login')">登录</button>
      <button class="tab" id="tabRegister" onclick="switchTab('register')">注册</button>
    </div>

    <div class="field">
      <input type="text" id="username" placeholder="用户名" maxlength="20" autocomplete="username">
    </div>
    <div class="field">
      <input type="password" id="password" placeholder="密码" maxlength="50" autocomplete="current-password">
    </div>

    <button class="btn" id="submitBtn" onclick="doSubmit()">登录</button>
    <div class="msg msg-err" id="msg"></div>
  </div>
</div>

<script>
let mode = "login";

function switchTab(m) {
  mode = m;
  document.getElementById("tabLogin").classList.toggle("active", m === "login");
  document.getElementById("tabRegister").classList.toggle("active", m === "register");
  document.getElementById("submitBtn").textContent = m === "login" ? "登录" : "注册";
  document.getElementById("msg").style.display = "none";
}

async function doSubmit() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!username || !password) {
    showMsg("请填写用户名和密码"); return;
  }

  const btn = document.getElementById("submitBtn");
  btn.disabled = true; btn.textContent = "处理中…";

  const url = mode === "login" ? "/api/login" : "/api/register";
  try {
    const data = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    }).then(r => r.json());

    if (data.ok) {
      // 登录成功，跳转到首页
      location.href = "/";
    } else {
      showMsg(data.error);
    }
  } catch(e) {
    showMsg("网络错误，请稍后再试");
  } finally {
    btn.disabled = false;
    btn.textContent = mode === "login" ? "登录" : "注册";
  }
}

function showMsg(text) {
  document.getElementById("msg").textContent = text;
  document.getElementById("msg").style.display = "block";
}

// Enter 键提交
document.addEventListener("keydown", function(e) {
  if (e.key === "Enter") doSubmit();
});
</script>
</body>
</html>
