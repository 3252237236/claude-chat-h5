<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>好友 - HZ Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #050505;
  --surface: #0a0a0a;
  --surface-2: #111111;
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.12);
  --text: #ffffff;
  --text-2: #a0a0a0;
  --text-3: #666666;
  --accent: #6366f1;
  --green: #22c55e;
  --orange: #f97316;
  --blue: #3b82f6;
}

html {
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.1) transparent;
}

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

/* 背景 */
.bg-anim {
  position: fixed;
  inset: 0;
  overflow: hidden;
  z-index: 0;
}

.light {
  position: fixed;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  filter: blur(150px);
  opacity: 0.06;
  pointer-events: none;
}
.light-1 { background: var(--accent); top: -100px; left: 20%; }
.light-2 { background: var(--blue); bottom: -100px; right: 15%; }

.grid-overlay {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse at 50% 0%, black 30%, transparent 70%);
  -webkit-mask-image: radial-gradient(ellipse at 50% 0%, black 30%, transparent 70%);
}

/* 主容器 */
.app {
  position: relative;
  z-index: 1;
  max-width: 800px;
  margin: 0 auto;
  padding: 40px 24px 80px;
  min-height: 100vh;
}

/* 头部 */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 40px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}

.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.back-btn {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-2);
  text-decoration: none;
  font-size: 18px;
  transition: all 0.2s;
}

.back-btn:hover {
  background: rgba(255,255,255,0.08);
  color: var(--text);
  border-color: var(--border-hover);
}

.header h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

/* 标签切换 */
.tabs {
  display: flex;
  gap: 4px;
  padding: 4px;
  background: rgba(255,255,255,0.03);
  border-radius: 12px;
  margin-bottom: 32px;
  border: 1px solid var(--border);
}

.tab {
  flex: 1;
  padding: 10px 16px;
  border: none;
  background: transparent;
  color: var(--text-3);
  font-size: 13px;
  font-weight: 500;
  border-radius: 8px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}

.tab.active {
  background: var(--accent);
  color: white;
}

.tab:hover:not(.active) {
  color: var(--text-2);
  background: rgba(255,255,255,0.03);
}

.tab .badge {
  display: inline-block;
  margin-left: 6px;
  background: var(--orange);
  color: white;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 10px;
  min-width: 16px;
  text-align: center;
}

/* 内容区 */
.content {
  display: none;
}
.content.active {
  display: block;
}

/* 列表 */
.list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 20px;
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: 14px;
  transition: all 0.2s;
}

.item:hover {
  background: rgba(255,255,255,0.04);
  border-color: var(--border-hover);
  transform: translateX(4px);
}

.avatar {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--accent), var(--blue));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 600;
  color: white;
  flex-shrink: 0;
}

.info {
  flex: 1;
  min-width: 0;
}

.name {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 2px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.status {
  font-size: 12px;
  color: var(--text-3);
}

.online {
  width: 6px;
  height: 6px;
  background: var(--green);
  border-radius: 50%;
  display: inline-block;
}

.actions {
  display: flex;
  gap: 8px;
}

.btn-sm {
  padding: 6px 14px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-2);
  font-size: 12px;
  font-weight: 500;
  border-radius: 8px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}

.btn-sm:hover {
  background: rgba(255,255,255,0.05);
  border-color: var(--border-hover);
  color: var(--text);
}

.btn-sm.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}

.btn-sm.primary:hover {
  background: var(--accent);
  opacity: 0.9;
}

.btn-sm.success {
  background: rgba(34,197,94,0.1);
  border-color: rgba(34,197,94,0.3);
  color: var(--green);
}

.btn-sm.danger {
  background: rgba(239,68,68,0.1);
  border-color: rgba(239,68,68,0.2);
  color: #fca5a5;
}

/* 搜索 */
.search-box {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
}

.search-input {
  flex: 1;
  padding: 12px 16px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: all 0.2s;
}

.search-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
}

.search-input::placeholder {
  color: var(--text-3);
}

.search-btn {
  padding: 12px 20px;
  background: var(--accent);
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}

.search-btn:hover {
  opacity: 0.9;
}

/* 空状态 */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-3);
}

.empty-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.5;
}

.empty p {
  font-size: 14px;
}

/* 响应式 */
@media (max-width: 640px) {
  .app {
    padding: 20px 16px 60px;
  }

  .header h1 {
    font-size: 20px;
  }

  .tab {
    padding: 8px 12px;
    font-size: 12px;
  }

  .item {
    padding: 12px 16px;
  }
}
</style>
</head>
<body>

<div class="bg-anim">
  <div class="light light-1"></div>
  <div class="light light-2"></div>
</div>
<div class="grid-overlay"></div>

<div class="app">
  <div class="header">
    <div class="header-left">
      <a href="/" class="back-btn">←</a>
      <h1>👥 好友</h1>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('friends')">好友列表</button>
    <button class="tab" onclick="switchTab('requests')">请求 <span class="badge" id="reqBadge" style="display:none;">0</span></button>
    <button class="tab" onclick="switchTab('search')">搜索</button>
    <button class="tab" onclick="switchTab('messages')">私信</button>
    <button class="tab" onclick="switchTab('feed')">动态</button>
  </div>

  <!-- 好友列表 -->
  <div class="content active" id="tabFriends">
    <div class="list" id="friendsList">
      <div class="empty">
        <div class="empty-icon">👥</div>
        <p>还没有好友，去搜索添加吧</p>
      </div>
    </div>
  </div>

  <!-- 请求 -->
  <div class="content" id="tabRequests">
    <div class="list" id="requestsList">
      <div class="empty">
        <div class="empty-icon">📬</div>
        <p>暂无好友请求</p>
      </div>
    </div>
  </div>

  <!-- 搜索 -->
  <div class="content" id="tabSearch">
    <div class="search-box">
      <input type="text" class="search-input" id="searchInput" placeholder="输入用户名搜索..." maxlength="20">
      <button class="search-btn" onclick="doSearch()">搜索</button>
    </div>
    <div class="list" id="searchResults"></div>
  </div>

  <!-- 私信 -->
  <div class="content" id="tabMessages">
    <div class="list" id="messagesList">
      <div class="empty">
        <div class="empty-icon">💬</div>
        <p>暂无私信</p>
      </div>
    </div>
  </div>

  <!-- 动态 -->
  <div class="content" id="tabFeed">
    <div class="list" id="feedList">
      <div class="empty">
        <div class="empty-icon">📢</div>
        <p>暂无好友动态</p>
      </div>
    </div>
  </div>
</div>

<script>
let currentTab = 'friends';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
}

// 加载好友列表
async function loadFriends() {
  try {
    const data = await fetch('/api/friends').then(r => r.json());
    const list = document.getElementById('friendsList');
    if (data && data.length > 0) {
      list.innerHTML = data.map(f => `
        <div class="item">
          <div class="avatar">${f.username.charAt(0).toUpperCase()}</div>
          <div class="info">
            <div class="name">
              ${esc(f.username)}
              ${f.is_online ? '<span class="online"></span>' : ''}
            </div>
            <div class="status">${f.is_online ? '在线' : '离线'}</div>
          </div>
          <div class="actions">
            <button class="btn-sm danger" onclick="removeFriend('${f.id}')">删除</button>
          </div>
        </div>
      `).join('');
    } else {
      list.innerHTML = '<div class="empty"><div class="empty-icon">👥</div><p>暂无好友</p></div>';
    }
  } catch(e) { console.error(e); }
}

// 加载请求
async function loadRequests() {
  try {
    const data = await fetch('/api/friends/requests').then(r => r.json());
    const list = document.getElementById('requestsList');
    const badge = document.getElementById('reqBadge');
    if (data && data.length > 0) {
      badge.style.display = '';
      badge.textContent = data.length;
      list.innerHTML = data.map(r => `
        <div class="item">
          <div class="avatar">${r.from_username.charAt(0).toUpperCase()}</div>
          <div class="info">
            <div class="name">${esc(r.from_username)}</div>
            <div class="status">${r.message || '请求添加你为好友'}</div>
          </div>
          <div class="actions">
            <button class="btn-sm success" onclick="acceptRequest('${r.id}')">接受</button>
            <button class="btn-sm" onclick="rejectRequest('${r.id}')">拒绝</button>
          </div>
        </div>
      `).join('');
    } else {
      badge.style.display = 'none';
      list.innerHTML = '<div class="empty"><div class="empty-icon">📬</div><p>暂无好友请求</p></div>';
    }
  } catch(e) { console.error(e); }
}

// 搜索
async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  try {
    const data = await fetch(`/api/friends/search?q=${encodeURIComponent(q)}`).then(r => r.json());
    const list = document.getElementById('searchResults');
    if (data && data.length > 0) {
      list.innerHTML = data.map(u => `
        <div class="item">
          <div class="avatar">${u.username.charAt(0).toUpperCase()}</div>
          <div class="info">
            <div class="name">${esc(u.username)}</div>
            <div class="status">${u.is_friend ? '已是好友' : u.has_sent_request ? '已发送请求' : u.has_received_request ? '对方已请求' : '未添加'}</div>
          </div>
          <div class="actions">
            ${!u.is_friend && !u.has_sent_request ? `<button class="btn-sm primary" onclick="sendRequest('${u.id}')">添加</button>` : ''}
          </div>
        </div>
      `).join('');
    } else {
      list.innerHTML = '<div class="empty"><p>未找到用户</p></div>';
    }
  } catch(e) { console.error(e); }
}

async function sendRequest(id) {
  const msg = prompt('附加消息（可选）：');
  await fetch('/api/friends/request', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ user_id: id, message: msg })
  });
  doSearch();
}

async function acceptRequest(id) {
  await fetch(`/api/friends/accept/${id}`, { method: 'POST' });
  loadRequests();
  loadFriends();
}

async function rejectRequest(id) {
  await fetch(`/api/friends/reject/${id}`, { method: 'POST' });
  loadRequests();
}

async function removeFriend(id) {
  if (!confirm('确定删除该好友？')) return;
  await fetch(`/api/friends/${id}`, { method: 'DELETE' });
  loadFriends();
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

loadFriends();
loadRequests();
</script>
</body>
</html>
