<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe Coding</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #050505;
      color: #e6edf3;
      min-height: 100vh;
    }
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }
    .modal {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .modal .icon { font-size: 48px; margin-bottom: 16px; }
    .modal h2 { font-size: 20px; margin-bottom: 12px; }
    .modal p { color: #8b949e; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    .modal .warning {
      background: rgba(248,81,73,0.1);
      border: 1px solid rgba(248,81,73,0.3);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 24px;
      font-size: 13px;
      color: #f85149;
    }
    .btn-group { display: flex; flex-direction: column; gap: 10px; }
    .btn {
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary { background: #f59e0b; color: #000; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { background: #30363d; color: #8b949e; cursor: not-allowed; }
    .btn-secondary { background: #21262d; color: #e6edf3; border: 1px solid #30363d; }
    .btn-secondary:hover { background: #30363d; }
    .status { margin-top: 16px; font-size: 13px; min-height: 20px; }
    .status.checking { color: #d29922; }
    .status.success { color: #3fb950; }
    .status.error { color: #f85149; }
    .back-link { display: inline-block; margin-top: 16px; color: #58a6ff; text-decoration: none; font-size: 14px; }
    .back-link:hover { text-decoration: underline; }
    .ip-input-group { display: flex; gap: 8px; margin-bottom: 16px; }
    .ip-input {
      flex: 1;
      padding: 12px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e6edf3;
      font-size: 14px;
      outline: none;
    }
    .ip-input:focus { border-color: #f59e0b; }
    .ip-input::placeholder { color: #484f58; }
    .detect-btn {
      padding: 12px 16px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e6edf3;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
    }
    .detect-btn:hover { background: #30363d; }
  </style>
</head>
<body>
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="icon">⚡</div>
      <h2>Vibe Coding</h2>
      <p>手机远程控制 Claude Code，随时随地 AI 编程</p>
      <div class="warning">⚠️ 使用前请务必先下载并部署仓库内的 Vibe Coding 服务到你的电脑上！</div>
      <div class="ip-input-group">
        <input type="text" class="ip-input" id="ipInput" placeholder="输入服务地址，如 192.168.1.44:3000" value="192.168.1.44:3000">
        <button class="detect-btn" onclick="detectService()">检测</button>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" id="enterBtn" onclick="enterService()">直接进入</button>
        <button class="btn btn-secondary" onclick="window.location.href='/files'">📁 去文件仓库下载</button>
      </div>
      <div class="status" id="status"></div>
      <a href="/" class="back-link">← 返回首页</a>
    </div>
  </div>

  <script>
    window.onload = function() { detectService(); };

    function detectService() {
      const ip = document.getElementById('ipInput').value.trim();
      if (!ip) return;

      const statusEl = document.getElementById('status');
      statusEl.className = 'status checking';
      statusEl.textContent = '正在检测...';

      // 用 Image 检测，不受混合内容限制
      const img = new Image();
      const timer = setTimeout(() => {
        img.src = '';
        statusEl.className = 'status error';
        statusEl.textContent = '⚠️ 无法检测，请确认服务已启动后直接进入';
      }, 3000);

      img.onload = function() {
        clearTimeout(timer);
        statusEl.className = 'status success';
        statusEl.textContent = '✅ 服务已检测到！';
      };

      img.onerror = function() {
        clearTimeout(timer);
        // onerror 也可能是服务存在但返回非图片，直接让用户进入
        statusEl.className = 'status success';
        statusEl.textContent = '✅ 可以尝试进入';
      };

      img.src = 'http://' + ip + '/favicon.ico?' + Date.now();
    }

    function enterService() {
      const ip = document.getElementById('ipInput').value.trim();
      if (ip) {
        window.location.href = 'http://' + ip;
      }
    }

    document.getElementById('ipInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') detectService();
    });
  </script>
</body>
</html>
