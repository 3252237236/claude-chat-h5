<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe Coding</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #050505;
      color: #e6edf3;
      min-height: 100vh;
    }

    /* 弹窗遮罩 */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }

    /* 弹窗 */
    .modal {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .modal .icon { font-size: 48px; margin-bottom: 16px; }
    .modal h2 { font-size: 20px; margin-bottom: 12px; }
    .modal p {
      color: #8b949e;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .modal .warning {
      background: rgba(248,81,73,0.1);
      border: 1px solid rgba(248,81,73,0.3);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 24px;
      font-size: 13px;
      color: #f85149;
    }

    /* 按钮 */
    .btn-group { display: flex; flex-direction: column; gap: 10px; }
    .btn {
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #f59e0b;
      color: #000;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled {
      background: #30363d;
      color: #8b949e;
      cursor: not-allowed;
    }
    .btn-secondary {
      background: #21262d;
      color: #e6edf3;
      border: 1px solid #30363d;
    }
    .btn-secondary:hover { background: #30363d; }

    /* 状态 */
    .status {
      margin-top: 16px;
      font-size: 13px;
      min-height: 20px;
    }
    .status.checking { color: #d29922; }
    .status.success { color: #3fb950; }
    .status.error { color: #f85149; }

    /* 返回链接 */
    .back-link {
      display: inline-block;
      margin-top: 16px;
      color: #58a6ff;
      text-decoration: none;
      font-size: 14px;
    }
    .back-link:hover { text-decoration: underline; }

    /* 隐藏 */
    .hidden { display: none !important; }

    /* IP 输入 */
    .ip-input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .ip-input {
      flex: 1;
      padding: 12px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e6edf3;
      font-size: 14px;
      outline: none;
    }
    .ip-input:focus { border-color: #f59e0b; }
    .ip-input::placeholder { color: #484f58; }
    .detect-btn {
      padding: 12px 16px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e6edf3;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
    }
    .detect-btn:hover { background: #30363d; }
  </style>
</head>
<body>
  <!-- 弹窗 -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="icon">⚡</div>
      <h2>Vibe Coding</h2>
      <p>手机远程控制 Claude Code，随时随地 AI 编程</p>

      <div class="warning">
        ⚠️ 使用前请务必先下载并部署仓库内的 Vibe Coding 服务到你的电脑上！
      </div>

      <div class="ip-input-group">
        <input type="text" class="ip-input" id="ipInput" placeholder="输入服务地址，如 localhost:3000" value="localhost:3000">
        <button class="detect-btn" onclick="detectService()">检测</button>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" id="enterBtn" disabled onclick="enterService()">进入服务</button>
        <button class="btn btn-secondary" onclick="window.location.href='/files'">📁 去文件仓库下载</button>
      </div>

      <div class="status" id="status"></div>
      <a href="/" class="back-link">← 返回首页</a>
    </div>
  </div>

  <script>
    let serviceUrl = '';

    // 自动检测
    window.onload = function() {
      detectService();
    };

    function detectService() {
      const ip = document.getElementById('ipInput').value.trim();
      if (!ip) return;

      const statusEl = document.getElementById('status');
      const enterBtn = document.getElementById('enterBtn');

      statusEl.className = 'status checking';
      statusEl.textContent = '正在检测服务...';
      enterBtn.disabled = true;

      // 尝试连接健康检查接口
      const testUrl = `http://${ip}/health`;
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 3000);

      fetch(testUrl, {
        signal: controller.signal,
        mode: 'no-cors'
      })
      .then(() => {
        // no-cors 模式下无法读取响应，但如果不报错说明服务存在
        // 再用 WebSocket 验证
        return verifyWithWebSocket(ip);
      })
      .catch(() => {
        // fetch 失败，尝试 WebSocket
        return verifyWithWebSocket(ip);
      });
    }

    function verifyWithWebSocket(ip) {
      const statusEl = document.getElementById('status');
      const enterBtn = document.getElementById('enterBtn');

      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${protocol}//${ip}/ws`;

      try {
        const ws = new WebSocket(wsUrl);
        const timeout = setTimeout(() => {
          ws.close();
          statusEl.className = 'status error';
          statusEl.textContent = '❌ 未检测到服务，请先部署';
          enterBtn.disabled = true;
        }, 3000);

        ws.onopen = () => {
          clearTimeout(timeout);
          ws.close();
          serviceUrl = `http://${ip}`;
          statusEl.className = 'status success';
          statusEl.textContent = '✅ 服务已检测到！';
          enterBtn.disabled = false;
        };

        ws.onerror = () => {
          clearTimeout(timeout);
          statusEl.className = 'status error';
          statusEl.textContent = '❌ 未检测到服务，请先部署';
          enterBtn.disabled = true;
        };
      } catch(e) {
        statusEl.className = 'status error';
        statusEl.textContent = '❌ 连接失败，请检查地址';
        enterBtn.disabled = true;
      }
    }

    function enterService() {
      if (serviceUrl) {
        window.location.href = serviceUrl;
      }
    }

    // 回车检测
    document.getElementById('ipInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') detectService();
    });
  </script>
</body>
</html>
