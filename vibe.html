<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe Coding</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #050505;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h2 { font-size: 20px; margin-bottom: 12px; }
    p { color: #8b949e; font-size: 14px; line-height: 1.6; margin-bottom: 20px; }
    .tip {
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #f59e0b;
      text-align: left;
    }
    .tip strong { display: block; margin-bottom: 4px; }
    .ip-group { display: flex; gap: 8px; margin-bottom: 16px; }
    .ip-input {
      flex: 1;
      padding: 12px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e6edf3;
      font-size: 14px;
      outline: none;
    }
    .ip-input:focus { border-color: #f59e0b; }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 10px;
      text-decoration: none;
    }
    .btn-primary { background: #f59e0b; color: #000; }
    .btn-secondary { background: #21262d; color: #e6edf3; border: 1px solid #30363d; }
    .back { display: inline-block; margin-top: 16px; color: #58a6ff; text-decoration: none; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⚡</div>
    <h2>Vibe Coding</h2>
    <p>手机远程控制 Claude Code</p>
    <div class="tip">
      <strong>⚠️ 使用须知</strong>
      1. 电脑上需运行 Vibe Coding 服务<br>
      2. 手机和电脑需在同一局域网
    </div>
    <div class="ip-group">
      <input type="text" class="ip-input" id="ip" value="192.168.1.44:3000" placeholder="IP:端口">
    </div>
    <button class="btn btn-primary" onclick="go()">🚀 进入服务</button>
    <a href="/files" class="btn btn-secondary">📁 去文件仓库下载</a>
    <a href="/" class="back">← 返回首页</a>
  </div>

  <script>
    function go() {
      var ip = document.getElementById('ip').value.trim();
      if (ip) window.location.href = 'http://' + ip;
    }
    document.getElementById('ip').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') go();
    });
  </script>
</body>
</html>
