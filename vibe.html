<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe Coding - 下载</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #050505;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      width: 100%;
      text-align: center;
    }
    .logo {
      font-size: 64px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #8b949e;
      margin-bottom: 32px;
    }
    .download-btn {
      display: inline-block;
      padding: 16px 32px;
      background: #f59e0b;
      color: #000;
      font-size: 18px;
      font-weight: 600;
      border-radius: 12px;
      text-decoration: none;
      transition: transform 0.2s, opacity 0.2s;
    }
    .download-btn:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }
    .steps {
      margin-top: 40px;
      text-align: left;
    }
    .step {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      align-items: flex-start;
    }
    .step-num {
      width: 32px;
      height: 32px;
      background: #1f6feb;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      flex-shrink: 0;
    }
    .step-content h3 {
      margin-bottom: 4px;
    }
    .step-content p {
      color: #8b949e;
      font-size: 14px;
    }
    .requirements {
      margin-top: 32px;
      padding: 16px;
      background: #161b22;
      border-radius: 12px;
      border: 1px solid #30363d;
    }
    .requirements h3 {
      margin-bottom: 12px;
      color: #f59e0b;
    }
    .req-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .req-item::before {
      content: '✓';
      color: #3fb950;
    }
    .back-link {
      display: inline-block;
      margin-top: 24px;
      color: #58a6ff;
      text-decoration: none;
    }
    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">⚡</div>
    <h1>Vibe Coding</h1>
    <p class="subtitle">手机远程控制 Claude Code</p>

    <a href="/static/vibe-coding.zip" class="download-btn">📦 下载一键运行包</a>

    <div class="steps">
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-content">
          <h3>下载并解压</h3>
          <p>下载上面的压缩包，解压到任意文件夹</p>
        </div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-content">
          <h3>双击 run.bat</h3>
          <p>自动安装依赖、启动服务、打开浏览器</p>
        </div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-content">
          <h3>手机扫码访问</h3>
          <p>确保手机和电脑连同一个 WiFi，用手机浏览器访问显示的地址</p>
        </div>
      </div>
    </div>

    <div class="requirements">
      <h3>前置要求</h3>
      <div class="req-item">Node.js v18+（<a href="https://nodejs.org/" target="_blank" style="color:#58a6ff">下载</a>）</div>
      <div class="req-item">Claude CLI（<a href="https://docs.anthropic.com/claude/docs/claude-cli" target="_blank" style="color:#58a6ff">安装教程</a>）</div>
    </div>

    <a href="/" class="back-link">← 返回首页</a>
  </div>
</body>
</html>
