<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HZ Lab</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f5f2;
  --text: #1c1c1e;
  --text-dim: #8e8e93;
  --radius: 28px;
  --gap: 14px;
}

html, body {
  min-height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* ===== 主容器 ===== */
.app {
  max-width: 980px; margin: 0 auto;
  padding: 48px 20px 80px;
  min-height: 100vh;
}

/* ===== 头部 ===== */
.hero {
  padding: 40px 0 36px;
}
.hero h1 {
  font-size: 38px; font-weight: 780; letter-spacing: -2px;
  margin-bottom: 8px;
}
.hero .sub {
  font-size: 16px; color: var(--text-dim); line-height: 1.6;
}

/* ===== Bento 网格 ===== */
.bento {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 148px;
  gap: var(--gap);
}

/* ===== Bento 块 ===== */
.block {
  position: relative;
  border-radius: var(--radius);
  padding: 24px;
  cursor: pointer;
  transition: all 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
  text-decoration: none; color: inherit;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.block:hover {
  transform: scale(0.98);
  filter: brightness(0.96);
}

/* 各块配色 */
.block-chat  { background: #ebe6f5; }
.block-mc    { background: #ddebe0; }
.block-files { background: #e6eaf0; }
.block-submit{ background: #f5efe6; border: 2px dashed rgba(0,0,0,0.1); }

.block .b-icon {
  font-size: 28px; margin-bottom: auto;
  width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
  border-radius: 14px; background: rgba(255,255,255,0.5);
}
.block h3 { font-size: 19px; font-weight: 700; margin: 4px 0 3px; }
.block .b-desc { font-size: 13px; color: var(--text-dim); line-height: 1.5; }
.block .b-tag {
  display: inline-block; margin-top: 10px; font-size: 11px; font-weight: 600;
  padding: 3px 10px; border-radius: 14px;
  background: rgba(255,255,255,0.55); color: var(--text-dim);
  width: fit-content;
}

/* 大块 - AI 聊天 */
.block-chat {
  grid-column: span 2; grid-row: span 2;
  padding: 32px;
}
.block-chat .b-icon { font-size: 36px; width: 58px; height: 58px; border-radius: 18px; }
.block-chat h3 { font-size: 24px; margin-top: 8px; }
.block-chat .b-desc { font-size: 15px; max-width: 260px; }

/* 中等块 */
.block-mc, .block-files, .block-submit {
  grid-column: span 1; grid-row: span 1;
}

/* ===== 社区区块 ===== */
.community-section {
  margin-top: 44px;
}
.community-section .sec-label {
  font-size: 12px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: var(--text-dim);
  margin-bottom: 14px;
}
.community-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--gap);
}

.comm-card {
  background: #f0eee9;
  border-radius: 20px;
  padding: 20px; cursor: pointer;
  transition: all 0.3s;
  text-decoration: none; color: inherit;
  display: flex; flex-direction: column; gap: 8px;
}
.comm-card:hover {
  background: #e8e6e1;
  transform: scale(0.98);
}
.comm-card .cc-icon {
  font-size: 24px; width: 40px; height: 40px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.5);
}
.comm-card .cc-title { font-size: 15px; font-weight: 670; }
.comm-card .cc-meta { font-size: 12px; color: var(--text-dim); }

.comm-submit {
  background: transparent; border: 2px dashed rgba(0,0,0,0.08);
  align-items: center; justify-content: center; text-align: center;
}
.comm-submit:hover { background: rgba(0,0,0,0.02); }
.comm-submit .cc-icon { background: rgba(0,0,0,0.03); font-size: 22px; }

/* ===== 底部 ===== */
.footer {
  margin-top: 60px; font-size: 13px; color: var(--text-dim);
}

/* ===== 响应式 ===== */
@media (max-width: 768px) {
  .bento { grid-template-columns: repeat(2, 1fr); grid-auto-rows: 140px; }
  .block-chat { grid-column: span 2; grid-row: span 2; }
  .community-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 480px) {
  .app { padding: 32px 14px 60px; }
  .hero { padding: 20px 0 24px; }
  .hero h1 { font-size: 32px; }
  .bento { grid-template-columns: 1fr; grid-auto-rows: auto; }
  .block { min-height: 120px; }
  .block-chat { grid-column: span 1; grid-row: span 1; min-height: 180px; }
  .community-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="app">
  <header class="hero">
    <h1>HZ Lab</h1>
    <p class="sub">探索 AI 与工具的无限可能 · 所有项目免费开放，点开即用</p>
  </header>

  <!-- Bento 主区域 -->
  <div class="bento" id="bentoGrid"></div>

  <!-- 社区作品 -->
  <div class="community-section" id="communitySection" style="display:none;">
    <div class="sec-label">社区作品</div>
    <div class="community-grid" id="communityGrid"></div>
  </div>

  <footer class="footer">&copy; 2026 HZ Lab</footer>
</div>

<script>
// ===== 内置块映射 =====
const blockClass = {
  "AI 聊天": "block-chat",
  "MiniCraft": "block-mc",
  "文件仓库": "block-files",
  "提交作品": "block-submit",
};

(async function loadBento() {
  const grid = document.getElementById("bentoGrid");
  try {
    const resp = await fetch("apps.json");
    if (!resp.ok) throw new Error();
    const apps = await resp.json();
    if (!apps.length) return;

    apps.forEach(app => {
      const el = document.createElement("a");
      el.className = "block " + (blockClass[app.title] || "");
      el.href = app.url;
      el.innerHTML = `
        <div class="b-icon">${app.icon}</div>
        <h3>${esc(app.title)}</h3>
        <div class="b-desc">${esc(app.desc)}</div>
        <span class="b-tag">${esc(app.badge||"")}</span>`;
      grid.appendChild(el);
    });
  } catch(e) {
    grid.innerHTML = `<a href="/chat" class="block block-chat" style="grid-column:span 2;grid-row:span 2;padding:32px;">
      <div class="b-icon" style="font-size:36px;width:58px;height:58px;border-radius:18px;">💬</div>
      <h3 style="font-size:24px;margin-top:8px;">AI 聊天</h3><div class="b-desc" style="font-size:15px;max-width:260px;">智能对话，Agent 工具调用</div><span class="b-tag">🚀 已上线</span></a>`;
  }
})();

// ===== 社区作品 =====
(async function loadCommunity() {
  try {
    const resp = await fetch("/api/community-apps");
    const items = await resp.json();
    if (!items.length) return;

    document.getElementById("communitySection").style.display = "";
    const grid = document.getElementById("communityGrid");

    items.forEach(item => {
      const el = document.createElement("a");
      el.className = "comm-card";
      el.href = item.url;
      const time = new Date(item.time*1000);
      el.innerHTML = `
        <div class="cc-icon" style="background:${item.color}18;color:${item.color};">${esc(item.icon)}</div>
        <div class="cc-title">${esc(item.title)}</div>
        <div class="cc-meta">${esc(item.author)} · ${time.toLocaleDateString("zh-CN")}</div>`;
      grid.appendChild(el);
    });

    // 提交入口
    const tip = document.createElement("a");
    tip.className = "comm-card comm-submit";
    tip.href = "/submit";
    tip.innerHTML = `<div class="cc-icon">➕</div><div class="cc-title">提交作品</div><div class="cc-meta">发布到首页</div>`;
    grid.appendChild(tip);
  } catch(e) {}
})();

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
