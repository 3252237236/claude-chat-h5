<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HZ Lab</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --c-bg: #f5f1ec;
  --c-surface: rgba(255,255,255,0.55);
  --c-surface-hover: rgba(255,255,255,0.78);
  --c-border: rgba(0,0,0,0.06);
  --c-border-hover: rgba(0,0,0,0.10);
  --c-text: #3d3832;
  --c-text-dim: #9b948b;
  --c-accent: #e67e45;
  --c-accent2: #6b9b6d;
  --c-accent3: #7d8fa3;
  --c-accent4: #c8893d;
  --radius: 22px;
}

html, body {
  min-height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--c-bg);
  color: var(--c-text);
  -webkit-font-smoothing: antialiased;
}

/* ===== 背景纹理 ===== */
.bg-texture {
  position: fixed; inset: 0; z-index: 0;
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm15 20a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3zM8 48a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm40 10a1 1 0 1 0 0 2 1 1 0 0 0 0-2z' fill='%233d3832' opacity='.03'/%3E%3C/svg%3E");
  pointer-events: none;
}

/* ===== 主容器 ===== */
.app {
  position: relative; z-index: 1;
  max-width: 880px; margin: 0 auto;
  padding: 60px 24px 80px;
  min-height: 100vh;
  display: flex; flex-direction: column;
}

/* ===== 头部 ===== */
.hero {
  text-align: left; padding: 80px 0 56px;
  max-width: 600px;
}
.hero .logo {
  display: inline-flex; align-items: center; justify-content: center;
  width: 40px; height: 40px;
  background: var(--c-text);
  color: var(--c-bg);
  border-radius: 12px;
  font-size: 16px; font-weight: 800;
  margin-bottom: 28px;
}
.hero h1 {
  font-size: 52px; font-weight: 740; letter-spacing: -2px;
  line-height: 1.05; margin-bottom: 16px;
  color: var(--c-text);
}
.hero .subtitle {
  font-size: 18px; color: var(--c-text-dim);
  line-height: 1.7; max-width: 460px;
}

/* ===== 分区标题 ===== */
.section-label {
  font-size: 11px; font-weight: 700; letter-spacing: 2.5px;
  text-transform: uppercase; color: var(--c-text-dim);
  margin: 16px 0 18px;
}

/* ===== 卡片网格 ===== */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}

/* ===== 毛玻璃卡片 ===== */
.card {
  position: relative;
  background: var(--c-surface);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 1px solid var(--c-border);
  border-radius: var(--radius);
  padding: 26px 24px 24px;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
  text-decoration: none; color: inherit;
  overflow: hidden;
}
.card::after {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 50%);
  pointer-events: none;
  border-radius: var(--radius);
}
.card:hover {
  background: var(--c-surface-hover);
  border-color: var(--c-border-hover);
  transform: translateY(-3px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.04);
}

.card .card-icon {
  width: 46px; height: 46px; border-radius: 15px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; margin-bottom: 16px;
  position: relative; z-index: 1;
}
.card h3 { font-size: 18px; font-weight: 680; margin-bottom: 6px; position: relative; z-index: 1; }
.card p { font-size: 14px; color: var(--c-text-dim); line-height: 1.55; position: relative; z-index: 1; }
.card .card-badge {
  display: inline-block; margin-top: 14px;
  font-size: 11px; font-weight: 600; padding: 4px 10px;
  border-radius: 20px;
  background: rgba(0,0,0,0.04);
  color: var(--c-text-dim);
  position: relative; z-index: 1;
}
.card:hover .card-badge { background: rgba(0,0,0,0.06); color: var(--c-text); }

/* 虚线卡片 */
.card-dashed { border-style: dashed; border-color: rgba(0,0,0,0.1); }

/* ===== 底部 ===== */
.footer {
  margin-top: auto; text-align: left; padding-top: 60px;
  font-size: 13px; color: var(--c-text-dim);
}

/* ===== 响应式 ===== */
@media (max-width: 600px) {
  .app { padding: 40px 16px 50px; }
  .hero { padding: 30px 0 36px; }
  .hero h1 { font-size: 38px; letter-spacing: -1.5px; }
  .hero .subtitle { font-size: 16px; }
  .cards { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="bg-texture"></div>

<div class="app">
  <header class="hero">
    <div class="logo">HZ</div>
    <h1>HZ Lab</h1>
    <p class="subtitle">探索 AI 与工具的无限可能<br>所有项目免费开放，点开即用</p>
  </header>

  <div class="section-label">Apps</div>
  <div class="cards" id="builtinCards"></div>

  <div class="section-label" id="communityTitle" style="display:none;">社区作品</div>
  <div class="cards" id="communityCards"></div>

  <footer class="footer">
    &copy; 2026 HZ Lab
  </footer>
</div>

<script>
// ========== 加载内置应用 ==========
(async function loadApps() {
  const container = document.getElementById("builtinCards");
  try {
    const resp = await fetch("apps.json");
    if (!resp.ok) throw new Error();
    const apps = await resp.json();
    if (!apps.length) return;

    apps.forEach(app => {
      const card = document.createElement("a");
      card.className = "card" + (app.dashed ? " card-dashed" : "");
      card.href = app.url;
      card.innerHTML = `
        <div class="card-icon" style="background:${app.color}18;color:${app.color};">${app.icon}</div>
        <h3>${escapeHtml(app.title)}</h3>
        <p>${escapeHtml(app.desc)}</p>
        <span class="card-badge">${escapeHtml(app.badge || "")}</span>`;
      container.appendChild(card);
    });
  } catch (e) {
    container.innerHTML = `
      <a href="/chat" class="card">
        <div class="card-icon" style="background:#e67e4518;color:#e67e45;">💬</div>
        <h3>AI 聊天</h3><p>智能对话，Agent 工具调用</p><span class="card-badge">🚀 已上线</span>
      </a>`;
  }
})();

// ========== 加载社区作品 ==========
(async function loadCommunity() {
  try {
    const resp = await fetch("/api/community-apps");
    const items = await resp.json();
    if (!items.length) return;

    document.getElementById("communityTitle").style.display = "";
    const container = document.getElementById("communityCards");

    items.forEach(item => {
      const card = document.createElement("a");
      card.className = "card";
      card.href = item.url;

      const time = new Date(item.time * 1000);
      const timeStr = time.toLocaleDateString("zh-CN");

      card.innerHTML = `
        <div class="card-icon" style="background:${item.color}18;color:${item.color};">${escapeHtml(item.icon)}</div>
        <h3>${escapeHtml(item.title)}</h3>
        <p>${escapeHtml(item.desc)}</p>
        <span class="card-badge">${escapeHtml(item.author)} · ${timeStr}</span>`;
      container.appendChild(card);
    });

    const tip = document.createElement("a");
    tip.className = "card card-dashed";
    tip.href = "/submit";
    tip.innerHTML = `
      <div class="card-icon" style="background:rgba(0,0,0,0.04);color:var(--c-text-dim);">➕</div>
      <h3>提交你的作品</h3>
      <p>发布工具、游戏、网站，让所有人看到</p>
      <span class="card-badge">🚀 立即发布</span>`;
    container.appendChild(tip);
  } catch (e) {}
})();

function escapeHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
