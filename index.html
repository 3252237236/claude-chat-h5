<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HZ Lab</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sidebar-w: 212px;
  --sidebar-bg: #1c1c1e;
  --main-bg: #fafafa;
  --text: #1a1a1a;
  --text-dim: #6e6e73;
  --border: #e8e8eb;
  --hover: #f2f2f4;
  --accent: #5e6ad2;
}

html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--main-bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  display: flex;
}

/* ===== 侧边栏 ===== */
.sidebar {
  width: var(--sidebar-w);
  background: var(--sidebar-bg);
  color: #fff;
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; bottom: 0;
  z-index: 10;
  padding: 16px 12px;
}
.sidebar-brand {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 8px 20px;
  font-size: 15px; font-weight: 680;
  letter-spacing: -0.3px;
  color: #fff;
  text-decoration: none;
}
.sidebar-brand .sb-icon {
  width: 26px; height: 26px; border-radius: 7px;
  background: #fff; color: #1c1c1e;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 800;
}

.sidebar-nav {
  flex: 1; display: flex; flex-direction: column; gap: 2px;
}

.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 8px; border-radius: 6px;
  font-size: 13px; font-weight: 500;
  color: rgba(255,255,255,0.65);
  text-decoration: none;
  transition: all 0.12s;
}
.nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
.nav-item.active { background: rgba(255,255,255,0.1); color: #fff; }
.nav-item .ni-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }

/* ===== 主内容区 ===== */
.main {
  flex: 1; margin-left: var(--sidebar-w);
  padding: 48px 40px 80px;
  max-width: calc(780px + 80px);
}

.main-header { margin-bottom: 36px; }
.main-header h1 { font-size: 26px; font-weight: 680; letter-spacing: -1px; margin-bottom: 6px; }
.main-header .sub { font-size: 14px; color: var(--text-dim); }

/* ===== App 列表 ===== */
.app-list {
  display: flex; flex-direction: column;
  border: 1px solid var(--border);
  border-radius: 8px; overflow: hidden;
}

.app-row {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 18px;
  background: #fff;
  text-decoration: none; color: inherit;
  transition: background 0.1s;
  border-bottom: 1px solid var(--border);
}
.app-row:last-child { border-bottom: none; }
.app-row:hover { background: var(--hover); }

.app-row .ar-icon {
  width: 32px; height: 32px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.app-row .ar-info { flex: 1; min-width: 0; }
.app-row .ar-name { font-size: 14px; font-weight: 580; }
.app-row .ar-desc { font-size: 12px; color: var(--text-dim); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.app-row .ar-badge {
  font-size: 11px; font-weight: 500; color: var(--text-dim);
  padding: 2px 8px; border-radius: 4px;
  background: var(--hover);
  white-space: nowrap; flex-shrink: 0;
}
.app-row .ar-arrow { font-size: 14px; color: var(--text-dim); flex-shrink: 0; }

.app-row-dashed { border-style: dashed; border-color: #ddd; }

/* ===== 侧边栏社区分组 ===== */
.sidebar-section {
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  padding: 16px 8px 4px;
}

.community-apps { border-top: 1px solid rgba(255,255,255,0.06); margin-top: 8px; padding-top: 8px; }

/* ===== 移动端 ===== */
@media (max-width: 640px) {
  body { flex-direction: column; }
  .sidebar {
    position: relative; width: 100%; flex-direction: row;
    padding: 10px 12px; overflow-x: auto;
    align-items: center; gap: 4px;
  }
  .sidebar-brand { padding: 0 8px 0 0; }
  .sidebar-nav { flex-direction: row; flex: 1; overflow-x: auto; }
  .nav-item { white-space: nowrap; font-size: 12px; padding: 6px 10px; }
  .sidebar-section, .community-apps { display: none; }
  .main { margin-left: 0; padding: 28px 16px 60px; }
  .main-header h1 { font-size: 22px; }
}
</style>
</head>
<body>

<!-- 侧边栏 -->
<aside class="sidebar">
  <a href="/" class="sidebar-brand">
    <span class="sb-icon">HZ</span>
    HZ Lab
  </a>
  <nav class="sidebar-nav" id="sidebarNav"></nav>
</aside>

<!-- 主内容 -->
<main class="main">
  <div class="main-header">
    <h1>所有项目</h1>
    <p class="sub">点开即用，无需安装</p>
  </div>

  <div class="app-list" id="appList"></div>

  <div style="margin-top:40px;" id="communitySection" hidden>
    <div class="main-header" style="margin-bottom:16px;">
      <h1 style="font-size:20px;">社区作品</h1>
    </div>
    <div class="app-list" id="communityList"></div>
  </div>
</main>

<script>
(async function init() {
  const sidebarNav = document.getElementById("sidebarNav");
  const appList = document.getElementById("appList");
  let currentPath = location.pathname;

  try {
    const resp = await fetch("apps.json");
    if (!resp.ok) throw new Error();
    const apps = await resp.json();

    // 侧边栏导航
    apps.forEach((app, i) => {
      const item = document.createElement("a");
      item.className = "nav-item" + (currentPath === app.url ? " active" : "");
      item.href = app.url;
      item.innerHTML = `<span class="ni-icon">${app.icon}</span><span>${esc(app.title)}</span>`;
      sidebarNav.appendChild(item);
    });

    // 主内容列表
    apps.forEach((app, i) => {
      const row = document.createElement("a");
      row.className = "app-row" + (app.dashed ? " app-row-dashed" : "");
      row.href = app.url;
      row.innerHTML = `
        <div class="ar-icon" style="background:${app.color}14;color:${app.color};">${app.icon}</div>
        <div class="ar-info">
          <div class="ar-name">${esc(app.title)}</div>
          <div class="ar-desc">${esc(app.desc)}</div>
        </div>
        <span class="ar-badge">${esc(app.badge||"")}</span>
        <span class="ar-arrow">→</span>`;
      appList.appendChild(row);
    });

  } catch(e) {
    sidebarNav.innerHTML = `<a href="/chat" class="nav-item active"><span class="ni-icon">💬</span>AI 聊天</a>`;
    appList.innerHTML = `<a href="/chat" class="app-row">
      <div class="ar-icon" style="background:#5e6ad214;color:#5e6ad2;">💬</div>
      <div class="ar-info"><div class="ar-name">AI 聊天</div><div class="ar-desc">智能对话，Agent 工具调用</div></div>
      <span class="ar-badge">🚀 已上线</span><span class="ar-arrow">→</span></a>`;
  }

  // 社区作品
  try {
    const items = await fetch("/api/community-apps").then(r => r.json());
    if (!items.length) return;
    document.getElementById("communitySection").hidden = false;
    const list = document.getElementById("communityList");

    items.forEach(item => {
      const row = document.createElement("a");
      row.className = "app-row";
      row.href = item.url;
      const time = new Date(item.time*1000);
      row.innerHTML = `
        <div class="ar-icon" style="background:${item.color}14;color:${item.color};">${esc(item.icon)}</div>
        <div class="ar-info">
          <div class="ar-name">${esc(item.title)}</div>
          <div class="ar-desc">${esc(item.author)} · ${time.toLocaleDateString("zh-CN")}</div>
        </div>
        <span class="ar-arrow">→</span>`;
      list.appendChild(row);
    });
  } catch(e) {}
})();

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
