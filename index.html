<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HZ Lab</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --surface: rgba(255,255,255,0.03);
  --surface-hover: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.06);
  --text: #e8e8f0;
  --text-dim: #8888a0;
  --accent: #6c5ce7;
  --accent-glow: rgba(108,92,231,0.3);
  --green: #00d2a0;
  --green-glow: rgba(0,210,160,0.3);
  --blue: #4dabf7;
  --blue-glow: rgba(77,171,247,0.3);
  --orange: #ff922b;
  --orange-glow: rgba(255,146,43,0.3);
  --pink: #f06595;
  --pink-glow: rgba(240,101,149,0.3);
  --radius: 20px;
  --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}

html, body {
  min-height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
}

/* ===== 背景光晕 ===== */
.bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
.bg-orb {
  position: absolute; border-radius: 50%;
  filter: blur(120px); opacity: 0.15;
  animation: orbFloat 20s ease-in-out infinite;
}
.bg-orb:nth-child(1) {
  width: 600px; height: 600px; background: var(--accent);
  top: -200px; left: -100px; animation-delay: 0s;
}
.bg-orb:nth-child(2) {
  width: 400px; height: 400px; background: var(--blue);
  bottom: -100px; right: -100px; animation-delay: -7s;
}
.bg-orb:nth-child(3) {
  width: 300px; height: 300px; background: var(--green);
  top: 50%; left: 50%; animation-delay: -14s; opacity: 0.08;
}
@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(60px, -40px) scale(1.1); }
  50% { transform: translate(-30px, -80px) scale(0.9); }
  75% { transform: translate(-50px, 30px) scale(1.05); }
}

/* 网格 */
.bg-grid {
  position: fixed; inset: 0; z-index: 0; opacity: 0.03;
  background-image:
    linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* ===== 主容器 ===== */
.app {
  position: relative; z-index: 1;
  max-width: 960px; margin: 0 auto;
  padding: 60px 24px 80px;
  min-height: 100vh;
  display: flex; flex-direction: column;
}

/* ===== 用户栏 ===== */
.user-bar {
  display: flex; justify-content: flex-end; align-items: center; gap: 12px;
  padding: 12px 0 0;
}
.user-bar .ub-user {
  font-size: 13px; color: var(--text-dim);
  display: flex; align-items: center; gap: 8px;
}
.user-bar .ub-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green-glow);
}
.ub-btn {
  font-size: 12px; font-weight: 600; padding: 6px 14px;
  border-radius: 16px; cursor: pointer; border: none;
  font-family: inherit; transition: all 0.2s;
  background: rgba(255,255,255,0.06); color: var(--text-dim);
}
.ub-btn:hover { background: rgba(255,255,255,0.12); color: var(--text); }
.ub-btn-primary {
  background: var(--accent); color: #fff;
  box-shadow: 0 2px 12px var(--accent-glow);
}
.ub-btn-primary:hover { filter: brightness(1.15); color: #fff; }
.ub-btn-logout { font-size: 11px; background: transparent; color: var(--text-dim); padding: 4px 8px; }

/* ===== 认证弹窗 ===== */
.auth-overlay {
  position: fixed; inset: 0; z-index: 20;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.auth-modal {
  background: #14141f; border: 1px solid var(--border);
  border-radius: var(--radius); padding: 32px 28px;
  width: 100%; max-width: 360px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.auth-modal h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.auth-modal .auth-sub { font-size: 13px; color: var(--text-dim); margin-bottom: 22px; }
.auth-field { margin-bottom: 14px; }
.auth-field label {
  display: block; font-size: 11px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--text-dim); margin-bottom: 5px;
}
.auth-field input {
  width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 14px; font-size: 14px; color: var(--text);
  font-family: inherit; outline: none; transition: border-color 0.2s;
}
.auth-field input:focus { border-color: var(--accent); }
.auth-btn {
  width: 100%; padding: 12px; border-radius: 10px; border: none;
  background: var(--accent); color: #fff; font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: inherit; margin-top: 4px;
  box-shadow: 0 4px 16px var(--accent-glow);
  transition: all 0.2s;
}
.auth-btn:hover { filter: brightness(1.15); }
.auth-btn:disabled { opacity: 0.4; cursor: not-allowed; filter: none; }
.auth-switch {
  text-align: center; margin-top: 14px; font-size: 13px; color: var(--text-dim);
}
.auth-switch a { color: var(--accent); cursor: pointer; text-decoration: none; font-weight: 600; }
.auth-switch a:hover { text-decoration: underline; }
.auth-msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-top: 10px; display: none; }
.auth-msg-err { background: rgba(255,107,107,0.1); color: #ff6b6b; border: 1px solid rgba(255,107,107,0.2); }

/* ===== 头部 ===== */
.hero {
  text-align: center; padding: 60px 0 60px;
}
.hero .logo {
  display: inline-flex; align-items: center; gap: 12px;
  margin-bottom: 24px;
}
.hero .logo-icon {
  width: 52px; height: 52px;
  background: linear-gradient(135deg, var(--accent), var(--blue));
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  box-shadow: 0 0 40px var(--accent-glow);
}
.hero h1 {
  font-size: 48px; font-weight: 800; letter-spacing: -2px;
  background: linear-gradient(135deg, #fff 0%, #a0a0c0 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero .subtitle {
  font-size: 17px; color: var(--text-dim); max-width: 500px; margin: 0 auto;
  line-height: 1.7;
}

/* ===== 卡片 ===== */
.section-title {
  font-size: 13px; font-weight: 700; letter-spacing: 3px;
  text-transform: uppercase; color: var(--text-dim);
  margin: 20px 0 24px; text-align: center;
}
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}
.card {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px 28px 28px;
  cursor: pointer;
  transition: all var(--transition);
  text-decoration: none; color: inherit;
  overflow: hidden;
}
.card::before {
  content: "";
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--card-accent, var(--accent)), transparent);
  opacity: 0; transition: opacity var(--transition);
}
.card:hover {
  background: var(--surface-hover);
  border-color: rgba(255,255,255,0.12);
  transform: translateY(-4px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 80px var(--card-glow, var(--accent-glow));
}
.card:hover::before { opacity: 1; }
.card .card-icon {
  width: 48px; height: 48px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; margin-bottom: 18px;
}
.card h3 { font-size: 19px; font-weight: 700; margin-bottom: 8px; }
.card p { font-size: 14px; color: var(--text-dim); line-height: 1.6; }
.card .card-badge {
  display: inline-block; margin-top: 16px;
  font-size: 11px; font-weight: 600; padding: 4px 10px;
  border-radius: 20px; background: rgba(255,255,255,0.05);
  color: var(--text-dim);
}
.card:hover .card-badge { color: var(--text); }

/* ===== 底部 ===== */
.footer {
  margin-top: auto; text-align: center; padding-top: 60px;
  font-size: 12px; color: var(--text-dim);
}

/* ===== 响应式 ===== */
@media (max-width: 600px) {
  .app { padding: 40px 16px 60px; }
  .hero { padding: 40px 0 40px; }
  .hero h1 { font-size: 34px; }
  .hero .subtitle { font-size: 15px; }
  .cards { grid-template-columns: 1fr; }
  .bg-orb:nth-child(1) { width: 300px; height: 300px; }
  .bg-orb:nth-child(2) { width: 200px; height: 200px; }
}
</style>
</head>
<body>

<div class="bg">
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
</div>
<div class="bg-grid"></div>

<div class="app">
  <!-- 用户栏 -->
  <div class="user-bar" id="userBar">
    <button class="ub-btn" onclick="showAuth('login')">登录</button>
    <button class="ub-btn ub-btn-primary" onclick="showAuth('register')">注册</button>
  </div>

  <header class="hero">
    <div class="logo">
      <div class="logo-icon">⚡</div>
    </div>
    <h1>HZ Lab</h1>
    <p class="subtitle">探索 AI 与工具的无限可能<br>所有项目免费开放，点开即用</p>
  </header>

  <div class="section-title">Apps</div>
  <div class="cards" id="builtinCards"></div>

  <div class="section-title" id="communityTitle" style="display:none;">社区作品</div>
  <div class="cards" id="communityCards"></div>

  <footer class="footer">&copy; 2026 HZ Lab · Built with ❤️</footer>
</div>

<!-- 认证弹窗 -->
<div class="auth-overlay" id="authOverlay" style="display:none;">
  <div class="auth-modal">
    <h2 id="authTitle">登录</h2>
    <p class="auth-sub" id="authSub">欢迎回来</p>
    <div class="auth-field">
      <label>用户名</label>
      <input type="text" id="authUsername" placeholder="输入用户名" maxlength="20">
    </div>
    <div class="auth-field">
      <label>密码</label>
      <input type="password" id="authPassword" placeholder="输入密码" maxlength="50">
    </div>
    <button class="auth-btn" id="authBtn" onclick="doAuth()">登录</button>
    <div class="auth-switch" id="authSwitch">
      没有账号？<a onclick="switchAuth()">去注册</a>
    </div>
    <div class="auth-msg auth-msg-err" id="authMsg"></div>
  </div>
</div>

<script>
// ===== 用户认证 =====
let authMode = "login";

async function checkAuth() {
  try {
    const data = await fetch("/api/me").then(r => r.json());
    if (data.user) renderLoggedIn(data.user);
  } catch(e) {}
}

function renderLoggedIn(user) {
  document.getElementById("userBar").innerHTML = `
    <span class="ub-user">
      <span class="ub-dot"></span>
      ${esc(user.username)}
      <button class="ub-btn ub-btn-logout" onclick="doLogout()">登出</button>
    </span>`;
}

async function doLogout() {
  await fetch("/api/logout", { method: "POST" });
  document.getElementById("userBar").innerHTML = `
    <button class="ub-btn" onclick="showAuth('login')">登录</button>
    <button class="ub-btn ub-btn-primary" onclick="showAuth('register')">注册</button>`;
}

function showAuth(mode) {
  authMode = mode;
  document.getElementById("authOverlay").style.display = "flex";
  document.getElementById("authTitle").textContent = mode === "login" ? "登录" : "注册";
  document.getElementById("authSub").textContent = mode === "login" ? "欢迎回来" : "创建一个新账号";
  document.getElementById("authBtn").textContent = mode === "login" ? "登录" : "注册";
  document.getElementById("authSwitch").innerHTML = mode === "login"
    ? '没有账号？<a onclick="switchAuth()">去注册</a>'
    : '已有账号？<a onclick="switchAuth()">去登录</a>';
  document.getElementById("authMsg").style.display = "none";
  document.getElementById("authUsername").value = "";
  document.getElementById("authPassword").value = "";
}

function switchAuth() {
  showAuth(authMode === "login" ? "register" : "login");
}

async function doAuth() {
  const username = document.getElementById("authUsername").value.trim();
  const password = document.getElementById("authPassword").value.trim();

  if (!username || !password) {
    document.getElementById("authMsg").textContent = "请填写用户名和密码";
    document.getElementById("authMsg").style.display = "block";
    return;
  }

  const btn = document.getElementById("authBtn");
  btn.disabled = true;
  btn.textContent = "处理中…";

  const url = authMode === "login" ? "/api/login" : "/api/register";
  try {
    const data = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    }).then(r => r.json());

    if (data.ok) {
      document.getElementById("authOverlay").style.display = "none";
      renderLoggedIn(data.user);
    } else {
      document.getElementById("authMsg").textContent = data.error;
      document.getElementById("authMsg").style.display = "block";
    }
  } catch(e) {
    document.getElementById("authMsg").textContent = "网络错误";
    document.getElementById("authMsg").style.display = "block";
  } finally {
    btn.disabled = false;
    btn.textContent = authMode === "login" ? "登录" : "注册";
  }
}

// 点击遮罩关闭
document.getElementById("authOverlay").addEventListener("click", function(e) {
  if (e.target === this) this.style.display = "none";
});

// Enter 键提交
document.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && document.getElementById("authOverlay").style.display === "flex") {
    doAuth();
  }
});

// ===== 加载内置应用 (apps.json) =====
(async function loadApps() {
  const container = document.getElementById("builtinCards");
  try {
    const resp = await fetch("apps.json");
    if (!resp.ok) throw new Error();
    const apps = await resp.json();
    if (!apps.length) return;

    apps.forEach(app => {
      const card = document.createElement("a");
      card.className = "card";
      card.href = app.url;
      const glow = app.color + "44";
      card.style.cssText =
        `--card-accent:${app.color};--card-glow:${glow};`
        + (app.dashed ? "border-style:dashed;" : "");

      card.innerHTML = `
        <div class="card-icon" style="background:${app.color}22;color:${app.color};">${app.icon}</div>
        <h3>${esc(app.title)}</h3>
        <p>${esc(app.desc)}</p>
        <span class="card-badge">${esc(app.badge||"")}</span>`;
      container.appendChild(card);
    });
  } catch(e) {
    container.innerHTML = `<a href="/chat" class="card" style="--card-accent:#6c5ce7;--card-glow:#6c5ce744;">
      <div class="card-icon" style="background:#6c5ce722;color:#6c5ce7;">💬</div>
      <h3>AI 聊天</h3><p>智能对话，Agent 工具调用</p><span class="card-badge">🚀 已上线</span></a>`;
  }
})();

// ===== 加载社区作品 =====
(async function loadCommunity() {
  const container = document.getElementById("communityCards");
  try {
    const resp = await fetch("/api/community-apps");
    const items = await resp.json();
    if (!items.length) return;

    document.getElementById("communityTitle").style.display = "";
    items.forEach(item => {
      const card = document.createElement("a");
      card.className = "card";
      card.href = item.url;
      card.style.cssText = `--card-accent:${item.color};--card-glow:${item.color}44;`;

      const time = new Date(item.time * 1000);
      card.innerHTML = `
        <div class="card-icon" style="background:${item.color}22;color:${item.color};">${esc(item.icon)}</div>
        <h3>${esc(item.title)}</h3>
        <p>${esc(item.desc)}</p>
        <span class="card-badge">👤 ${esc(item.author)} · ${time.toLocaleDateString("zh-CN")}</span>`;
      container.appendChild(card);
    });

    const tip = document.createElement("a");
    tip.className = "card";
    tip.href = "/submit";
    tip.style.cssText = "--card-accent:#8888a0;--card-glow:transparent;border-style:dashed;";
    tip.innerHTML = `
      <div class="card-icon" style="background:rgba(255,255,255,0.04);color:#8888a0;">➕</div>
      <h3>提交你的作品</h3>
      <p>发布工具、游戏、网站，让所有人看到</p>
      <span class="card-badge">🚀 立即发布</span>`;
    container.appendChild(tip);
  } catch(e) {}
})();

function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

// 初始检查登录状态
checkAuth();
</script>
</body>
</html>
