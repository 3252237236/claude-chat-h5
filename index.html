<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HZ Lab</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0b;
  --surface: #111111;
  --surface2: #171717;
  --text: #fafafa;
  --text-dim: #888888;
  --border: rgba(255,255,255,0.08);
  --shadow-border: 0 0 0 1px rgba(255,255,255,0.07);
  --shadow-card: 0 0 0 1px rgba(255,255,255,0.06), 0 2px 4px rgba(0,0,0,0.3), 0 0 0 1px rgba(250,250,250,0.02) inset;
  --radius: 8px;
}

html, body { min-height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  letter-spacing: -0.16px;
}

/* ===== 几何背景 ===== */
.bg-geo {
  position: fixed; inset: 0; z-index: 0; overflow: hidden;
  pointer-events: none;
}
.bg-geo::before {
  content: "";
  position: absolute; inset: 0;
  background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 32px 32px;
}

/* ===== 主容器 ===== */
.app {
  position: relative; z-index: 1;
  max-width: 720px; margin: 0 auto;
  padding: 80px 24px 96px;
  min-height: 100vh;
}

/* ===== 头部 ===== */
.hero {
  margin-bottom: 64px;
}
.hero .logo {
  display: inline-flex; align-items: center; gap: 10px;
  margin-bottom: 40px;
  text-decoration: none; color: var(--text);
}
.hero .logo-icon {
  width: 28px; height: 28px; border-radius: 6px;
  background: var(--text); color: var(--bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600;
}
.hero h1 {
  font-size: 48px; font-weight: 600; letter-spacing: -2.4px;
  line-height: 1.08; margin-bottom: 16px;
}
.hero .sub {
  font-size: 18px; color: var(--text-dim);
  line-height: 1.6; max-width: 480px;
}

/* ===== 项目列表 ===== */
.projects {
  display: flex; flex-direction: column;
}

.project-row {
  display: flex; align-items: center; gap: 16px;
  padding: 20px 0;
  text-decoration: none; color: inherit;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  transition: opacity 0.15s;
}
.project-row:first-child { border-top: 1px solid rgba(255,255,255,0.05); }
.project-row:hover { opacity: 0.8; }

.project-row .pr-icon {
  width: 40px; height: 40px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
  background: var(--surface2);
  box-shadow: var(--shadow-border);
}

.project-row .pr-info { flex: 1; min-width: 0; }
.project-row .pr-name {
  font-size: 16px; font-weight: 500; letter-spacing: -0.24px;
}
.project-row .pr-desc {
  font-size: 14px; color: var(--text-dim); margin-top: 2px;
}

.project-row .pr-badge {
  font-size: 11px; font-weight: 500; color: var(--text-dim);
  padding: 3px 10px; border-radius: 100px;
  background: var(--surface2);
  box-shadow: var(--shadow-border);
  white-space: nowrap; flex-shrink: 0;
}

.project-row .pr-arrow {
  color: var(--text-dim); font-size: 14px; flex-shrink: 0;
  transition: transform 0.15s;
}
.project-row:hover .pr-arrow { transform: translateX(3px); }

/* ===== 社区区块 ===== */
.section {
  margin-top: 80px;
}
.section-title {
  font-size: 12px; font-weight: 500; letter-spacing: 1.2px;
  text-transform: uppercase; color: var(--text-dim);
  margin-bottom: 16px;
}

.community-row {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 0;
  text-decoration: none; color: inherit;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  transition: opacity 0.15s;
}
.community-row:first-child { border-top: 1px solid rgba(255,255,255,0.05); }
.community-row:hover { opacity: 0.8; }

.community-row .cr-icon {
  width: 32px; height: 32px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.community-row .cr-info { flex: 1; min-width: 0; }
.community-row .cr-name { font-size: 14px; font-weight: 500; }
.community-row .cr-meta { font-size: 13px; color: var(--text-dim); }
.community-row .cr-arrow { color: var(--text-dim); font-size: 13px; flex-shrink: 0; transition: transform 0.15s; }
.community-row:hover .cr-arrow { transform: translateX(3px); }

/* ===== 底部 ===== */
.footer {
  margin-top: 80px;
  font-size: 13px; color: var(--text-dim);
}

/* ===== 响应式 ===== */
@media (max-width: 600px) {
  .app { padding: 48px 16px 64px; }
  .hero { margin-bottom: 40px; }
  .hero h1 { font-size: 36px; letter-spacing: -1.6px; }
  .hero .sub { font-size: 16px; }
  .project-row { padding: 16px 0; }
  .project-row .pr-badge { display: none; }
}
</style>
</head>
<body>

<div class="bg-geo"></div>

<div class="app">
  <header class="hero">
    <a href="/" class="logo">
      <span class="logo-icon">HZ</span>
      HZ Lab
    </a>
    <h1>探索 AI 与工具的无限可能</h1>
    <p class="sub">所有项目免费开放，点开即用。每个应用都是独立的一扇门。</p>
  </header>

  <div class="projects" id="projectList"></div>

  <div class="section" id="communitySection" hidden>
    <div class="section-title">社区作品</div>
    <div id="communityList"></div>
  </div>

  <footer class="footer">&copy; 2026 HZ Lab</footer>
</div>

<script>
(async function() {
  const list = document.getElementById("projectList");

  try {
    const apps = await fetch("apps.json").then(r => r.json());

    apps.forEach(app => {
      const row = document.createElement("a");
      row.className = "project-row";
      row.href = app.url;
      row.innerHTML = `
        <div class="pr-icon" style="background:${app.color}14;color:${app.color};box-shadow:0 0 0 1px ${app.color}18;">
          ${app.icon}
        </div>
        <div class="pr-info">
          <div class="pr-name">${esc(app.title)}</div>
          <div class="pr-desc">${esc(app.desc)}</div>
        </div>
        ${app.badge ? `<span class="pr-badge">${esc(app.badge)}</span>` : ""}
        <span class="pr-arrow">→</span>`;
      list.appendChild(row);
    });
  } catch(e) {
    list.innerHTML = `<a href="/chat" class="project-row">
      <div class="pr-icon">💬</div>
      <div class="pr-info"><div class="pr-name">AI 聊天</div><div class="pr-desc">智能对话，Agent 工具调用</div></div>
      <span class="pr-badge">🚀 已上线</span><span class="pr-arrow">→</span></a>`;
  }

  // 社区作品
  try {
    const items = await fetch("/api/community-apps").then(r => r.json());
    if (!items.length) return;
    document.getElementById("communitySection").hidden = false;
    const cl = document.getElementById("communityList");

    items.forEach(item => {
      const row = document.createElement("a");
      row.className = "community-row";
      row.href = item.url;
      const time = new Date(item.time * 1000);
      row.innerHTML = `
        <div class="cr-icon" style="background:${item.color}14;color:${item.color};">${esc(item.icon)}</div>
        <div class="cr-info">
          <div class="cr-name">${esc(item.title)}</div>
          <div class="cr-meta">${esc(item.author)} · ${time.toLocaleDateString("zh-CN")}</div>
        </div>
        <span class="cr-arrow">→</span>`;
      cl.appendChild(row);
    });
  } catch(e) {}
})();

function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>
