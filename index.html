<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HZ Lab</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --surface: rgba(255,255,255,0.03);
  --surface-hover: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.06);
  --text: #e8e8f0;
  --text-dim: #8888a0;
  --accent: #6c5ce7;
  --accent-glow: rgba(108,92,231,0.3);
  --green: #00d2a0;
  --green-glow: rgba(0,210,160,0.3);
  --blue: #4dabf7;
  --blue-glow: rgba(77,171,247,0.3);
  --orange: #ff922b;
  --orange-glow: rgba(255,146,43,0.3);
  --pink: #f06595;
  --pink-glow: rgba(240,101,149,0.3);
  --radius: 20px;
  --radius-sm: 14px;
  --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
}

/* ========== 背景动效 ========== */
.bg {
  position: fixed; inset: 0; z-index: 0; overflow: hidden;
}
.bg-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.15;
  animation: orbFloat 20s ease-in-out infinite;
}
.bg-orb:nth-child(1) {
  width: 600px; height: 600px;
  background: var(--accent);
  top: -200px; left: -100px;
  animation-delay: 0s;
}
.bg-orb:nth-child(2) {
  width: 400px; height: 400px;
  background: var(--blue);
  bottom: -100px; right: -100px;
  animation-delay: -7s;
}
.bg-orb:nth-child(3) {
  width: 300px; height: 300px;
  background: var(--green);
  top: 50%; left: 50%;
  animation-delay: -14s;
  opacity: 0.08;
}
@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(60px, -40px) scale(1.1); }
  50% { transform: translate(-30px, -80px) scale(0.9); }
  75% { transform: translate(-50px, 30px) scale(1.05); }
}

/* 网格纹理 */
.bg-grid {
  position: fixed; inset: 0; z-index: 0; opacity: 0.03;
  background-image:
    linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* ========== 主容器 ========== */
.app {
  position: relative; z-index: 1;
  max-width: 960px; margin: 0 auto;
  padding: 60px 24px 80px;
  min-height: 100vh;
  display: flex; flex-direction: column;
}

/* ========== 头部 ========== */
.hero {
  text-align: center; padding: 80px 0 60px;
}
.hero .logo {
  display: inline-flex; align-items: center; gap: 12px;
  margin-bottom: 24px;
}
.hero .logo-icon {
  width: 52px; height: 52px;
  background: linear-gradient(135deg, var(--accent), var(--blue));
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  box-shadow: 0 0 40px var(--accent-glow);
}
.hero h1 {
  font-size: 48px; font-weight: 800; letter-spacing: -2px;
  background: linear-gradient(135deg, #fff 0%, #a0a0c0 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero .subtitle {
  font-size: 17px; color: var(--text-dim); max-width: 500px; margin: 0 auto;
  line-height: 1.7;
}

/* ========== 项目卡片 ========== */
.section-title {
  font-size: 13px; font-weight: 700; letter-spacing: 3px;
  text-transform: uppercase; color: var(--text-dim);
  margin: 20px 0 24px; text-align: center;
}
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}
.card {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px 28px 28px;
  cursor: pointer;
  transition: all var(--transition);
  text-decoration: none; color: inherit;
  overflow: hidden;
}
.card::before {
  content: "";
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--card-accent, var(--accent)), transparent);
  opacity: 0; transition: opacity var(--transition);
}
.card:hover {
  background: var(--surface-hover);
  border-color: rgba(255,255,255,0.12);
  transform: translateY(-4px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 80px var(--card-glow, var(--accent-glow));
}
.card:hover::before { opacity: 1; }
.card .card-icon {
  width: 48px; height: 48px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; margin-bottom: 18px;
}
.card h3 { font-size: 19px; font-weight: 700; margin-bottom: 8px; }
.card p { font-size: 14px; color: var(--text-dim); line-height: 1.6; }
.card .card-badge {
  display: inline-block; margin-top: 16px;
  font-size: 11px; font-weight: 600; padding: 4px 10px;
  border-radius: 20px; background: rgba(255,255,255,0.05);
  color: var(--text-dim);
}
.card:hover .card-badge { color: var(--text); }

/* 聊天卡片主题色 */
.card-chat { --card-accent: var(--accent); --card-glow: var(--accent-glow); }
.card-chat .card-icon { background: rgba(108,92,231,0.12); color: #b8a9ff; }

/* 占位卡片 */
.card-soon {
  opacity: 0.4; cursor: default; pointer-events: none;
}
.card-soon:hover { transform: none; box-shadow: none; background: var(--surface); border-color: var(--border); }
.card-soon:hover::before { opacity: 0; }
.card-soon .card-icon { background: rgba(255,255,255,0.04); color: var(--text-dim); }
.card-soon .card-soon-tag {
  position: absolute; top: 20px; right: 20px;
  font-size: 10px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--text-dim);
  padding: 3px 10px; border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
}

/* ========== 底部 ========== */
.footer {
  margin-top: auto; text-align: center; padding-top: 60px;
  font-size: 12px; color: var(--text-dim);
}

/* ========== 响应式 ========== */
@media (max-width: 600px) {
  .app { padding: 40px 16px 60px; }
  .hero { padding: 40px 0 40px; }
  .hero h1 { font-size: 34px; }
  .hero .subtitle { font-size: 15px; }
  .cards { grid-template-columns: 1fr; }
  .bg-orb:nth-child(1) { width: 300px; height: 300px; }
  .bg-orb:nth-child(2) { width: 200px; height: 200px; }
}
</style>
</head>
<body>

<!-- 背景 -->
<div class="bg">
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
</div>
<div class="bg-grid"></div>

<!-- 主内容 -->
<div class="app">
  <header class="hero">
    <div class="logo">
      <div class="logo-icon">⚡</div>
    </div>
    <h1>HZ Lab</h1>
    <p class="subtitle">探索 AI 与工具的无限可能<br>所有项目免费开放，点开即用</p>
  </header>

  <div class="section-title">Apps</div>
  <div class="cards">

    <!-- AI 聊天 -->
    <a href="/chat" class="card card-chat">
      <div class="card-icon">💬</div>
      <h3>AI 聊天</h3>
      <p>基于 MiMo 模型的多话题智能对话，支持 Agent 工具调用与图片识别</p>
      <span class="card-badge">🚀 已上线</span>
    </a>

    <!-- 占位：待上线 -->
    <div class="card card-soon">
      <div class="card-icon">🔮</div>
      <h3>更多工具</h3>
      <p>更多有趣实用的 AI 工具即将到来…</p>
      <span class="card-badge">🔜 即将上线</span>
      <span class="card-soon-tag">WIP</span>
    </div>

  </div>

  <footer class="footer">
    &copy; 2026 HZ Lab · Built with ❤️
  </footer>
</div>

</body>
</html>
