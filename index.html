<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HZ Lab</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --surface: rgba(255,255,255,0.03);
  --surface-hover: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.06);
  --text: #e8e8f0;
  --text-dim: #8888a0;
  --accent: #6c5ce7;
  --accent-glow: rgba(108,92,231,0.3);
  --green: #00d2a0;
  --green-glow: rgba(0,210,160,0.3);
  --blue: #4dabf7;
  --blue-glow: rgba(77,171,247,0.3);
  --orange: #ff922b;
  --orange-glow: rgba(255,146,43,0.3);
  --pink: #f06595;
  --pink-glow: rgba(240,101,149,0.3);
  --radius: 20px;
  --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}

html, body {
  min-height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
}

/* ===== 背景光晕 ===== */
.bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
.bg-orb {
  position: absolute; border-radius: 50%;
  filter: blur(120px); opacity: 0.15;
  animation: orbFloat 20s ease-in-out infinite;
}
.bg-orb:nth-child(1) {
  width: 600px; height: 600px; background: var(--accent);
  top: -200px; left: -100px; animation-delay: 0s;
}
.bg-orb:nth-child(2) {
  width: 400px; height: 400px; background: var(--blue);
  bottom: -100px; right: -100px; animation-delay: -7s;
}
.bg-orb:nth-child(3) {
  width: 300px; height: 300px; background: var(--green);
  top: 50%; left: 50%; animation-delay: -14s; opacity: 0.08;
}
@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); }
  25% { transform: translate(60px, -40px) scale(1.1) rotate(5deg); }
  50% { transform: translate(-30px, -80px) scale(0.9) rotate(-3deg); }
  75% { transform: translate(-50px, 30px) scale(1.05) rotate(2deg); }
}

/* ===== 页面进入动画 ===== */
@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes scaleIn {
  from {
    opacity: 0;
    transform: scale(0.9);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}
.bg-grid {
  position: fixed; inset: 0; z-index: 0; opacity: 0.03;
  background-image:
    linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* ===== 噪点纹理 ===== */
.bg-noise {
  position: fixed; inset: 0; z-index: 0;
  opacity: 0.015;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 256px 256px;
  pointer-events: none;
}

/* ===== 自定义滚动条 ===== */
::-webkit-scrollbar {
  width: 8px;
  height: 8px;
}
::-webkit-scrollbar-track {
  background: rgba(255,255,255,0.02);
}
::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.1);
  border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover {
  background: rgba(255,255,255,0.2);
}

/* ===== 主容器 ===== */
.app {
  position: relative; z-index: 1;
  max-width: 960px; margin: 0 auto;
  padding: 60px 24px 80px;
  min-height: 100vh;
  display: flex; flex-direction: column;
  animation: fadeIn 0.6s ease-out;
}

/* ===== 用户栏 ===== */
.user-bar {
  display: flex; justify-content: flex-end; align-items: center; gap: 12px;
  padding: 12px 0 0;
}
.user-bar .ub-user {
  font-size: 13px; color: var(--text-dim);
  display: flex; align-items: center; gap: 8px;
}
.user-bar .ub-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green-glow);
}
.ub-btn-logout {
  font-size: 11px; background: rgba(255,255,255,0.06); color: var(--text-dim);
  border: none; padding: 4px 10px; border-radius: 12px;
  cursor: pointer; font-family: inherit; transition: all 0.2s;
}
.ub-btn-logout:hover { background: rgba(255,255,255,0.12); color: var(--text); }

/* ===== 头部 ===== */
.hero { text-align: center; padding: 60px 0 60px; }
.hero .logo {
  display: inline-flex; align-items: center; gap: 12px;
  margin-bottom: 24px;
  animation: fadeInUp 0.6s ease-out 0.1s both;
}
.hero .logo-icon {
  width: 52px; height: 52px;
  background: linear-gradient(135deg, var(--accent), var(--blue));
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  box-shadow: 0 0 40px var(--accent-glow);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.hero .logo-icon:hover {
  transform: scale(1.1) rotate(5deg);
  box-shadow: 0 0 60px var(--accent-glow);
}
.hero h1 {
  font-size: 48px; font-weight: 800; letter-spacing: -2px;
  background: linear-gradient(135deg, #fff 0%, #a0a0c0 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: fadeInUp 0.6s ease-out 0.2s both;
}
.hero .subtitle {
  font-size: 17px; color: var(--text-dim); max-width: 500px; margin: 0 auto;
  line-height: 1.7;
  animation: fadeInUp 0.6s ease-out 0.3s both;
}

/* ===== 卡片 ===== */
.section-title {
  font-size: 13px; font-weight: 700; letter-spacing: 3px;
  text-transform: uppercase; color: var(--text-dim);
  margin: 20px 0 24px; text-align: center;
  animation: fadeInUp 0.6s ease-out 0.4s both;
}
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}
.card {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px 28px 28px;
  cursor: pointer;
  transition: all var(--transition);
  text-decoration: none; color: inherit;
  overflow: hidden;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  animation: fadeInUp 0.6s ease-out both;
}
.card:nth-child(1) { animation-delay: 0.5s; }
.card:nth-child(2) { animation-delay: 0.6s; }
.card:nth-child(3) { animation-delay: 0.7s; }
.card:nth-child(4) { animation-delay: 0.8s; }
.card:nth-child(5) { animation-delay: 0.9s; }
.card:nth-child(6) { animation-delay: 1.0s; }

.card::before {
  content: "";
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--card-accent, var(--accent)), transparent);
  opacity: 0; transition: opacity var(--transition);
}

/* 鼠标跟随光晕效果 */
.card::after {
  content: "";
  position: absolute;
  top: var(--mouse-y, 50%);
  left: var(--mouse-x, 50%);
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, var(--card-glow, var(--accent-glow)) 0%, transparent 70%);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
  z-index: -1;
}

.card:hover {
  background: var(--surface-hover);
  border-color: rgba(255,255,255,0.12);
  transform: translateY(-4px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 80px var(--card-glow, var(--accent-glow));
}
.card:hover::before { opacity: 1; }
.card:hover::after { opacity: 0.15; }

.card .card-icon {
  width: 48px; height: 48px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; margin-bottom: 18px;
  transition: transform 0.3s ease;
}
.card:hover .card-icon {
  transform: scale(1.1);
}
.card h3 { font-size: 19px; font-weight: 700; margin-bottom: 8px; }
.card p { font-size: 14px; color: var(--text-dim); line-height: 1.6; }
.card .card-badge {
  display: inline-block; margin-top: 16px;
  font-size: 11px; font-weight: 600; padding: 4px 10px;
  border-radius: 20px; background: rgba(255,255,255,0.05);
  color: var(--text-dim);
  transition: all 0.3s ease;
}
.card:hover .card-badge {
  color: var(--text);
  background: rgba(255,255,255,0.1);
}

/* ===== 底部 ===== */
.footer {
  margin-top: auto; text-align: center; padding-top: 60px;
  font-size: 12px; color: var(--text-dim);
  animation: fadeIn 0.6s ease-out 1.2s both;
}

/* ===== 响应式 ===== */
@media (max-width: 600px) {
  .app { padding: 40px 16px 60px; }
  .hero { padding: 40px 0 40px; }
  .hero h1 { font-size: 34px; }
  .hero .subtitle { font-size: 15px; }
  .cards { grid-template-columns: 1fr; }
  .bg-orb:nth-child(1) { width: 300px; height: 300px; }
  .bg-orb:nth-child(2) { width: 200px; height: 200px; }
}
</style>
</head>
<body>

<div class="bg">
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
</div>
<div class="bg-grid"></div>
<div class="bg-noise"></div>

<div class="app">
  <div class="user-bar" id="userBar"></div>

  <header class="hero">
    <div class="logo">
      <div class="logo-icon">⚡</div>
    </div>
    <h1>HZ Lab</h1>
    <p class="subtitle">探索 AI 与工具的无限可能<br>所有项目免费开放，点开即用</p>
  </header>

  <div class="section-title">Apps</div>
  <div class="cards" id="builtinCards"></div>

  <div class="section-title" id="communityTitle" style="display:none;">社区作品</div>
  <div class="cards" id="communityCards"></div>

  <footer class="footer">&copy; 2026 HZ Lab · Built with ❤️</footer>
</div>

<script>
// ===== 用户状态 =====
async function checkAuth() {
  try {
    const data = await fetch("/api/me").then(r => r.json());
    if (data.user) {
      const adminLink = data.user.is_admin
        ? `<a href="/admin" style="font-size:11px;color:var(--orange);text-decoration:none;padding:4px 10px;border-radius:12px;background:rgba(255,146,43,0.12);">🛡️ 管理</a>`
        : "";

      // 获取未读消息数
      let messageBadge = "";
      try {
        const msgData = await fetch("/api/messages/unread").then(r => r.json());
        if (msgData.count > 0) {
          messageBadge = `<span style="position:absolute;top:-6px;right:-6px;background:var(--orange);color:white;font-size:10px;padding:2px 5px;border-radius:10px;min-width:16px;text-align:center;">${msgData.count}</span>`;
        }
      } catch(e) {}

      document.getElementById("userBar").innerHTML = `
        <span class="ub-user">
          <span class="ub-dot"></span>
          ${esc(data.user.username)}
          <a href="/friends" style="position:relative;font-size:11px;color:var(--blue);text-decoration:none;padding:4px 10px;border-radius:12px;background:rgba(77,171,247,0.12);">👥 好友${messageBadge}</a>
          ${adminLink}
          <button class="ub-btn-logout" onclick="doLogout()">登出</button>
        </span>`;
    }
  } catch(e) {}
}

async function doLogout() {
  await fetch("/api/logout", { method: "POST" });
  location.href = "/login";
}

// ===== 加载内置应用 (apps.json) =====
(async function loadApps() {
  const container = document.getElementById("builtinCards");
  try {
    const apps = await fetch("apps.json").then(r => r.json());
    if (!apps.length) return;

    apps.forEach(app => {
      const card = document.createElement("a");
      card.className = "card";
      card.href = app.url;
      const glow = app.color + "44";
      card.style.cssText =
        `--card-accent:${app.color};--card-glow:${glow};`
        + (app.dashed ? "border-style:dashed;" : "");

      card.innerHTML = `
        <div class="card-icon" style="background:${app.color}22;color:${app.color};">${app.icon}</div>
        <h3>${esc(app.title)}</h3>
        <p>${esc(app.desc)}</p>
        <span class="card-badge">${esc(app.badge||"")}</span>`;
      container.appendChild(card);
    });
  } catch(e) {
    container.innerHTML = `<a href="/chat" class="card" style="--card-accent:#6c5ce7;--card-glow:#6c5ce744;">
      <div class="card-icon" style="background:#6c5ce722;color:#6c5ce7;">💬</div>
      <h3>AI 聊天</h3><p>智能对话，Agent 工具调用</p><span class="card-badge">🚀 已上线</span></a>`;
  }
})();

// ===== 加载社区作品 =====
(async function loadCommunity() {
  const container = document.getElementById("communityCards");
  try {
    const items = await fetch("/api/community-apps").then(r => r.json());
    if (!items.length) return;

    document.getElementById("communityTitle").style.display = "";

    items.forEach(item => {
      const card = document.createElement("a");
      card.className = "card";
      card.href = item.url;
      card.style.cssText = `--card-accent:${item.color};--card-glow:${item.color}44;`;

      const time = new Date(item.time * 1000);
      card.innerHTML = `
        <div class="card-icon" style="background:${item.color}22;color:${item.color};">${esc(item.icon)}</div>
        <h3>${esc(item.title)}</h3>
        <p>${esc(item.desc)}</p>
        <span class="card-badge">👤 ${esc(item.author)} · ${time.toLocaleDateString("zh-CN")}</span>`;
      container.appendChild(card);
    });

    const tip = document.createElement("a");
    tip.className = "card";
    tip.href = "/submit";
    tip.style.cssText = "--card-accent:#8888a0;--card-glow:transparent;border-style:dashed;";
    tip.innerHTML = `
      <div class="card-icon" style="background:rgba(255,255,255,0.04);color:#8888a0;">➕</div>
      <h3>提交你的作品</h3>
      <p>发布工具、游戏、网站，让所有人看到</p>
      <span class="card-badge">🚀 立即发布</span>`;
    container.appendChild(tip);
  } catch(e) {}
})();

function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

// ===== 鼠标跟随光晕效果 =====
function initMouseGlow() {
  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('mousemove', (e) => {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      card.style.setProperty('--mouse-x', `${x}px`);
      card.style.setProperty('--mouse-y', `${y}px`);
    });
  });
}

// 在卡片加载后初始化鼠标效果
setTimeout(initMouseGlow, 100);

// ===== 滚动触发动画 =====
function initScrollAnimations() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.style.opacity = '1';
        entry.target.style.transform = 'translateY(0)';
      }
    });
  }, { threshold: 0.1 });

  // 观察社区作品区域
  const communityTitle = document.getElementById('communityTitle');
  const communityCards = document.getElementById('communityCards');
  if (communityTitle) observer.observe(communityTitle);
  if (communityCards) observer.observe(communityCards);
}

document.addEventListener('DOMContentLoaded', initScrollAnimations);

checkAuth();
</script>
</body>
</html>
