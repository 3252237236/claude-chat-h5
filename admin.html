<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理面板 · HZ Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f8fafc;
  --surface: #ffffff;
  --border: rgba(0,0,0,0.12);
  --border-hover: rgba(0,0,0,0.25);
  --text: #0f172a;
  --text-2: #475569;
  --text-3: #94a3b8;
  --accent: #6366f1;
  --green: #16a34a;
  --orange: #ea580c;
  --red: #ef4444;
  --blue: #2563eb;
}

html {
  scrollbar-width: thin;
  scrollbar-color: rgba(0,0,0,0.15) transparent;
}

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }

/* 背景 */
.bg-anim {
  position: fixed;
  inset: 0;
  overflow: hidden;
  z-index: 0;
}

.light {
  position: fixed;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  filter: blur(150px);
  opacity: 0.04;
  pointer-events: none;
}
.light-1 { background: var(--orange); top: -100px; left: 30%; }
.light-2 { background: #60a5fa; bottom: -100px; right: 20%; }

.grid-overlay {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse at 50% 0%, black 30%, transparent 70%);
  -webkit-mask-image: radial-gradient(ellipse at 50% 0%, black 30%, transparent 70%);
}

/* 主容器 */
.app {
  position: relative;
  z-index: 1;
  max-width: 1000px;
  margin: 0 auto;
  padding: 40px 24px 80px;
  min-height: 100vh;
}

/* 头部 */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 40px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  gap: 16px;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.header h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.header-links {
  display: flex;
  gap: 16px;
}

.header-links a {
  font-size: 14px;
  color: var(--text-2);
  text-decoration: none;
  padding: 8px 16px;
  border-radius: 8px;
  transition: all 0.2s;
}

.header-links a:hover {
  color: var(--text);
  background: rgba(0,0,0,0.05);
}

/* 标签切换 */
.tabs {
  display: flex;
  gap: 4px;
  padding: 4px;
  background: rgba(0,0,0,0.03);
  border-radius: 12px;
  margin-bottom: 32px;
  border: 1px solid var(--border);
}

.tab {
  flex: 1;
  padding: 10px 16px;
  border: none;
  background: transparent;
  color: var(--text-3);
  font-size: 13px;
  font-weight: 500;
  border-radius: 8px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}

.tab.active {
  background: var(--accent);
  color: white;
}

.tab:hover:not(.active) {
  color: var(--text-2);
  background: rgba(0,0,0,0.03);
}

/* 统计卡片 */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}

.stat-card {
  background: rgba(0,0,0,0.04);
  border: 1px solid var(--border);
  box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  border-radius: 16px;
  padding: 20px;
  transition: all 0.2s;
}

.stat-card:hover {
  background: rgba(0,0,0,0.04);
  border-color: var(--border-hover);
}

.stat-value {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -1px;
  margin-bottom: 4px;
}

.stat-label {
  font-size: 13px;
  color: var(--text-3);
}

/* 内容区 */
.content {
  display: none;
}
.content.active {
  display: block;
}

/* 表格 */
.table-wrap {
  background: rgba(0,0,0,0.04);
  border: 1px solid var(--border);
  box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  border-radius: 16px;
  overflow: hidden;
}

.table {
  width: 100%;
  border-collapse: collapse;
}

.table th {
  text-align: left;
  padding: 14px 20px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-3);
  background: rgba(0,0,0,0.03);
  border-bottom: 1px solid var(--border);
}

.table td {
  padding: 14px 20px;
  font-size: 14px;
  border-bottom: 1px solid var(--border);
}

.table tr:last-child td {
  border-bottom: none;
}

.table tr:hover td {
  background: rgba(0,0,0,0.03);
}

/* 按钮 */
.btn-sm {
  padding: 6px 14px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-2);
  font-size: 12px;
  font-weight: 500;
  border-radius: 8px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}

.btn-sm:hover {
  background: rgba(0,0,0,0.05);
  border-color: var(--border-hover);
  color: var(--text);
}

.btn-sm.success {
  background: rgba(34,197,94,0.1);
  border-color: rgba(34,197,94,0.3);
  color: var(--green);
}

.btn-sm.danger {
  background: rgba(239,68,68,0.1);
  border-color: rgba(239,68,68,0.2);
  color: #fca5a5;
}

.btn-sm.orange {
  background: rgba(249,115,22,0.1);
  border-color: rgba(249,115,22,0.3);
  color: var(--orange);
}

.badge {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 100px;
  font-size: 11px;
  font-weight: 600;
}

.badge-pending { background: rgba(249,115,22,0.1); color: var(--orange); border: 1px solid rgba(249,115,22,0.2); }
.badge-approved { background: rgba(34,197,94,0.1); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
.badge-rejected { background: rgba(239,68,68,0.1); color: #fca5a5; border: 1px solid rgba(239,68,68,0.2); }
.badge-admin { background: rgba(99,102,241,0.1); color: var(--accent); border: 1px solid rgba(99,102,241,0.2); }

/* 响应式 */
@media (max-width: 768px) {
  .app {
    padding: 20px 16px 60px;
  }

  .header h1 {
    font-size: 20px;
  }

  .tab {
    padding: 8px 12px;
    font-size: 12px;
  }

  .stats {
    grid-template-columns: repeat(2, 1fr);
  }

  .table-wrap {
    overflow-x: auto;
  }

  .table th, .table td {
    padding: 10px 12px;
    font-size: 12px;
    white-space: nowrap;
  }
}
</style>
</head>
<body>

<div class="bg-anim">
  <div class="light light-1"></div>
  <div class="light light-2"></div>
</div>
<div class="grid-overlay"></div>

<div class="app">
  <div class="header">
    <h1>🛡️ 管理面板</h1>
    <div class="header-links">
      <a href="/">← 首页</a>
      <a href="#" onclick="doLogout()">登出</a>
    </div>
  </div>

  <!-- 统计卡片 -->
  <div class="stats" id="stats"></div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('review')">待审核</button>
    <button class="tab" onclick="switchTab('all')">全部内容</button>
    <button class="tab" onclick="switchTab('users')">用户管理</button>
  </div>

  <!-- 待审核 -->
  <div class="content active" id="tabReview">
    <div class="table-wrap">
      <table class="table">
        <thead>
          <tr>
            <th>名称</th>
            <th>作者</th>
            <th>类型</th>
            <th>时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="reviewBody"></tbody>
      </table>
    </div>
  </div>

  <!-- 全部内容 -->
  <div class="content" id="tabAll">
    <div class="table-wrap">
      <table class="table">
        <thead>
          <tr>
            <th>名称</th>
            <th>作者</th>
            <th>状态</th>
            <th>时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="allBody"></tbody>
      </table>
    </div>
  </div>

  <!-- 用户管理 -->
  <div class="content" id="tabUsers">
    <div class="table-wrap">
      <table class="table">
        <thead>
          <tr>
            <th>用户名</th>
            <th>ID</th>
            <th>身份</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="usersBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
let currentTab = 'review';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
}

async function doLogout() {
  await fetch('/api/logout', { method: 'POST' });
  location.href = '/login';
}

// 加载统计
async function loadStats() {
  try {
    const users = await fetch('/api/admin/users').then(r => r.json());
    const pending = await fetch('/api/admin/pending').then(r => r.json());
    const all = await fetch('/api/admin/all').then(r => r.json());
    document.getElementById('stats').innerHTML = `
      <div class="stat-card">
        <div class="stat-value">${Array.isArray(users) ? users.length : 0}</div>
        <div class="stat-label">用户总数</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${all.apps ? all.apps.length : 0}</div>
        <div class="stat-label">社区应用</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${all.uploads ? all.uploads.length : 0}</div>
        <div class="stat-label">文件数量</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${(pending.apps ? pending.apps.length : 0) + (pending.uploads ? pending.uploads.length : 0)}</div>
        <div class="stat-label">待审核</div>
      </div>
    `;
  } catch(e) { console.error(e); }
}

// 加载待审核
async function loadReview() {
  try {
    const data = await fetch('/api/admin/pending').then(r => r.json());
    const tbody = document.getElementById('reviewBody');
    const apps = data.apps || [];
    const uploads = data.uploads || [];
    const items = [
      ...apps.map(a => ({...a, type: 'app'})),
      ...uploads.map(u => ({...u, type: 'upload'}))
    ];
    if (items.length > 0) {
      tbody.innerHTML = items.map(item => `
        <tr>
          <td>${esc(item.title)}</td>
          <td>${esc(item.author || item.uploader || '-')}</td>
          <td>${item.type === 'app' ? '应用' : '文件'}</td>
          <td>${new Date(item.time * 1000).toLocaleDateString('zh-CN')}</td>
          <td>
            <button class="btn-sm success" onclick="approve('${item.id}', '${item.type}')">通过</button>
            <button class="btn-sm danger" onclick="reject('${item.id}', '${item.type}')">拒绝</button>
          </td>
        </tr>
      `).join('');
    } else {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-3);padding:40px;">暂无待审核内容</td></tr>';
    }
  } catch(e) { console.error(e); }
}

// 加载全部内容
async function loadAll() {
  try {
    const data = await fetch('/api/admin/all').then(r => r.json());
    const tbody = document.getElementById('allBody');
    const apps = data.apps || [];
    const uploads = data.uploads || [];
    const items = [
      ...apps.map(a => ({...a, type: 'app'})),
      ...uploads.map(u => ({...u, type: 'upload'}))
    ];
    if (items.length > 0) {
      tbody.innerHTML = items.map(item => `
        <tr>
          <td>${esc(item.title)}</td>
          <td>${esc(item.author || item.uploader || '-')}</td>
          <td><span class="badge badge-${item.status}">${item.status === 'pending' ? '待审核' : item.status === 'approved' ? '已通过' : '已拒绝'}</span></td>
          <td>${new Date(item.time * 1000).toLocaleDateString('zh-CN')}</td>
          <td><button class="btn-sm danger" onclick="remove('${item.id}', '${item.type}')">删除</button></td>
        </tr>
      `).join('');
    } else {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-3);padding:40px;">暂无内容</td></tr>';
    }
  } catch(e) { console.error(e); }
}

// 加载用户
async function loadUsers() {
  try {
    const data = await fetch('/api/admin/users').then(r => r.json());
    const tbody = document.getElementById('usersBody');
    if (Array.isArray(data) && data.length > 0) {
      tbody.innerHTML = data.map(u => `
        <tr>
          <td>${esc(u.username)}</td>
          <td style="color:var(--text-3);font-size:12px;">${u.id}</td>
          <td><span class="badge ${u.is_admin ? 'badge-admin' : ''}">${u.is_admin ? '管理员' : '用户'}</span></td>
          <td>
            <button class="btn-sm orange" onclick="toggleAdmin('${u.id}', ${u.is_admin})">${u.is_admin ? '取消管理员' : '设为管理员'}</button>
            <button class="btn-sm danger" onclick="deleteUser('${u.id}')">删除</button>
          </td>
        </tr>
      `).join('');
    } else {
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--text-3);padding:40px;">暂无用户</td></tr>';
    }
  } catch(e) { console.error(e); }
}

async function approve(id, type) {
  await fetch(`/api/admin/approve/${type}/${id}`, { method: 'POST' });
  loadReview();
  loadAll();
  loadStats();
}

async function reject(id, type) {
  await fetch(`/api/admin/reject/${type}/${id}`, { method: 'POST' });
  loadReview();
  loadAll();
}

async function remove(id, type) {
  if (!confirm('确定删除？')) return;
  await fetch(`/api/admin/delete/${type}/${id}`, { method: 'POST' });
  loadAll();
  loadStats();
}

async function toggleAdmin(id, isAdmin) {
  await fetch(`/api/admin/users/${id}/toggle-admin`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' }
  });
  loadUsers();
}

async function deleteUser(id) {
  if (!confirm('确定删除该用户？')) return;
  await fetch(`/api/admin/users/${id}/delete`, { method: 'POST' });
  loadUsers();
  loadStats();
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

loadStats();
loadReview();
loadAll();
loadUsers();
</script>
</body>
</html>
