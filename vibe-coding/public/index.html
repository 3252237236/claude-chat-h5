<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Vibe Coding</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
  <!-- Auth Screen -->
  <div id="auth-screen" class="screen">
    <div class="auth-container">
      <div class="logo">⚡</div>
      <h1>Vibe Coding</h1>
      <p class="subtitle">Remote Coding from Phone</p>
      <div class="auth-form">
        <input type="password" id="password-input" placeholder="输入密码" autocomplete="off">
        <button id="connect-btn">连接</button>
      </div>
      <p id="auth-error" class="error"></p>
    </div>
  </div>

  <!-- Chat Screen -->
  <div id="chat-screen" class="screen hidden">
    <header>
      <div class="header-left">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Connected</span>
        <button id="mode-btn" class="mode-btn mode-safe" title="切换模式">🛡️ Safe</button>
      </div>
      <div class="header-right">
        <button id="sessions-btn" title="历史会话">📋</button>
        <button id="new-chat-btn" title="New Chat">🔄</button>
        <button id="stop-btn" title="Stop" class="hidden">⏹</button>
      </div>
    </header>

    <div id="messages" class="messages"></div>

    <!-- Session List Panel -->
    <div id="sessions-panel" class="sessions-panel hidden">
      <div class="sessions-header">
        <span>历史会话</span>
        <button id="sessions-close-btn">✕</button>
      </div>
      <div class="sessions-search">
        <input type="text" id="sessions-search-input" placeholder="🔍 搜索项目或会话...">
      </div>
      <div id="sessions-list" class="sessions-list"></div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea id="message-input" placeholder="描述你想做的事..." rows="1"></textarea>
        <button id="send-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
